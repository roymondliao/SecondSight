security_review:
  round_count: 1
  findings_total: 2
  findings_fixed: 2
  findings_accepted: 0
  details:
    - id: M-1
      severity: medium
      issue: "TOCTOU race in lifecycle_automation — read status and write status in separate transactions allows invalid transitions"
      resolution: "Fixed: atomic conditional UPDATE with WHERE status=<expected>; rowcount=0 skips safely"
    - id: M-2
      severity: medium
      issue: "Path traversal in CLI --project-id — user input used to construct filesystem paths without validation"
      resolution: "Fixed: validate with is_safe_id() in sync.py and analyze.py before any path construction"

known_failure_modes:
  - mode: >
      Jaccard similarity on word tokens is a crude semantic metric.
      Two conventions with identical meaning but different vocabulary
      (e.g., synonyms, rephrased sentences) will not be detected as
      duplicates. False negatives are safe (duplicate conventions waste
      token budget but don't corrupt state).
    severity: degradation
    detection: "Multiple active conventions covering the same behavioral pattern. Visible in directive listing."

  - mode: >
      Re-activation lookback (14 days) is a fixed window. A flag type
      that appears in cycles longer than 14 days (e.g., monthly review
      patterns) will never trigger re-activation. The convention stays
      obsolete permanently.
    severity: degradation
    detection: "Obsolete convention with periodic flag occurrences outside the 14-day window. Operator must manually re-activate via PATCH."

  - mode: >
      sync --rebuild deletes the DB before backfill. If backfill fails
      mid-way (disk full, corrupt events file), the DB is partially
      rebuilt. The pre-rebuild .bak file preserves the original state
      for manual recovery.
    severity: degradation
    detection: "Rebuild reports failures in output. Backup file exists at intelligence.db.<timestamp>.pre-rebuild.bak."

  - mode: >
      analyze --retry-failed builds a new Trigger per session (sequential,
      not batched). For many failed sessions, this is slow. No parallelism
      or batching — each session gets a fresh orchestrator run.
    severity: degradation
    detection: "CLI output shows progress per session. Operator can interrupt and resume (idempotent)."

  - mode: >
      Dedup exclusion by identity_key means the aggregator won't dedup
      a convention against itself (correct), but two patterns from the
      same aggregation run with different identity_keys are NOT deduped
      against each other (only against pre-existing conventions). Within-run
      duplicates could emerge if the LLM produces overlapping patterns.
    severity: degradation
    detection: "Two new conventions from the same run with high word overlap. Caught on next aggregation cycle when they become 'pre-existing'."

