monitoring_hooks:
  - "semantic_dedup skip rate: aggregator logs skipped duplicate count. If consistently high, conventions may be stale (same patterns re-emerging)"
  - "expiry_enforcement count: logs expired directive IDs. If 0 consistently, either no TTLs set or TTLs are very long"
  - "reactivation count: logs re-activated directive IDs. If never triggers, obsolete conventions may need manual review"
  - "retry-failed exit code: 0=all succeeded, 1=some failed. Persistent failures indicate upstream LLM or session issues"

