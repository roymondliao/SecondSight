# Ship Manifest — GUR-99 Phase 1 E2E Integration Test
# Validate-and-ship gate complete on 2026-05-05.

delivered_capability: >
  Five seam-level integration tests (MH-1..MH-5) at
  tests/integration/test_phase1_e2e.py that exercise the user-visible
  install-and-run lifecycle of the SecondSight observation pipeline
  end-to-end. No production code changes.

# --- What was built ---
test_classes:
  - id: MH-1
    name: TestMH1SingleEvent
    closes: "Hook URL drift would silently fall back to JSONL"
  - id: MH-2
    name: TestMH2MultiEvent
    closes: >
      segment_index frozen at 0 (USER_PROMPT increment regression);
      sub_agent_end on empty stack silently advancing depth
  - id: MH-3
    name: TestMH3FallbackArchive
    closes: >
      sync archives fallback before INSERT durability; double-archive
      on idempotent re-run; G1-α (Path C replay-into-DB silently
      implemented without scope confirmation)
  - id: MH-4
    name: TestMH4LatencyBudget
    closes: >
      Hook latency p95 regressing >2× without alarm. Empirical baseline
      recorded as p50=68ms, p95=115ms, p99=137ms on test fixture.
  - id: MH-5
    name: TestMH5CliLifecycle
    closes: >
      serve --daemon writes PID file but never binds port (silent
      partial start); status reports "running" when daemon is dead.

