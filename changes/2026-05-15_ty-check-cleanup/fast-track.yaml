type: fast_track
description: "Clean up repo-wide ty-check blockers in src/ and tests/ without changing runtime behavior."
death_clause: "If making ty-check pass requires changing analysis, trigger, storage, or adapter runtime semantics instead of narrowing types or test scaffolding, this cleanup is considered failed."
acceptance:
  - "pre-commit-equivalent ty command `ty check --python=.venv/ src tests` exits 0"
  - "type fixes preserve existing runtime behavior and primarily use protocols, casts, and test-fixture typing cleanup"
  - "targeted regression suites covering analysis runtime wiring and trigger flow still pass"
