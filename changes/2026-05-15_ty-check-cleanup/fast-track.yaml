quality_checklist:
  - criterion: "C5 Reuse"
    checked: true
    note: "Shared typing problems were fixed by introducing or widening protocol boundaries in segmenter, trigger, and observation pipeline instead of duplicating per-test shims in each file."
  - criterion: "C6 Clear Structure"
    checked: true
    note: "Runtime-facing fixes stayed at module boundaries that own the contracts (`trigger.py`, `pipeline.py`, `cli/init.py`), while test-only issues were resolved in tests via casts or helper typing rather than leaking test constraints into production code."
  - criterion: "C7 Elegant Logic"
    checked: true
    note: "Most changes are type-level only: `cast(Any, ...)`, narrower literals, and small protocols. No extra runtime wrappers or new branching logic were introduced beyond reading `output.status` defensively in the trigger."
  - criterion: "C8 No Redundancy"
    checked: true
    note: "Repeated constructor/type mismatches were normalized once per pattern: shared `_session_id` helper in storage tests, shared frozen-object cast pattern in schema tests, and protocol-based constructor typing in reusable runtime components."
