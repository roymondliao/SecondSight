# Mode-C deviation note: per samsara:implement skill, code reviewers
# (samsara:code-reviewer + samsara:code-quality-reviewer) should fire
# in parallel after each task. In mode-C inline (single-actor), the
# implementer and main agent share context, so per-task reviewer
# dispatch creates 10 round-trips that exhaust heartbeat context with
# limited propagation-risk benefit. Reviewers are batched into a
# single parallel dispatch after task-5 completes; tasks meanwhile
# carry status `completion_unverified` until that review passes.
plan_ref_doc: changes/2026-05-08_gur-104_phase2-analysis-cli-api/2-plan.md
