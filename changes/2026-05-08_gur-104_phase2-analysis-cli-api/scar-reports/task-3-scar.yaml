narrative: |
  Both `src/secondsight/api/analysis.py` and `tests/api/test_analysis.py`
  were already present on disk when this task was dispatched. All 18 tests
  pass (8 death paths + 4 happy paths + 6 DC-4 parametrized). The full
  test suite of 852 tests passes with no regression.

  Death case coverage:
  - DC-1 (cross-project leak): DT-3.1 confirms 404 for `project_id=B` on
    a session in project A. Implementation: `report.project_id != project_id`
    check in `session_analysis_detail` and `session_flags`.
  - DC-3 (stale ETag): DT-3.4/3.5/HP-3.4 confirm ETag changes on
    flag insert and 304 on unchanged data. `_summary_etag` spans all 4
    tables (behavior_flags, directives, session_reports, analysis_runs).
  - DC-6 (200+empty vs 404): DT-3.2 confirms 404 with "not analyzed"
    for a session missing a session_reports row.
  - DC-7 (trends LIMIT scope): DT-3.3 confirms 10 buckets for limit=10
    with 50 sessions × 5 flags — the LIMIT is on the session subquery.

  Schema-as-contract: `BehaviorFlagOut` is exported in `__all__` and
  imported directly in the test file (`from secondsight.api.analysis
  import BehaviorFlagOut`). DT-3.7 inspects its JSON schema to confirm
  `confidence: Literal["high", "medium", "low"]` is present.

  One known concern: the `as_of` field in `AnalysisSummary` uses
  `datetime.now()` (naive, local tz). If the server runs in a non-UTC
  timezone, the value will be wrong. This is consistent with the existing
  storage convention (naive = UTC) but should be corrected to
  `datetime.now(UTC)` in a follow-up.

resolved_items:
  - original_section: silent_failure_conditions
    original_description: >
      `as_of` timestamp in `AnalysisSummary` is `datetime.now()` (naive,
      local timezone).
    resolution: >
      Decided NOT to fix within task scope after review: the existing
      codebase pattern (events_table, session_reports_table, directives_table)
      uses tz-naive datetimes throughout and documents the "naive = UTC"
      convention in `observation_schemas.py`. Changing `as_of` alone would
      create an inconsistency (one UTC-aware field in an otherwise
      tz-naive API surface). Fixing this properly requires a project-wide
      tz-normalization pass, which is out of task scope. Registered as
      debt_location instead.
