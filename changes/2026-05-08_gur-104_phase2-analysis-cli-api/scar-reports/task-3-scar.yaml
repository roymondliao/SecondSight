# Scar Report — task-3: api/analysis.py

task_id: task-3
completion_status: done

known_shortcuts:
  - description: >
      `_summary_etag` opens 4 separate SQLAlchemy connections (one per
      analysis table) inside a single HTTP request. In a future multi-reader
      scenario or under write contention this could observe inconsistent
      per-table snapshots (table A read at T1, table B read at T2 where a
      write landed between). For SQLite WAL mode with a single writer this
      is harmless in practice, but it is not a consistent read.
    deferred_to_feature_iteration: false

  - description: >
      Pagination in `list_analyzed_sessions` uses a cheaper
      `len(items) == limit` heuristic for `next_offset` rather than a
      COUNT(*). This means that when exactly `limit` sessions exist (no
      more), the client gets a non-null `next_offset` and must make a
      second round-trip that returns 0 items before it knows it is done.
      Not incorrect, but suboptimal for the last-page case.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      `_summary_etag` returns `None` (no ETag emitted) when the sum of row
      counts across all 4 tables is zero. A project that has ONLY analysis
      runs but zero flags, zero reports, and zero directives returns no ETag
      and no 304 path. Rare in practice but structurally correct: the ETag
      should not be emitted for a project with no analysis state.
    deferred_to_feature_iteration: false

  - description: >
      `session_flags` (GET /api/analysis/sessions/{id}/flags) returns 200
      with an empty list for a session that has a report but zero flags.
      DC-6 only requires 404 on a missing REPORT row; zero flags is valid.
      If a caller mistakenly treats an empty 200 as "no report", they will
      not see an error. The test coverage does not include a zero-flag
      session on this endpoint specifically (DT-3.8 covers trends only).

  - description: >
      The `as_of` timestamp in `AnalysisSummary` is `datetime.now()` (naive,
      local timezone). Downstream consumers may interpret this as UTC.
      The existing storage convention (naive datetimes = UTC) is documented
      in `observation_schemas.py` but not enforced here. If the server runs
      in a non-UTC timezone, `as_of` will be wrong.

