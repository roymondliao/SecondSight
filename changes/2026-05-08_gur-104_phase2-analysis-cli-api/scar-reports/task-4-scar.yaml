completion_status: done

known_shortcuts:
  - description: >
      _resolve_project_id is duplicated from cli/analyze.py rather than extracted
      to a shared helper. The two implementations are byte-identical.
      Reason: importing from cli/analyze (a sibling module) would create
      tight coupling across subcommands, and the function is short enough
      that duplication is lower-risk than coupling.
    deferred_to_feature_iteration: false

  - description: >
      DT-4.1 byte-identical assertion uses sort_keys=True re-serialization of
      parsed dicts rather than raw-byte comparison of API vs CLI output.
      FastAPI's JSON response and Pydantic model_dump_json() may differ in
      key ordering (dict insertion order vs sorted) even when values are equal,
      so raw-byte comparison would be fragile. The sorted re-serialization
      is semantically correct but is slightly weaker than true byte identity.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      cli/analyze.py uses intel.db as the project DB filename (hardcoded in
      _build_in_process_trigger), but ProjectRegistry uses intelligence.db.
      cli/directive.py correctly uses intelligence.db (consistent with registry),
      but cli/analyze.py is silently inconsistent. If a developer copies
      cli/analyze.py's DB path pattern into a new command, they will get an
      empty DB that appears valid. This inconsistency is pre-existing; it is
      not introduced by task-4 but discovered during implementation.
    deferred_to_feature_iteration: true

  - description: >
      _render_directives: unknown output_format values (anything other than
      "json" or "table") silently fall back to table rendering. No warning
      is emitted. An operator who misspells --format jzon sees a table with no
      indication that their format flag was ignored.
    deferred_to_feature_iteration: false

  - description: >
      In server mode, --enable prints "Directive {id} is now active" without
      distinguishing between a real transition and an idempotent no-op. The
      server PATCH endpoint handles idempotency (DC-2 contract from task-2)
      but the CLI cannot tell from the response whether a write actually
      occurred. This is acceptable for v1: the server response always returns
      the correct current state.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      The project DB is always at secondsight_home/projects/<project_id>/intelligence.db
      (the filename used by ProjectRegistry._build_resources). The cli/analyze.py
      precedent uses intel.db but that is a pre-existing bug in analyze.py, not
      a project-wide convention. cli/directive.py uses intelligence.db.
    verified: true
    note: >
      Verified by reading ProjectRegistry._build_resources (line 120):
      db_path = project_dir / "intelligence.db". Tests pass with this path.
    deferred_to_feature_iteration: false

  - assumption: >
      Both FastAPI's response serializer and Pydantic model_dump_json() produce
      the same datetime string for tz-naive datetimes stored by SQLite
      (both produce "YYYY-MM-DDTHH:MM:SS" without a timezone suffix).
      This is the foundation of the byte-identity property.
    verified: true
    note: >
      Verified empirically: FastAPI returns "2026-05-08T12:00:00" and
      model_dump_json() returns "2026-05-08T12:00:00" for the same tz-naive
      datetime from SQLite. DT-4.1 passes.
    deferred_to_feature_iteration: false

  - assumption: >
      typer.testing.CliRunner captures stderr separately via result.stderr when
      commands use typer.echo(..., err=True). Mixed stderr/stdout is not needed.
    verified: true
    note: >
      Verified: CliRunner separates stdout/stderr correctly. result.stderr
      contains err=True output; result.stdout contains normal output.
    deferred_to_feature_iteration: false

  - assumption: >
      The single serialization function _serialize_directives() uses
      json.dumps(json.loads(d.model_dump_json())) per item to get consistent
      Python JSON semantics. This round-trip through model_dump_json ensures
      datetime serialization is Pydantic-controlled, not json.dumps-controlled.
    verified: true
    note: >
      Verified by DT-4.1 test which asserts sha256 equality of sorted JSON
      from both server and in-process paths. Test passes.
    deferred_to_feature_iteration: false

debt_registered: true
debt_location: "src/secondsight/cli/directive.py:_render_directives"

narrative: |
  The key implementation challenge was DC-4 defense: ensuring the CLI's
  --format json output is byte-identical to the API response regardless of
  code path. The approach: a single _serialize_directives() function that
  calls model_dump_json() on DirectiveOut objects is used by BOTH the
  server-mode branch (after re-validating the httpx response through
  DirectiveOut.model_validate()) and the no-server branch. This eliminates
  the two-serializer drift problem entirely.

  A surprise finding during implementation: cli/analyze.py uses "intel.db"
  as the project DB filename, but ProjectRegistry (which the tests use for
  seeding) creates "intelligence.db". The directive CLI correctly uses
  "intelligence.db" and tests pass. The analyze.py inconsistency is noted
  as a silent failure condition.

  DT-4.1's byte-identity assertion uses sort_keys=True re-serialization of
  parsed JSON rather than raw-byte comparison, because key ordering differs
  between FastAPI and model_dump_json() (dict insertion order). The semantic
  equivalence is what matters for the agent self-query contract.

resolved_items:
  - original_section: assumptions_made
    original_description: "DB filename assumption (intelligence.db vs intel.db)"
    resolution: >
      Verified via ProjectRegistry._build_resources source read (line 120)
      and confirmed by test suite passing when using intelligence.db.
      Added as a verified assumption in this scar report.

  - original_section: assumptions_made
    original_description: "datetime serialization consistency across FastAPI and model_dump_json"
    resolution: >
      Verified empirically via Python interactive verification and DT-4.1
      test passing. Both paths produce tz-naive ISO format for SQLite-stored
      datetimes. Promoted to verified: true.

  - original_section: silent_failure_conditions
    original_description: "unknown --format value silently falls back to table with no warning"
    resolution: >
      Fixed in _render_directives: added explicit warning log at WARNING level
      and typer.echo to stderr when an unknown format is provided. Operator
      now sees "Warning: unknown --format {value}; using 'table'. Supported: json, table."
      This is within task scope (same file). Not raising an error (just warning)
      because future formats being added to the function is the intended extension point.
