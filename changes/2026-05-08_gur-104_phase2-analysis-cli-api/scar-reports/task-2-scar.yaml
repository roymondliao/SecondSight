narrative: |
  The biggest scar surface for task-2 is the read-then-write
  idempotency check. The implementation does it in two SQLite
  connections (one for `get_by_id`, another for `update_status`)
  rather than in a single transaction. SQLite serialises writes
  per-connection so the practical race window is tiny, and the
  per-request Pydantic validator + the lifecycle re-check inside
  `DirectivesRepository.update_status` mean the worst-case outcome
  of a race is "one PATCH response returns the pre-other-write
  state", not corruption. Recorded as `silent_failure_conditions`
  with `deferred_to_feature_iteration: true` because closing it
  properly requires extending the repository's transaction surface
  (a method like `compare_and_update_status`) — that is a cross-task
  concern, not local to GUR-104.

  The OpenAPI Phase 3 cache caveat (DG-2.1) is delivered via the
  `description=` kwarg on `@router.patch(...)` and surfaces in
  `/openapi.json`. DT-2.6 verifies it. This is the single most
  operationally important behavior in task-2 because a soft-disable
  PATCH that "succeeds" but doesn't take runtime effect until
  GUR-105 ships is exactly the operator-pain shape the API docs
  must surface. Without it, an operator who PATCHes a misfiring
  directive and sees 200 OK but sees the directive keep firing
  thinks PATCH is broken — they don't know the cache layer hasn't
  been built yet.
