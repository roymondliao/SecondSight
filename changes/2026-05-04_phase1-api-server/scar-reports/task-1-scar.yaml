narrative: >
  The core risk in this task was the interaction between three independent
  concerns: (1) asyncio.Lock correctness under concurrent first-requests,
  (2) POSIX fork safety in the daemon, and (3) PID-file stale-kill protection.

  Iteration 2 (fix-pass) addressed six Critical and Important findings from
  yin and quality reviewers:

  C1: The log-open fallback in daemonize() now emits a stderr diagnostic before
  falling back to /dev/null. This surfaces the failure to the terminal that
  ran `serve --daemon` rather than silently swallowing it. DT-7 verifies this.

  C2: stop_daemon() now returns StopOutcome (enum) instead of bool. This
  eliminates the TOCTOU window in _do_stop (no re-query of daemon_status needed)
  and produces honest messages for all four distinct outcomes. DT-8 verifies
  the SIGKILL path returns STOPPED_SIGKILL specifically.

  I1: /health renamed status->liveness, ok->alive to declare the contract
  (liveness probe, not readiness probe).

  I2: assert pid is not None replaced with explicit RuntimeError raise.

  I3: workers=1 explicit in uvicorn.run() — prevents WEB_CONCURRENCY env var
  from silently setting workers>1 and breaking the single-process registry.

  I4/I5: Dead code deleted (unused asyncio.Event, unused registry fixture).

  I6: Fast-path comment in registry.py now co-locates both GIL+event-loop
  assumptions with the code they justify.

  I7: AppState frozen dataclass declares the typed contract for app.state,
  replacing four separate attribute assignments.

  I8: uvicorn/create_app imports lifted to module top in cli/serve.py.

  Additionally: pre-existing mypy error in storage/raw_trace_store.py
  (same tmp_path=None ownership idiom) was fixed to make mypy clean.

