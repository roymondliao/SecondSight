step0_prerequisite_questions:
  - q: "Most-wanted impl path to NOT take?"
    a: >
      Monolithic serve.py with PID management baked in, a single module-level
      asyncio.Lock protecting the entire registry dict for all operations, and
      the cmdline identity check using only 'secondsight' (no subcommand
      requirement). Avoided — instead: clean separation of daemon.py /
      registry.py / server.py; per-project locks with a secondary guard-lock
      only for the brief 'insert new project_id' window; cmdline identity
      requires both 'secondsight' AND 'serve' (or 'uvicorn' + 'secondsight')
      to prevent false matches against the test runner.

  - q: "When should this NOT be implemented?"
    a: >
      If uvicorn were run in multi-worker mode (--workers > 1), the
      asyncio.Lock-based per-project registry would provide no protection
      across worker processes — each worker would have its own registry with
      its own locks, and concurrent first-inits could create multiple DBEngine
      instances against the same SQLite file. Phase 1 is single-process
      (localhost daemon) and the multi-worker scenario is explicitly out of
      scope; the assumption is documented.

  - q: "If silent failure occurs, who notices first and when?"
    a: >
      Three critical silent-failure paths:
      (1) daemonize() on macOS: if the double-fork + event-loop interaction
      causes the child to crash silently, the first person to notice is a user
      running 'serve status' and finding running=False with no error in the log.
      Damage: all hook events accumulate in fallback JSONL silently, potentially
      30+ days before the user checks why there's no analysis. Mitigation: log
      file is set up before on_child() runs; startup errors print to stderr
      (redirected to log).
      (2) Concurrent-init race (DT-2): if two DBEngine instances are created for
      the same project_id on a slow filesystem, SQLite WAL may produce an
      IntegrityError visible only on the second write. First discoverer: a user
      seeing 'UNIQUE constraint failed' in the analysis phase.
      (3) Stale-PID kill (DT-1): if stop_daemon kills an unrelated process, the
      first person to notice is that process's user — immediate, catastrophic,
      and completely unexpected.

known_shortcuts:
  - id: KS-1
    description: >
      ProjectRegistry never evicts entries. Memory grows linearly with unique
      project_ids seen since server start. For Phase 1 (single-project primary
      use case) this is acceptable.
    deferred_to_feature_iteration: true
    rationale: "Eviction policy requires a Phase 2 LRU/TTL design decision."

  - id: KS-2
    description: >
      uptime_seconds in DaemonStatus is always None. We do not write a
      start-time file alongside the PID file, so uptime cannot be computed
      from daemon_status() alone.
    deferred_to_feature_iteration: true
    rationale: "Phase 2 can add a .start-time file alongside server.pid."

  - id: KS-3
    description: >
      Two concurrent 'serve --daemon' calls can race: the second overwrites
      the first PID file. The old daemon keeps running but stop/status can
      no longer address it.
    deferred_to_feature_iteration: true
    rationale: >
      Phase 1 use case is a single user on a single machine; PID-file
      locking (advisory flock) is deferred. A guard checking for running
      daemon before writing PID is in _do_daemon() but has a TOCTOU window.

silent_failure_conditions:
  - id: SF-1
    description: >
      daemonize() on macOS: os.fork() after an asyncio event loop has been
      created is undefined behavior on some platforms. If called from within
      an already-running event loop the child may hang or crash silently.
    severity: medium
    mitigation: >
      daemonize() is called from the Typer CLI command (before uvicorn/asyncio
      starts). The serve.py CLI explicitly does NOT start an event loop before
      calling daemonize(). macOS-targeted CI smoke test deferred to Phase 2.
    deferred_to_feature_iteration: true

  - id: SF-2
    description: >
      If secondsight_home is not writable, the error surfaces during
      ProjectRegistry._build_resources() on the first request, not at
      server startup. A user sees an HTTP 500 on the first hook call, not
      a clean startup error.
    severity: low
    mitigation: >
      create_app() validates that secondsight_home is absolute. Directory
      creation (mkdir) is attempted at ProjectRegistry.__init__() time, which
      surfaces at startup. Permission errors on subdirectories (projects/)
      are deferred to first-request.

  - id: SF-3
    description: >
      /health returns 200 even if the underlying registry is in a bad state
      (e.g. secondsight_home directory was deleted after startup). The health
      endpoint does not probe the registry's health, only the uptime counter.
    severity: low
    mitigation: >
      Phase 1 health endpoint is intentionally lightweight (latency contract
      for the hook script). /health is now explicitly a liveness probe only
      (renamed status->liveness, value ok->alive). Deep health checks deferred to Phase 2.
    deferred_to_feature_iteration: true

  - id: SF-4
    description: >
      If the log directory (~/.secondsight/logs/) does not exist at daemonize()
      time AND mkdir fails (permissions), the daemon child falls back to
      /dev/null for logging — errors are swallowed silently.
    severity: medium
    mitigation: >
      daemonize() calls log_path.parent.mkdir(parents=True, exist_ok=True)
      BEFORE the fork. If this raises, the exception surfaces in the parent
      before any fork happens — fail-fast path is safe. The only gap is a
      permission error on a sub-path that appears only after the fork (race
      with another process removing the directory). When the child's log-open
      fails, it now emits a diagnostic to the original stderr BEFORE falling
      back to /dev/null (C1 fix, iteration 2).

assumptions_made:
  - id: A-1
    description: >
      Single asyncio event loop / single uvicorn worker. asyncio.Lock is NOT
      cross-process safe. Multi-worker deployments break the registry.
    verified: true
    verification_method: >
      serve.py calls uvicorn.run() with explicit workers=1 (added in iteration 2
      per I3). The registry fast path comment now documents both assumptions:
      (1) single event loop, (2) CPython GIL atomicity for dict.__contains__.
      Documented in serve.py docstring.

  - id: A-2
    description: >
      secondsight_home is supplied as an absolute Path by the CLI layer.
      Registry validates this at __init__() time.
    verified: true
    verification_method: >
      ProjectRegistry.__init__() raises ValueError on non-absolute path.
      create_app() also validates. Tests use tmp_path (absolute).

  - id: A-3
    description: >
      project_id values arriving at registry.get() are valid path components.
      The registry uses project_id directly as a directory name under
      secondsight_home/projects/.
    verified: false
    verification_method: >
      No validation of project_id characters in Phase 1. The adapter layer
      (Phase 1.3, task-3) is responsible for this validation before calling
      registry.get(). If a malicious/malformed project_id reaches the registry,
      _build_resources() could create unexpected directories. Mitigation
      deferred to task-3.
    deferred_to_feature_iteration: true

  - id: A-4
    description: >
      "secondsight serve" or "uvicorn ... secondsight" appearing in a process
      cmdline is a sufficient identity signal for cmdline_match. A process
      running another secondsight command (e.g. 'secondsight sync') would match
      falsely. This is a fail-safe-direction tradeoff: false negatives (not
      killing a real daemon) are preferred over false positives (killing
      unrelated processes).
    verified: true
    verification_method: >
      DT-1 test verifies that 'sleep 60' (no secondsight/serve in cmdline)
      returns cmdline_match=False. The test was adjusted to use an
      unambiguous subprocess because the RTK/zsh wrapper in the CI environment
      embeds the full shell command in the ps output, causing false positives
      with simpler checks.

