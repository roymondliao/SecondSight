step0_prerequisite_questions:
  - q: "Most-wanted impl path to NOT take?"
    a: >
      A single global SessionTracker with a complex WarmStart closure that
      dynamically looks up the per-project EventsRepository on every cold-start
      call. Avoided — instead: a per-project SessionTracker cache in AppState
      (get_or_create_tracker()), mirroring ProjectRegistry's two-level locking
      pattern. Each tracker's WarmStart closure closes over the specific project's
      events_repository at creation time, keeping the warm_start signature as
      (session_id) -> int | None without needing project_id.

  - q: "When should this NOT be implemented?"
    a: >
      If the EventType enum were open (i.e., adapters could define new event types
      not in the closed enum), then validating event_type against the enum would
      block real adapters. This implementation should NOT be deployed before P1-9..P1-11
      adapters land if those adapters use event types outside the current enum.
      Currently the enum is closed (11 values, SD §3.7.2) and the 422 on unknown
      types is correct behavior. If a future adapter needs a new event type, the
      enum must be extended BEFORE the adapter is deployed.

  - q: "If silent failure occurs, who discovers it and when?"
    a: >
      Three critical silent-failure paths:
      (1) add_done_callback missing or swallowing exceptions: pipeline.ingest fails
      (FS write error, disk full), nobody knows. The user's session is processed
      but events aren't stored. Discovery: user runs Phase 2 analysis and finds
      missing events. Damage: weeks of lost observation data before anyone checks
      logs. Mitigation: done_callback is wired and tested by DT-3.
      (2) Per-project SessionTracker cache races: two parallel cold-start requests
      for the same project get different trackers, both call warm_start independently,
      and independently increment segment_index. Result: non-monotonic segment_index
      in DB silently. Discovery: Phase 2 analysis finds duplicate segment_index values.
      Damage: permanent data quality loss. Mitigation: two-level locking in
      get_or_create_tracker() (same pattern as ProjectRegistry.get()).
      (3) Bounded drain timeout at shutdown: if an ingest task takes >1s, it is
      cancelled. The FS write (Step 1 of pipeline) is always done before the DB write
      (Step 2), so the raw trace exists. The DB row may be missing. Discovery:
      the next sync (P1-13) would attempt backfill, but if the cancelled task was
      mid-DB-write, the sync_log may not have recorded the failure. Mitigation:
      the 1s timeout is documented; FS-first contract limits damage to DB-only loss.

known_shortcuts:
  - id: KS-1
    description: >
      IdentityNormalizer is the only registered normalizer. Without P1-9..P1-11
      adapters, the server can only ingest pre-normalized payloads with agent="test".
      Any hook from a real claude-code agent will get 422 (NoNormalizerError).
    deferred_to_feature_iteration: true
    rationale: >
      P1-9..P1-11 are separate changes. IdentityNormalizer is explicitly documented
      as a baseline/test stub. The 422 is the correct failure mode — it surfaces
      the missing adapter rather than silently dropping or mangling the event.

  - id: KS-2
    description: >
      Per-project SessionTracker cache (AppState._tracker_cache) duplicates the
      two-level locking pattern from ProjectRegistry.get() and
      SessionTracker._get_or_create_state(). Three sites now share the same
      pattern without a shared utility. Changes to locking logic must be applied
      to all three sites.
    deferred_to_feature_iteration: true
    rationale: >
      Phase 2 / feature-iteration consolidation into _LazyCacheWithLocking[K, V]
      per the cross-reference comments already in registry.py:84 and tracker.py:156.
      Cross-reference comment added at AppState.get_or_create_tracker() as the
      third site.

  - id: KS-3
    description: >
      AppState is no longer a frozen dataclass (changed from task-1's frozen
      dataclass to a mutable class). The inflight_tasks set and tracker cache
      must be mutated at runtime. The scalar fields (registry, startup_time,
      etc.) are write-once by convention, not by enforcement.
      Note: the prior WeakSet was replaced with a strong-reference set + discard
      callback in fix-pass iteration-2 (C1).
    deferred_to_feature_iteration: false
    rationale: >
      Accepted as correct. The original frozen dataclass was incompatible with
      set mutation. The write-once convention is documented in the class
      docstring. Mypy + dataclass slots would enforce it, but that's Phase 2.

  - id: KS-4
    description: >
      _is_safe_id() allows dots in project_id/session_id (except pure-dot sequences
      like '.' and '..'). An attacker could still use dots to create directories
      like 'a.b.c' which is technically a valid path component. The check prevents
      directory traversal but not all possible path-injection scenarios.
    deferred_to_feature_iteration: true
    rationale: >
      Phase 1 is localhost-only (no auth surface). The check prevents the primary
      traversal risk (/ and ..). Stricter validation (e.g. hostname-style characters
      only) is a security hardening item for Phase 2 security review.

silent_failure_conditions:
  - id: SF-1
    description: >
      Bounded-drain timeout (1s) at shutdown is arbitrary. A burst of slow ingests
      right before shutdown (e.g. writing large payloads to a slow FS) will be
      cancelled. The cancelled task's done_callback logs a CancelledError (not ERROR).
      The raw trace file may not exist if the FS write was mid-flight when cancelled.
    severity: medium
    mitigation: >
      FS-first contract: ObservationPipeline.ingest() does the FS write in Step 1
      before DB INSERT in Step 2. If the FS write completes before cancellation,
      the raw trace is safe and backfill (P1-13) recovers the DB row. If FS write
      is cancelled mid-flight, the atomic-write contract in RawTraceStore ensures
      no partial file exists (tmpfile is unlinked on error). Acceptable for Phase 1.
    deferred_to_feature_iteration: true

  - id: SF-2
    description: >
      ON CONFLICT DO NOTHING on event_id silently drops duplicate-id ingests at
      the storage layer. This is correct for retry idempotency, but masks a buggy
      adapter that reuses the same event_id for different events. The
      UNIQUE(session_id, sequence_number) constraint catches the sequence_number
      reuse case, but same-id-same-sequence events are silently deduplicated.
    severity: low
    mitigation: >
      Documented in module docstring and test DT-8. The storage layer contract
      (insert idempotent on id) is the correct behavior. A buggy adapter reusing
      event_ids with the same sequence_number would be caught by
      UNIQUE(session_id, sequence_number). If sequence_number also matches, the
      second event is identical by ID and silently dropped — acceptable.
    deferred_to_feature_iteration: false

  - id: SF-3
    description: >
      request.client.host is not validated against 127.0.0.1. The overview says
      localhost-only bind (uvicorn enforces), but a misconfigured reverse proxy
      forwarding external traffic would bypass this. No defense-in-depth check.
    severity: low
    mitigation: >
      Uvicorn's host binding is the enforcement layer. Defense-in-depth host
      validation deferred to Phase 2 security review per task spec.
    deferred_to_feature_iteration: true

  - id: SF-4
    description: >
      If AppState.get_or_create_tracker() is called concurrently for the same
      new project_id from multiple coroutines before the tracker is cached,
      the two-level lock prevents double-creation. However, if the asyncio event
      loop switches between the lock-guard and the per-project-lock acquisition,
      a third coroutine could arrive and observe an inconsistent state during
      the narrow window before _tracker_cache is populated. CPython's GIL
      makes dict.__contains__ atomic, mitigating this, but the assumption is the
      same as ProjectRegistry (single event loop + CPython GIL).
    severity: low
    mitigation: >
      Same mitigation as ProjectRegistry: single event loop (workers=1 explicit),
      CPython GIL, and two-level locking with double-check inside the per-project
      lock. Death test for concurrent tracker creation was considered but scoped
      out (it would mirror test_death_concurrent_init_race_single_dbengine from
      task-1). Accepted given the same assumptions as registry.
    deferred_to_feature_iteration: false

  - id: SF-5
    description: >
      The loguru-to-caplog bridge in propagate_loguru_to_caplog fixture adds a
      loguru sink and logs to the root stdlib logger. In a test that runs loguru
      from a background thread (via asyncio.to_thread), the caplog fixture may
      not capture records emitted after the test's caplog context is torn down.
      DT-3 and DT-6 use time.sleep() to give background tasks time to complete;
      this is a timing heuristic, not a guarantee.
    severity: low
    mitigation: >
      Tests use time.sleep(0.15-0.2s) which is 100-200x longer than typical
      ingest latency in CI. Acceptable for Phase 1. Phase 2 tests could use
      asyncio.Event-based synchronization for deterministic capture.
    deferred_to_feature_iteration: false

assumptions_made:
  - id: A-1
    description: >
      body.agent is the canonical agent identifier; any X-SecondSight-Agent
      header is ignored. When both are present, body wins.
    verified: true
    verification_method: >
      Route handler only reads envelope.agent (from request body). No header
      parsing. This is the documented decision in the overview.md. Unit test
      test_unit_missing_agent_field_returns_422 verifies 422 when body.agent
      is missing (header would not substitute).

  - id: A-2
    description: >
      SessionTracker.bind() signature: tracker is per-project (one tracker per
      project_id, shared across all sessions of that project). The WarmStart
      closure closes over the per-project EventsRepository at tracker-creation
      time, so warm_start(session_id) correctly queries the right project's DB.
    verified: true
    verification_method: >
      get_or_create_tracker() builds the WarmStart closure inside the slow-path
      creation block, after `resources.events_repository` is available. The closure
      captures `repo` by reference (local variable in the outer scope of the
      async function, which is stable). Verified by happy-path test: event stored
      in the correct project's DB after tracker bind + ingest.

  - id: A-3
    description: >
      EventType enum is closed (11 values in SD §3.7.2). Unknown event_type strings
      return 422. P1-9..P1-11 adapters will use existing enum values.
    verified: true
    verification_method: >
      event.py defines EventType with 11 values. handle_hook() uses EventType(event_type)
      and catches ValueError → 422. DT-2 (test_death_unknown_event_type_returns_422)
      verifies 422 for unknown event_types. DT-4 verifies 404/422 for path traversal.

  - id: A-4
    description: >
      asyncio.create_task() is called inside an async handler running on a live
      event loop. The task is scheduled on the same loop. asyncio.wait() in the
      shutdown drain correctly awaits these tasks (they share the loop).
    verified: true
    verification_method: >
      DT-7 (test_death_shutdown_drains_inflight_tasks) verifies the drain works:
      a slow ingest (0.2s) is started, the app shuts down, and either completed_flag
      or cancelled_flag is set — never both empty (never silently abandoned).

  - id: A-5
    description: >
      TestClient (starlette's synchronous ASGI test client) runs the ASGI app in
      a thread with its own event loop. asyncio.create_task() inside the handler
      schedules tasks on that thread's event loop. The TestClient's context manager
      exit (lifespan shutdown) runs on the same loop, so asyncio.wait() for
      inflight_tasks can correctly await those tasks.
    verified: true
    verification_method: >
      DT-7 passes. DT-1 passes (blocking pipeline: response returns before ingest
      completes). The asyncio.wait() in lifespan shutdown successfully awaits
      tasks that were created by handlers running on the test client's loop.

  - id: A-6
    description: >
      strong-reference set[asyncio.Task] correctly tracks in-flight tasks.
      Each task registers a discard done_callback so completed tasks are removed
      automatically; the set never accumulates completed tasks. This replaced the
      prior WeakSet implementation (fix-pass iteration-2: C1).
    verified: true
    verification_method: >
      DT-C1 (test_death_inflight_set_tracks_tasks_and_drains): POSTs 5 events
      against a gated pipeline, snapshots len(state.inflight_tasks)=5 before
      gate release, then asserts len=0 after tasks complete. This catches both
      halves: strong-reference (snapshot=5) and discard callback (drain=0).
      DT-7 validates the shutdown drain still works with the strong-reference set.

