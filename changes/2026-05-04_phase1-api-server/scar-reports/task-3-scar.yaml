  - >
    Fix-pass S1 (redundant EventType re-validation comment): Added defensive
    comment above `EventType(event_type)` in IdentityNormalizer.normalize():
    "defensive: re-validate in case the Normalizer is invoked outside the
    route-handler context." Chose option B (comment) over removing the call
