narrative: >
  The core structural risk in this task was the latency contract: the handler
  must return before ingest completes. Death test DT-1 makes this structurally
  inspectable via a blocking pipeline — if create_task is replaced with await,
  the test deadlocks. The done_callback (DT-3) catches the other half: asyncio
  silently swallows task exceptions on GC without it.

  The per-project SessionTracker cache design was chosen over a single-tracker
  design to keep WarmStart signatures clean: each tracker's WarmStart closes over
  its project's EventsRepository, so warm_start(session_id) queries the correct
  project's DB without needing project_id as an argument. The cost is a third
  site of the two-level locking pattern (cross-referenced in all three locations).

  AppState was converted from a frozen dataclass to a regular class because
  WeakSet mutation requires mutability. The write-once convention for scalar
  fields is documented but not enforced by the type system (KS-3 — accepted).

  The loguru-to-caplog bridge in the propagate_loguru_to_caplog fixture was
  non-trivial: loguru does not propagate to stdlib logging by default. The
  fixture adds a loguru sink that logs to the named stdlib loggers, which caplog
  then intercepts via the root logger. This allows DT-3 and DT-6 to assert on
  loguru error output via caplog.

  project_id path-safety validation (_is_safe_id) was added to handle the
  debt carried from task-1 (A-3: registry.get() accepts any project_id as
  a directory name). The check prevents '/', '..', '\\', and null bytes.
  Dots are allowed (to support IDs like 'com.company.project'). This is
  documented as KS-4 (permissive allowlist).

