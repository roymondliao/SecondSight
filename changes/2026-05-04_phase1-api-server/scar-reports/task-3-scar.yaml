deferred_items:
  - id: DFR-1
    description: >
      Three-site _LazyCacheWithLocking consolidation: AppState.get_or_create_tracker,
      ProjectRegistry.get, and SessionTracker._get_or_create_state all implement
      the same two-level locking pattern without sharing code.
    deferred_to_feature_iteration: true
    rationale: >
      Cross-cutting change touching task-1's registry.py and task-2's tracker.py.
      Cross-reference comments added at all three sites. Phase 2 consolidation
      per review directive from tasks 1 and 2.

  - id: DFR-2
    description: >
      AppState scalar fields (registry, startup_time, etc.) are mutable but
      intended write-once. Enforcement via dataclass(frozen=True) is incompatible
      with WeakSet mutation. Could use __slots__ + __setattr__ override, or
      a typed namedtuple for scalar fields alongside a mutable carrier.
    deferred_to_feature_iteration: true
    rationale: >
      Cosmetic / enforcement concern. Phase 2 can introduce a proper frozen
      sub-struct for scalar fields if the pattern grows.

  - id: DFR-3
    description: >
      Strict project_id/session_id character allowlist (dots allowed, which
      permits 'a..b' style IDs). Phase 2 security review should tighten to
      hostname-style characters only ([A-Za-z0-9-_]).
    deferred_to_feature_iteration: true
    rationale: >
      Phase 1 is localhost-only. The current check prevents primary traversal
      risk. Stricter validation is a Phase 2 hardening item.

  - id: DFR-4
    description: >
      test_death_latency_contract_handler_does_not_await_ingest uses
      asyncio.wait_for(asyncio.to_thread(...), timeout=0.2) to enforce the latency
      contract. The spec requires 50ms; 200ms is the documented bound due to
      TestClient ASGI bridge cold-start overhead (50-80ms on CI runners).
      pytest-timeout would enforce it unconditionally but is not a dependency.
    deferred_to_feature_iteration: true
    rationale: >
      pytest-timeout is not in pyproject.toml dependencies. The timeout was
      tightened from 500ms to 200ms in fix-pass iteration-2 (I4). Further
      tightening to 50ms requires either pytest-timeout or a non-TestClient
      async approach. Phase 2 hardening item.

  - id: DFR-5
    description: >
      _LazyCacheWithLocking[K, V] shared utility: three sites (registry.py,
      tracker.py, server.py) still duplicate the two-level locking pattern.
      All three cross-reference comments now name all three sites.
    deferred_to_feature_iteration: true
    rationale: >
      Cross-cutting change touching task-1's registry.py and task-2's tracker.py.
      Phase 2 consolidation. Already tracked as KS-2 and DFR-1. Fix-pass I1
      updated all three cross-reference comments to say "ALL THREE sites".

  - id: DFR-6
    description: >
      Strict project_id/session_id character allowlist: control chars are now
      rejected (fix-pass I6), but dots are still allowed (KS-4). Phase 2 should
      tighten to hostname-style characters only ([A-Za-z0-9-_]).
    deferred_to_feature_iteration: true
    rationale: >
      Phase 1 is localhost-only. The I6 fix hardened the boundary significantly.
      Full allowlist tightening is a Phase 2 security review item (KS-4).
