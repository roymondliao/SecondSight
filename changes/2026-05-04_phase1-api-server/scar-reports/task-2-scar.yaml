step0_prerequisite_questions:
  - q: "Most-wanted impl path to NOT take?"
    a: >
      A simple dict[session_id, SessionState] protected by a single global
      asyncio.Lock. Avoided — a global lock would serialize all concurrent
      bind() calls across ALL sessions, destroying hot-path performance for
      multi-session workloads. Implemented instead: per-session asyncio.Lock
      (same two-level locking idiom as ProjectRegistry), with a guard-lock
      only for the brief "create lock for new session" window.

  - q: "When should this NOT be implemented?"
    a: >
      If uvicorn is run with --workers > 1, this tracker becomes incorrect:
      each worker maintains its own _sessions dict, and two workers serving
      the same session_id would independently increment segment_index and
      produce duplicate or non-monotonic values. Phase 1 is single-process
      (localhost daemon, workers=1 explicit in serve.py). The assumption is
      documented in the module docstring and the scar report.

  - q: "If silent failure occurs, who discovers it and when?"
    a: >
      Three critical paths:
      (1) Warm-start silent default to 0: if cold-restart silently returns
      segment_index=0, the events table gets overwritten indices. First
      discoverer: a Phase 2 analysis step trying to reconstruct session
      segments — they would see a segment 0 with thousands of events from
      multiple turn contexts. Damage: weeks of session history corrupted,
      with no audit trail. Discovery delay: months (Phase 2 dashboard).
      (2) Stack mismatch swallowed: if sub_agent_end(id=B) after
      sub_agent_start(id=A) silently pops, subsequent events report wrong
      sub_agent_id and depth=0 for the rest of the session. First discoverer:
      someone reviewing sub-agent attribution in the Phase 2 dashboard.
      Damage: silent misattribution of all subsequent events. Discovery delay:
      months (GUR-106).
      (3) Concurrent bind race gap: two concurrent bind(user_prompt) calls
      both read segment_index=N and both write N+1. One event permanently
      gets the wrong index (indistinguishable from a correctly-indexed event
      at query time). Discovery: checking MAX(segment_index) after a session
      and finding it lower than expected. Damage: permanent data quality loss.

known_shortcuts:
  - id: KS-1
    description: >
      SessionTracker memory grows linearly with unique session_ids seen since
      server start. No eviction policy. Both `_sessions` AND `_session_locks`
      grow unboundedly — both dicts accumulate one entry per unique session_id
      seen since server start. Neither is evicted until Phase 2 TTL/LRU.
    deferred_to_feature_iteration: true
    rationale: >
      Phase 1 primary use case is a single-project, single-session workload.
      Eviction requires a TTL/LRU design decision coupled with session_end
      semantics. Deferred to Phase 2 (memory-bounded tracker). Module docstring
      (iteration 2) now explicitly calls out BOTH dicts (F2 fix).

  - id: KS-2
    description: >
      _session_locks dict is never pruned. When reset_session() evicts the
      _sessions entry, the corresponding asyncio.Lock object remains in
      _session_locks. This prevents a concurrent bind() from racing with
      reset_session() to create a second, independent lock for the same
      session. Minor memory cost (one asyncio.Lock object per unique
      session_id seen).
    deferred_to_feature_iteration: false
    rationale: >
      The lock-retention is intentional and documented in reset_session().
      The memory cost is negligible (one Lock object per session). Removing
      the lock on reset would require a drain-then-remove protocol that
      adds significant complexity for marginal gain. Accepted as permanent.

  - id: KS-3
    description: >
      Two-level locking pattern (_get_or_create_state in tracker.py and
      get() in registry.py) is structurally identical but not shared.
      Full DRY fix requires a shared _LazyCacheWithLocking[K, V] utility
      that touches task-1's registry.py — feature-iteration scope.
    deferred_to_feature_iteration: true
    rationale: >
      Cross-reference comments added at both sites (F4 fix). Changes to
      locking logic must be applied to both files until consolidated.
      Deferred to Phase 2 / feature iteration per review directive.

silent_failure_conditions:
  - id: SF-1
    description: >
      Warm-start failure is the most critical silent-failure risk. If
      warm_start raises and the exception were caught + defaulted to 0,
      every post-restart cold-session event would get segment_index=0,
      silently overwriting prior history in any DB write that uses
      segment_index as a monotonic key.
    severity: critical
    mitigation: >
      Implementation explicitly does NOT catch warm_start exceptions.
      The exception propagates to bind(), which propagates to the caller
      (hook router). Death test 5 (test_death_warm_start_failure_does_not_default_to_zero)
      verifies this path. The test also verifies that a failed warm_start
      does not poison the cache with a 0 — a fresh tracker with a working
      warm_start recovers correctly.

  - id: SF-2
    description: >
      Sub-agent stack is NOT reconstructed after server restart. If a
      sub_agent_start event arrived before the restart with no matching
      sub_agent_end, post-restart events look like top-level events
      (depth=0, sub_agent_id=None). Historical DB rows carry the correct
      depth, but live observation after restart loses the nesting context.
    severity: low
    mitigation: >
      Documented as intentional in the WarmStart Protocol docstring (iteration 2
      adds SCOPE NOTE) and task spec. The rationale: nesting is intra-session-LLM-context
      state; a server restart that interrupts an in-flight sub-agent is rare and
      the historical rows already carry the accurate depth. Analysis tools read
      from DB, not from the tracker. Accepted as permanent Phase 1 behaviour.
    deferred_to_feature_iteration: false

  - id: SF-3
    description: >
      reset_session() is non-locking and synchronous. A concurrent bind()
      that has already acquired the per-session lock and incremented
      segment_index will complete normally. A bind() that calls
      _get_or_create_state() AFTER reset_session() removes the _sessions entry
      will cold-start (calling warm_start). The warm_start at that point reads
      MAX(segment_index) from the DB — which may not yet include the event
      from the concurrent bind() (if it hasn't been flushed). This window
      is bounded (DB write happens in ObservationPipeline, which is fire-and-forget
      from the hook router). Result: the post-reset bind() may resume at
      the last known DB segment_index, and the concurrently-written event
      gets a segment_index one higher — monotonicity is preserved.
    severity: low
    mitigation: >
      Death test 4 (test_death_reset_session_db_backed_warm_start) now uses a
      DB-backed WarmStart fixture (iteration 2: F1 fix). The test inserts
      segment_index 1..5 into a real SQLite DB, calls reset_session, then binds
      a user_prompt and asserts segment_index=6 (not 1). This exercises the
      actual SF-3 race window: post-reset bind re-invokes warm_start against
      the DB and resumes from MAX(segment_index)=5. Verified: production code
      _get_or_create_state already handles this correctly (double-check inside
      session_lock re-enters slow path after reset evicts _sessions entry).
    deferred_to_feature_iteration: true

  - id: SF-4
    description: >
      Multi-worker deployment: if uvicorn is started with --workers > 1
      (e.g. via WEB_CONCURRENCY environment variable), each worker process
      has its own SessionTracker. Two workers serving the same session_id
      would independently manage segment_index. The result is
      non-monotonic, duplicated segment indices stored in the DB —
      silently, with no error.
    severity: critical
    mitigation: >
      Phase 1 (task-1) wires uvicorn.run() with explicit workers=1. This
      prevents WEB_CONCURRENCY from silently enabling multi-worker mode.
      The assumption is documented in the module docstring. If the workers=1
      constraint is ever removed, this tracker MUST be replaced with a
      DB-backed counter or a distributed lock before going live.
    deferred_to_feature_iteration: false

assumptions_made:
  - id: A-1
    description: >
      SD §3.7.5/§3.7.6 says segment_index increments on user_prompt only.
      Assumption: session_start does NOT bump segment_index. A session_start
      is a session-level boundary, not a turn boundary.
    verified: true
    verification_method: >
      Read task-2.md spec: "segment_index increments by exactly 1 when the
      next event is a user_prompt. All other event types share the prior
      segment_index." Read Phase 0 event-schema-design.md: session_start maps
      to event_type SESSION_START, distinct from turn boundaries. The unit
      test test_unit_all_event_types_preserve_segment_index explicitly includes
      EventType.SESSION_START in the non-incrementing list and verifies it
      keeps segment_index=0. Confirmed: only user_prompt increments.

  - id: A-2
    description: >
      Single asyncio event loop / single uvicorn worker. asyncio.Lock is NOT
      cross-process safe. SessionTracker state is process-local.
    verified: true
    verification_method: >
      Phase 1 task-1 sets workers=1 explicit in uvicorn.run(). SessionTracker
      module docstring documents both assumptions: (1) single event loop,
      (2) CPython GIL atomicity for dict.__contains__. Death test 3
      (concurrent bind race) verifies per-session lock correctness within
      a single event loop.

  - id: A-3
    description: >
      data["sub_agent_id"] in sub_agent_start/end events is a non-empty string.
      Tracker uses this as the stack element identifier. Empty string is
      explicitly invalid.
    verified: true
    verification_method: >
      bind() raises ValueError if data["sub_agent_id"] is None (missing key)
      OR if it is an empty string OR if it is not a str instance (F5 fix:
      changed from `if not agent_id` to `if agent_id is None` + explicit
      empty-string check). test_unit_empty_string_sub_agent_id_raises
      (iteration 2) verifies empty string raises ValueError with message
      "non-empty sub_agent_id" for both sub_agent_start and sub_agent_end paths.

  - id: A-4
    description: >
      warm_start is called at most once per session per process lifetime
      (unless reset_session() evicts the cache entry). External DB rewrites
      (e.g. backfill) after the tracker has cached a session's segment_index
      will NOT be reflected in the in-memory state.
    verified: true
    verification_method: >
      Documented in module docstring as an explicit design choice.
      test_unit_reset_session_clears_state verifies warm_start is called
      again after reset_session(). The no-invalidation behaviour is accepted:
      DB-backed segment_index reconstruction after backfill requires a tracker
      restart or explicit reset_session() call, which is the correct
      Phase 2 hook for backfill completion.

  - id: A-5
    description: >
      Caller (hook router, task-3) is responsible for validating monotonicity
      of sequence_number in PartialEvent. Tracker does not validate it.
    verified: false
    verification_method: >
      Task-3 (hook router) owns sequence_number assignment. Validated only
      by the DB UNIQUE(session_id, sequence_number) constraint, which raises
      IntegrityError at EventsRepository.insert() time — not a silent failure.
      The tracker cannot validate sequence_number monotonicity without reading
      the DB (defeating the fast-path purpose). Documented as task-3 owned.
    deferred_to_feature_iteration: true

  - id: A-6
    description: >
      The GIL acts as a full memory barrier between coroutines, ensuring the
      fast-path dict read at `if session_id in self._sessions` (tracker.py:167)
      observes the fully-initialized _SessionState written at line 192. A
      free-threaded Python build (PEP 703 / no-GIL) invalidates BOTH the
      GIL atomicity assumption (A-2) AND this memory-ordering assumption.
    verified: true
    verification_method: >
      Documented in module docstring (iteration 2, F3 fix). The no-GIL
      invalidation risk is called out explicitly: "A free-threaded Python
      build (PEP 703 / no-GIL) invalidates BOTH the atomicity and the
      memory-ordering assumption — this code must be redesigned before
      running under a no-GIL interpreter." No test can verify GIL memory
      ordering (it is a CPython implementation guarantee, not observable
      in asyncio tests). The assumption is accepted for CPython + asyncio.

