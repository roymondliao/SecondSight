narrative: >
  The core risk in this task was the warm-start silent-default-to-0 path: if
  warm_start raises and the caller swallows it (defaulting segment_index to 0),
  every post-restart event for that session gets index 0, silently overwriting
  history. This is addressed by NOT catching the warm_start exception anywhere
  in the implementation. Death test 5 verifies this path is red when violated
  and green in the implementation.

  The two-level locking idiom (guard lock + per-session lock) mirrors
  ProjectRegistry's pattern, with the same two safety assumptions (single
  event loop + CPython GIL). The per-session lock ensures concurrent bind()
  calls for the same session are serialised; death test 3 (100 concurrent
  user_prompt binds) verifies no duplicate segment_index values emerge.

  The sub-agent stack mismatch raises SubAgentStackMismatch rather than
  silently ignoring or guessing. This is intentional: a silent pop would
  corrupt sub_agent_id and depth for all subsequent events in the session.
  Death test 2 verifies the raise AND that tracker state is unmodified after
  the mismatch attempt.

  The reset_session() design (synchronous, non-draining, lock-retaining)
  is the minimal correct implementation for Phase 1. The lock-retention
  rationale is documented in the code and in KS-2.

  Iteration 2 (fix-pass) addressed 7 review findings: strengthened DT-4 to
  use a real DB-backed WarmStart (F1/SF-3), documented both unbounded dicts
  in module docstring (F2), added GIL memory-ordering assumption (F3),
  cross-referenced duplicated locking pattern at both sites (F4), changed
  sub_agent_id falsy guard to explicit is-None + empty-string check (F5),
  added WarmStart scope note for sub-agent stack non-reconstruction (S1/B),
  and documented the two-lock hierarchy in _SessionState (S2).

