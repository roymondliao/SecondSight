narrative: >
  The core risk in task-4 is the interaction between three constraints:
  (1) the hook must NEVER exit non-zero (Claude Code PreToolUse contract),
  (2) the hook must provide a durable fallback when the server is down, and
  (3) bash is a primitive tool with minimal atomicity primitives on macOS.

  Iteration 1 (original) resolved these tensions by making exit-0 structural
  (no set -e, explicit exit 0, || true on all writes) and making the durability
  guarantee best-effort with documented PIPE_BUF gap.  However, iteration 1
  shipped with four correctness defects:

  C1 (BLOCKING): Hook scripts posted to /hook/pre-tool-use (hyphenated) instead
  of /hook/tool_use_start (underscore enum value).  The live server rejected all
  POSTs with 422 and the hooks fell through to JSONL — silently defeating the entire
  live-server path.  The original UT-1 used a fake server (accepts any URL) and
  therefore could not catch this.

  C2 (BLOCKING): UT-1 used a fake HTTP server that accepted any URL path.  It
  silently approved the C1 mismatch.  The fix replaces UT-1 with a real create_app()
  integration test that exercises the actual EventType enum validation.

  C3 (BLOCKING): `dirname "$0"` gives the symlink's directory, not the real script's
  directory.  Symlink-installed hooks could not source _lib.sh, producing silent
  zero-observation exit-0.  Fixed via BASH_SOURCE + readlink loop in all per-event
  scripts.

  C4 (BLOCKING): The degraded envelope (jq absent) stored only
  `{"_fallback_degraded": true}` — no information about the original payload.
  Fixed by adding _original_payload_bytes and _original_payload_b64_truncated
  (first 4096 bytes) to the degraded payload field.

  Iteration 2 resolves all four critical defects.  The version constant
  (_SECONDSIGHT_VERSION) is now centralized in _lib.sh (I1 fix) and the test
  constants (EXPECTED_VERSION, FALLBACK_FILENAME) are centralized in conftest.py
  (I2 fix).  The flock comment is reworded to be OS-agnostic (I3 fix).  The
  UT-4/DT-2 probabilistic nature is documented with reference to KS-1 (I4 fix).
  curl stderr is redirected to a per-day log file instead of /dev/null (I6 fix).

resolved_items:
  # -----------------------------------------------------------------------
  # Iteration 1 resolutions (carried forward)
  # -----------------------------------------------------------------------
  - >
    Iteration 1 / A-2 (jq assumption): the jq-absent code path is implemented
    in _lib.sh and now produces a degraded envelope with _original_payload_bytes
    and _original_payload_b64_truncated (C4 fix, iteration 2).

  - >
    Iteration 1 / A-3 (relative SECONDSIGHT_HOME): implemented in
    _secondsight_resolve_home() with a case statement detecting non-/ prefixed
    paths. UT-6 verifies exit 0 + stderr warning.

  - >
    Iteration 1 / SF-3 (missing .payload key): addressed via jq fallback
    expression `($full_payload.payload // $full_payload)`.

  - >
    Iteration 1 / SF-4 (empty stdin guard): secondsight_post() now checks if
    payload_json is empty before any jq call.

  # -----------------------------------------------------------------------
  # Iteration 2 resolutions (C1..C4, I1..I6)
  # -----------------------------------------------------------------------
  - >
    C1 / event_type URL mismatch: all five per-event scripts now POST to
    canonical EventType enum values (tool_use_start, tool_use_end, session_start,
    session_end, user_prompt) instead of hyphenated hook filenames.  Each script
    has a FILENAME vs URL NOTE comment explaining the intentional discrepancy.
    UT-1 (new real-server test) would have caught this in CI; DT-9 is the
    regression guard for C3.

  - >
    C2 / spec compliance: UT-1 replaced with a real create_app() integration test
    using a uvicorn server in a background thread.  A _ClaudeCodeNormalizer stub
    is registered post-startup for agent='claude-code'.  UT-1 asserts: exit 0,
    no fallback JSONL, one DB row matching the event_id, one raw trace file.
    UT-1b asserts 100 concurrent hooks → 100 DB rows, 0 JSONL lines.
    Original iteration-1 test was non-spec-compliant (fake server) and missed C1.

  - >
    C3 / symlink install: all five per-event scripts now use a BASH_SOURCE +
    readlink loop to resolve the real script directory before sourcing _lib.sh.
    DT-9 verifies: pre-tool-use.sh symlinked without _lib.sh co-located → exit 0
    + fallback file written. The loop handles multi-hop symlinks and relative
    symlink targets (case statement for relative-to-absolute resolution).

  - >
    C4 / degraded envelope metadata: the jq-absent degraded path now builds:
    payload={_fallback_degraded:true, _original_payload_bytes:<int>,
    _original_payload_b64_truncated:<base64|"(unavailable)">}.
    DT-5b verifies this with jq+curl both absent, dirname present.

  - >
    I1 / version constant: readonly _SECONDSIGHT_VERSION="phase-1.2" declared
    at the top of _lib.sh; both jq-present (--arg version) and jq-absent
    (variable interpolation in envelope string) reference it.  conftest.py now
    exports EXPECTED_VERSION = "phase-1.2" as a single constant; all version
    assertions in test_hook_fallback.py use it.

  - >
    I2 / fallback filename constant: FALLBACK_FILENAME = "fallback_events.jsonl"
    declared in conftest.py; all test assertions use it instead of bare strings.

  - >
    I3 / flock comment rephrased: "On macOS" changed to "Where flock(1) is
    unavailable from PATH (notably macOS, but also any minimal/Alpine-style
    container without util-linux)"; PIPE_BUF risk documented as OS-agnostic.

  - >
    I4 / DT-2 / UT-4 probabilistic comment: both tests now carry a NOTE comment
    acknowledging the test is non-deterministic on macOS (it tests the
    application-level envelope construction, not OS-level append atomicity)
    and reference KS-1 for the architectural fix.

  - >
    I5 / scar report spec deviation acknowledged: this resolved_items entry.
    Original iteration-1 UT-1 used a fake-server that missed the C1 mismatch.
    Iteration-2 UT-1 is the correct spec-compliant integration test.

  - >
    I6 / curl stderr redirected to log file: curl's 2>/dev/null replaced by
    2>>"$ss_home/logs/curl-errors.log". The logs directory is auto-created
    (mkdir -p || true) before the curl call. A proxy/TLS/DNS failure is now
    distinguishable from "server not running" in operator logs. Exit-code-based
    fallback logic is unchanged.

