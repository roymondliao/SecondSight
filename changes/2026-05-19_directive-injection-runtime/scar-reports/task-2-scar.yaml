narrative: |
  Task 2 moved the active SessionStart hook path to POST /hook/injection/session-start/{agent}.
  The server now selects stored active conventions at request time, applies the resolved feedback
  convention budget, wraps formatted convention lines in the SessionStart convention template,
  and returns the adapter-rendered raw hook payload. The shell hook now prints that response body
  unchanged and then separately posts the session_start observation through the existing ingest path.

resolved_items:
  - original_section: "known_shortcuts"
    original_description: "Potential shortcut: leaving session-start.sh to print unwrapped convention text"
    resolution: "session-start.sh now calls /hook/injection/session-start/{agent} and prints the raw response body without jq-unwrapping .conventions; covered by hook stdout and request-path tests."
  - original_section: "known_shortcuts"
    original_description: "Potential shortcut: treating empty selection as \"conventions\": \"\" JSON instead of true no-op payload semantics"
    resolution: "The new injection route returns 204 with an empty body when no conventions are selected, and the hook 204 path exits 0 with empty stdout."
  - original_section: "assumptions_made"
    original_description: "Assumption to verify: installer command strings remain stable because scripts, not settings payloads, own the transport"
    resolution: "Ran tests/installer/test_claude_settings.py and tests/installer/test_codex_hooks.py; both passed without changing installer command generation."
  - original_section: "silent_failure_conditions"
    original_description: "If the injection endpoint is unavailable or returns an error, session-start.sh exits 0 and emits no injection payload; the agent transcript cannot distinguish this from a valid 204 no-conventions response."
    resolution: "session-start.sh now logs injection curl failures to $SECONDSIGHT_HOME/logs/curl-errors.log while preserving empty stdout and exit 0; covered by tests/scripts/test_hook_fallback.py::TestSessionStartConventionInjection::test_empty_stdout_when_server_unreachable."
  - original_section: "silent_failure_conditions"
    original_description: "If a SessionStart hook payload lacks cwd, session-start.sh cannot derive project_id and will emit no injection payload while still ingesting the session_start observation."
    resolution: "session-start.sh now logs missing cwd, unusable cwd, missing jq, and missing curl injection-skip reasons to $SECONDSIGHT_HOME/logs/curl-errors.log while preserving exit 0 and empty stdout; covered by tests/scripts/test_hook_fallback.py::TestSessionStartConventionInjection::test_dt_missing_or_invalid_cwd_writes_diagnostic."
