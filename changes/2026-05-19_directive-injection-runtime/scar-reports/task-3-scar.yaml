known_shortcuts:
  - description: "Bypass registry is hard-coded in prompt_guidance.py rather than backed by a configurable registry or persisted project/agent data model. Rationale for deferral: task 3 only defines v1 bypass behavior; changing storage/config schema would cross feature-level config/data-model ownership."
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: "Codex UserPromptSubmit event-scoped hookSpecificOutput.additionalContext is verified by adapter/API contract tests, but not by a real transcript-backed Codex capture in this task. Rationale for deferral: requires live client transcript/capture validation outside this task's server/hook unit scope."
    deferred_to_feature_iteration: true
  - description: "If evaluator provider credentials, binaries, or SDK routing are broken, the feature correctly fails open to 204; users may only notice by absence of guidance unless warning logs are inspected."
