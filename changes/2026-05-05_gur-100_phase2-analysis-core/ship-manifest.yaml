# Ship Manifest — GUR-100 Phase 2 Analysis Core
# Validate-and-ship gate complete on 2026-05-06.

delivered_capability: >
  The data-layer foundation for SecondSight's Phase 2 analysis pipeline:
  two SQLAlchemy Core tables (behavior_flags, directives) + repositories
  with defensive enum guards, a read-side event Segmenter that pairs
  tool_use_start/end into ToolUseSpan with explicit orphan handling,
  a pure-function supplementary-metrics computer, and the Pydantic
  contract anchor (analysis/schemas.py) consumed by GUR-101 (analysis
  prompts), GUR-104 (CLI + REST), and GUR-106 (dashboard). NO HTTP
  surface, NO LLM calls, NO subprocess — those are downstream issues.

# --- What was built ---
production_modules:
  - id: P2-1
    path: src/secondsight/analysis/schemas.py
    closes: >
      The contract anchor. BehaviorFlagType (6 SD §5.5.1 values),
      DirectiveStatus (5 SD §7.4 values), DirectiveType (2 values),
      and the Pydantic models BehaviorFlag/Directive/ToolUseSpan/
      SegmentData/SegmentMetrics. ToolUseSpan model_validator rejects
      success=True with duration_ms=None (incoherent state).

  - id: P2-2
    path: src/secondsight/storage/behavior_flags_{table,repository}.py
    closes: >
      SD §7.3 table + confidence column (D3). Repository idempotent on
      id (ON CONFLICT DO NOTHING). Defensive _guard re-validates flag_type
      and confidence on insert to close the model_construct() bypass
      (D1 contract).

  - id: P2-3
    path: src/secondsight/storage/directives_{table,repository}.py
    closes: >
      SD §7.4 table + disabled_at + disabled_reason columns (D3 + memory
      contract). Repository soft-disable lifecycle (DISABLED requires
      reason; non-DISABLED clears disabled metadata; LookupError on
      unknown id). _guard validates lifecycle invariant at insert
      (post-review yin Critical fix: DT-3.7 + DT-3.8).

  - id: P2-4
    path: src/secondsight/analysis/segmenter.py
    closes: >
      Read-side event assembler (NOT a re-segmenter — events arrive
      pre-segmented from SessionTracker.bind). Pairs tool_use_start/end
      into ToolUseSpan; orphan starts → success=None; orphan ends →
      0-width span + WARNING log; pre-prompt segment emitted with
      user_prompt=None; empty segments emitted explicitly; out-of-order
      sequence_number raises ValueError; missing-sequence_number on raw
      dicts raises ValueError (post-review yin Important fix).

  - id: P2-5
    path: src/secondsight/analysis/metrics.py
    closes: >
      Pure function compute_segment_metrics → {total_tokens, unique_files,
      duration, error_count}. Null token_count contributes 0 + WARNING
      log (only for thinking/response event types — session_start etc.
      legitimately null with no warning). ToolUseSpan(success=None) does
      NOT count as error (orphan ≠ failed).

documentation_patches:
  - id: D3
    path: docs/system_design.md
    sections:
      - "§5.5.2 — added `confidence: high|medium|low` to prompt output schema"
      - "§7.4 — added `disabled_at` + `disabled_reason` columns to directives DDL + soft-disable contract paragraph"
    enforcement: >
      Verified pre-merge via `git diff -- docs/system_design.md | grep -F`
      against `confidence":`, `disabled_at`, `disabled_reason`. All three
