resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Initial implementation passed all tests except the round-trip
      assertion which used full-model equality and tripped on the
      SQLite tz-drop limitation.
    resolution: >
      Updated test to compare non-datetime fields exactly and assert
      created_at wall-clock equality with a docstring naming the
      SQLite limitation. The schema/repo behavior is correct; the
      test now honestly reports what is and isn't preserved.

  - original_section: known_shortcuts
    original_description: >
      insert_many returned len(input) but the name suggested inserted
      count; a caller comparing return == len(input) would falsely
      conclude all flags persisted even if ON CONFLICT skipped some.
      (Yin-reviewer Critical finding.)
    resolution: >
      Strengthened the docstring with an IMPORTANT block making the
      semantics explicit ("return value == len(input) ALWAYS; not a
      persistence confirmation"), pointing callers to
      get_session_flags / count_by_type for verification. The signature
      matches the project-wide EventsRepository.insert_many convention;
      a system-wide rename (returning None) is a feature-iteration
      candidate but out of scope for GUR-100.
