# Ship Manifest — GUR-97 Phase 1.3 Agent Adapters
# Bundle commits:
#   aa41a18 — Phase 1.3 implementation (38 files, +4664 / -315)
#   a170aea — Security & privacy review record
#   c55b0bb — docs: rename "normalizer"→"adapter" in 4 production-source comments
