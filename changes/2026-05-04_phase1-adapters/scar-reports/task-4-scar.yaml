resolved_items:
  - description: |
      Level 1 self-iteration: initial draft of `_normalize_post_tool_use`
      conditionally added `success=True` only when `output` was present in
      tool_response. Reviewing the post_tool_use fixture
      (`expected_partial_event_data: {success: true, output_size: 27}`)
      surfaced that the success bit must be reported regardless of output
      presence (a tool that returns nothing on stdout is still success on
      no-error). Refactored to: error ŌåÆ success=False; explicit success
      key ŌåÆ bool coerce; otherwise ŌåÆ success=True. Round-trip test passed
      after the fix.
  - description: |
      Level 1 self-iteration: extracted `_tool_input_metadata` helper
      shared between PreToolUse and PostToolUse data builders. Initial
      draft duplicated the four len() computations (command/content/
      old_string/new_string) across both branches ŌĆö DRY violation,
      and a future drop_list addition would have required two edits. The
      helper centralises the size-extraction logic so a new tool_input
      field flows through both event types from one place.

narrative: |
  Task-4 is the first real production adapter ŌĆö every prior task in this
  feature was scaffolding (ABC, fixtures, migration). The death-test
  surface centres on privacy: DT-3 (canary deep-search) and DT-6
  (generalised drop_list assertion) are the load-bearing invariants for SD
  ┬¦3.7.4 compliance. Each fixture's canary value is positioned at a
  drop-listed source path, so the adapter's drop logic regression manifests
  as a fixture fail rather than a silent leak that downstream analysis
  would only discover after data is on disk.

  Two design decisions warrant explicit recording:

    1. `_AGENT_NAME = "claude_code"` (snake_case per plan ┬¦7 G3). DT-1
       rejects kebab-case "claude-code" because it is a misconfiguration
       trap ŌĆö the existing `_ClaudeCodeAdapterStub` in conftest.py uses
       kebab, but that stub serves a different agent contract (see
       known_shortcut #1). Production routing uses snake_case.

    2. `hook_event_name` cross-check inside normalize(). Caller dispatches
       by `event_type` (route param), but the adapter verifies the payload
       claims the matching hook. A misrouted POST is a typed error
       (ValueError) rather than a structurally-valid PartialEvent with
       wrong shape ŌĆö silent failure surface SF-1.

  Bundle implications:
    - AC-4 Ō£ģ test_supported_event_types_floor green.
    - AC-5 Ō£ģ all 5 fixtures round-trip; data == expected_partial_event_data
      exactly.
    - AC-6 Ō£ģ DT-3 privacy canary green for all 5 fixtures.
    - AC-7 Ō£ģ DT-7 + DT-7b verify both inject_* defaults inherited.
    - AC-8 Ō£ģ mypy clean across `src/secondsight/adapters` +
      `tests/adapters` (zero issues; new claude_code.py + test_claude_code.py
      type-check on first run).
    - AC-9 Ō£ģ 488 passing tests vs baseline 457 (+31 new). Threshold Ōēź 380
      easily met. Pre-existing parallel-write flake on
