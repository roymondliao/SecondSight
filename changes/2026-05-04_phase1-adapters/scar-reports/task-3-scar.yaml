narrative: |
  This task is a pure migration: behavioural parity is the contract (AC-3),
  structural upgrade is the value (Protocol → ABC). The death-test surface
  this task added is *deletion-shaped*:

    MIG-DT-1 (test_base.py)  collect-time grep for the deleted import path
    DT-1     (test_identity.py)  ModuleNotFoundError on legacy `import …`

  Both are guards against the migration silently un-migrating — a future
  refactor that introduces a "transitional" shim would fail collection
  before any other test runs. This is the strongest signal we can give
  for AC-10 / AC-1 enforcement.

  No Level 1 self-iteration was performed because every scar item above is
  either (a) accepted as documented (postcondition carried forward by ABC
  docstring already, no task-scope action available), (b) deferred to
  task-4 because the real adapter retires the stub, or (c) Phase-2 hardening
  scope (isinstance guard on register).

  Bundle implications:
    - AC-1 ✅ verified by both DT-1 and AC-1's bash command
    - AC-3 ✅ 13 tests in test_identity.py (≥ prior IdentityNormalizer count)
    - AC-8 ✅ mypy clean across src/ (28 files) and tests/adapters (7 files)
    - AC-9 ✅ 457 tests pass excl. 1 documented pre-existing flake
    - AC-10 ✅ `! grep -r 'from secondsight.api.normalizer' src/` → exit 0
    - AC-2/AC-4/AC-5/AC-6/AC-7 are bundle-level — task-4 ships them.

  Cross-task carry-forward (visible to task-5 integration):
    - The state field is now `adapter_registry`. task-5's end-to-end tests
      that build an app with `create_app(...)` will see this name. No code
      change needed in task-5; it just needs to not refer to the old name.
    - `_ClaudeCodeAdapterStub` exists in tests/scripts/conftest.py.
      task-4 will replace it with the real ClaudeCodeAdapter and remove the
      RuntimeWarning suppression.
