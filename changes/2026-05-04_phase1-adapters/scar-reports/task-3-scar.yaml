  - assumption: |
      The state field rename `normalizer_registry` → `adapter_registry` does
      not break any external consumer. AppState is internal to
      `src/secondsight/api/` and the field is documented as write-once.
    verified: true
    note: |
      Verified by grep — only the two production sites (server.py
      assignment, hooks.py read) and three test sites (latency_contract,
      scripts/conftest, scripts/conftest fixture body) referenced the old
      name. All migrated in this task.

  - assumption: |
      The pre-existing flake `test_dt2_parallel_writes_no_truncation` is
      unrelated to this migration. The task-1 scar report and index.yaml
      both call it out as a pre-existing flake under parallel load.
    verified: true
    note: |
      Confirmed by running the test in isolation post-migration — passes.
      JSONDecodeError under parallel load is a hook-fallback concern, not
      an adapter-layer concern. Same JSON parse error pattern as before
      task-3.

  - assumption: |
      Suppressing the AdapterRegistry shadow warning in the conftest fixture
      is benign because agent gating prevents dispatch collision.
    verified: true
    note: |
      Tested by the existing `tests/scripts/test_hook_fallback.py` suite —
      all 11 tests pass with agent="claude-code" routing to
      `_ClaudeCodeAdapterStub` despite IdentityAdapter publishing the same
      event_types under agent="test". First-match-wins dispatch consults
      supports() before supported_event_types(), so different agent gates
      are sufficient to prevent collision.

