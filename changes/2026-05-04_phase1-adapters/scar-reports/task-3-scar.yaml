completion_status: done

known_shortcuts:
  - description: |
      `_ClaudeCodeAdapterStub` in tests/scripts/conftest.py is a duck-typed
      AgentAdapter (the original `_ClaudeCodeNormalizer` upgraded with
      `supported_event_types()` and loud-failure inject_* defaults) rather
      than a true ABC subclass. We bypass mypy with `# type: ignore[arg-type]`
      at register-time. Reason: subclassing AgentAdapter from this conftest
      would either pull `secondsight.adapters` into a test-scoped import that
      blurs the seam between adapter and observation packages, or require a
      separate stub module. Both are heavier than the duck-cast.
      Risk: a future signature drift in AgentAdapter (e.g. an added abstract
      method) will not surface until runtime when `register()` accepts the
      stub silently. Mitigation: AdapterRegistry.for_() exercises the stub on
      every test run; any missing-method error surfaces immediately.
    deferred_to_feature_iteration: true  # task-4 ships real ClaudeCodeAdapter; the stub goes away

  - description: |
      The `_ClaudeCodeAdapterStub.supported_event_types()` returns the FULL
      EventType set (universal-test scope). The real ClaudeCodeAdapter
      (task-4 / GUR-124) will publish only the P1 floor. Until then, the
      conftest fixture suppresses the AdapterRegistry shadow warning that
      fires on event-type overlap with IdentityAdapter. The shadow IS real
      (both publish the full set), but agent gating prevents dispatch
      collision. Reason for the universal set: keeping behavioural parity
      with the prior `_ClaudeCodeNormalizer` (which had no
      `supported_event_types()` at all and thus no overlap warning). Once
      task-4 lands the floor, the warning suppression in the fixture should
      be removed and the stub can publish the floor too.
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: |
      MIG-DT-1 (the collect-time grep guard in tests/adapters/test_base.py)
      walks every .py file under src/ but does NOT walk tests/. A test that
      imports the legacy `secondsight.api.normalizer` path would survive
      collection (because the module is gone, the failing import would surface
      at test execution as an ImportError per-test rather than an aborted
      session). Reason for the asymmetry: the AC-10 contract is explicit
      about src/ only ("No production import of old normalizer path"). Tests
      may keep one assertion-only import — DT-1 in test_identity.py
      deliberately performs `import secondsight.api.normalizer` inside
      `pytest.raises(ModuleNotFoundError)`. Walking tests/ in MIG-DT-1 would
      flag DT-1 itself as a regression. Acceptable trade-off, but a stale
      test-side import (not inside `pytest.raises`) would slip through this
      guard.
    # not deferred — the AC-10 contract intentionally excludes tests/

  - description: |
      The state field rename `normalizer_registry` → `adapter_registry`
      relies on attribute access raising AttributeError at runtime if a
      caller still uses the old name. mypy catches it on typed access via
      `cast("AppState", ...)`, but a dict-style or `getattr(state,
      "normalizer_registry", default)` call would silently get `default`.
      No such call exists today (verified by grep), but the pattern is
      possible.
    deferred_to_feature_iteration: false  # surveillance only; no production code uses getattr fallback

  - description: |
      `IdentityAdapter.normalize()` re-validates `event_type` against the
      EventType enum (defence-in-depth) but does not validate envelope-level
      fields beyond what Pydantic enforces on HookEnvelope. A future
      HookEnvelope schema relaxation that drops min_length=1 on `event_id`
      or `session_id` would let IdentityAdapter produce a PartialEvent with
      empty required fields — corrupt downstream. The AgentAdapter ABC
      docstring carries this postcondition forward to task-4 already.
      No regression introduced by this migration; the silent surface was
      identical in IdentityNormalizer.
    deferred_to_feature_iteration: false  # invariant carried by HookEnvelope, not adapter

  - description: |
      The duck-typed `_ClaudeCodeAdapterStub` in conftest.py satisfies
      `register()` via `# type: ignore[arg-type]`. If a future
      `AdapterRegistry.register()` adds an `isinstance(adapter, AgentAdapter)`
      runtime guard (currently not present), this stub will fail at
      register-time with a TypeError. The fixture would then need to subclass
      AgentAdapter explicitly. Tracked because hardening register() is a
      reasonable Phase 2 move.
    deferred_to_feature_iteration: true

