known_shortcuts:
  - description: |
      `# type: ignore[import-untyped]` on the TYPE_CHECKING import of
      `secondsight.feedback.{Convention, Hint}`. The module does not yet exist;
      the suppression silences a real signal (mypy correctly notes the import
      cannot be resolved). When GUR-104 lands `Convention`, the ignore must be
      removed in the same commit, otherwise the seam will silently allow type
      drift between the ABC signature and the real model.
    deferred_to_feature_iteration: false  # actionable inside GUR-104 commit (carried forward to that PR's checklist)

silent_failure_conditions:
  - description: |
      `AdapterRegistry.for_()` skips an adapter whose `supports()` returns True
      but whose `supported_event_types()` omits the event_type — falling through
      to the next adapter. Intent: a single honest adapter can mask a dishonest
      one without aborting the request. Cost: the skipped dishonest adapter
      remains INVISIBLE at runtime — no log line, no metric. DT-6 catches it at
      test time but production registries that diverge after deployment have no
      observable signal.
    deferred_to_feature_iteration: true  # logger child design is a Phase-1-feature-level concern (GUR-96 quality review flagged related namespace question)

  - description: |
      `inject_convention` / `inject_hint` raise NotImplementedError as ABC
      defaults, but a subclass that overrides them without calling super() can
      silently `return ""`. This is the standard ABC-override risk. Not
      preventable at the base class level. Mitigation: per-adapter death tests
      in task-4 (ClaudeCodeAdapter) assert that ClaudeCodeAdapter inherits the
      loud failure. Future adapters (Codex, OpenCode) will each need the same
      death test.
    deferred_to_feature_iteration: false  # task-4 owns ClaudeCodeAdapter; this becomes its DT

  - description: |
      `AdapterRegistry.list_supported_event_types()` calls `adapter.supports(agent, et)`
      for each `et in adapter.supported_event_types()`. If an adapter's
      `supports()` is non-deterministic (state, time, randomness) or has
      side effects (logging, counters), `list_supported_event_types()` becomes
      observability-tainted. Documented in `AgentAdapter.supports` docstring as
      "stateless" expectation. Cannot enforce statelessness at Python level.
    deferred_to_feature_iteration: false

  - description: |
      `AgentAdapter.normalize()` postcondition (envelope-derived fields MUST
      be forwarded faithfully into PartialEvent — no synthesized empty strings,
      no zero sequence_numbers) is enforced ONLY by docstring at this seam.
      A subclass returning `PartialEvent(id="", session_id="", ...)` corrupts
      every downstream Event silently — the seam does not validate. Cross-
      reference now in normalize() docstring (Level-1 fix); per-adapter
      death-test enforcement is task-4's responsibility (GUR-124). Reviewer
      flagged as L — Silent Breach (Important).
    deferred_to_feature_iteration: false  # carried forward to task-4 GUR-124 death-test set

