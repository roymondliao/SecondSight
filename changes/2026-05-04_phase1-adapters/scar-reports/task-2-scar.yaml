known_shortcuts:
  - description: |
      `pre_tool_use_bash.json` carries `_source: "verified"` even though only
      the `tool_input.command` field path is empirically grounded by
      `~/.claude/hooks/rtk-rewrite.sh`. The wrapping fields (session_id,
      transcript_path, cwd, hook_event_name, tool_name) are documented within
      a verified envelope. A future reader may misread the top-level label
      as "every field in this fixture is verified". Mitigated by the
      `_capture_origin` paragraph that explicitly distinguishes verified field
      from documented envelope, plus the corresponding paragraph in
      `_README.md` ("verified vs documented"). Cannot be reduced further
      without a per-field provenance schema, which would over-fit P1.
    deferred_to_feature_iteration: false  # documented at fixture site + README; per-field provenance is a Phase-3 concern if/when more fixtures land

  - description: |
      Privacy canary placement for `session_start.json` and `session_end.json`
      uses `payload.session_id` because plan §5 lists no §5-explicit
      drop-listed fields for session events. The canary semantics is therefore
      "drop-from-data, route-to-column" (session_id must surface only on
      PartialEvent.session_id, never inside `data`) rather than the
      "drop entirely" semantics used for tool/prompt events. This widening of
      the canary contract is intentional and documented in the per-fixture
      `_meta._privacy_canary_field_rationale` plus `_README.md`, but the
      DT-3 death test cannot itself distinguish "drop-from-data" from
      "drop-entirely" — it only verifies canary placement, not the meaning
      of that placement. Task-4 (ClaudeCodeAdapter) is the enforcer.
    deferred_to_feature_iteration: false  # binds to task-4 GUR-124 adapter death tests

silent_failure_conditions:
  - description: |
      DT-2/DT-3/DT-4/DT-5 are `@pytest.mark.parametrize` over `_fixture_paths()`
      called at module-import time. If a future change deletes ALL fixtures,
      parametrize binds to an empty list and the four parametrized tests
      silently skip (4 skipped, 0 failed). Only DT-1 (`test_dt1_every_fixture
      _parses_as_json`) and `test_p1_floor_fully_covered` use the
      session-scope `fixture_paths` fixture which calls `pytest.fail` on
      empty. These two non-parametrized tests are the actual gate against
      "all fixtures deleted". The parametrized skips are ergonomic
      (per-fixture failure messages) but are not the safety net.
    deferred_to_feature_iteration: false  # the two non-parametrized gates are sufficient; over-engineering parametrize-on-empty would obscure the real failure path

  - description: |
      `_value_appears_in()` uses substring match for canary detection
      (`needle in haystack` for str values). Pathological case: if
      `expected_partial_event_data` legitimately contains a string field whose
      value happens to embed the canary literal (e.g. user-authored
      documentation in a fixture), DT-3 fails even though no real leak
      occurred. Accepted because (a) `PRIVACY_CANARY_DO_NOT_STORE` is a
      deliberately unique sentinel unlikely to appear except by intent, and
      (b) substring match is the only honest detection — equality match would
      miss "value embedded inside larger string", which is the exact
      regression mode (e.g. command_length serialized as f"len={cmd}"
      accidentally including the raw command).
    deferred_to_feature_iteration: false  # accepted trade-off; documented inline in _value_appears_in docstring intent

  - description: |
      `_resolve_path()` uses simple dotted-path traversal — does not handle
      list indices (e.g. `tool_input.args[0]`). The current §5 drop_list
      contains no list-indexed fields, so this is sufficient for P1. If a
      future Claude Code hook event nests a drop-listed field inside an
      array (likely candidate: `tool_input.commands[]` for a multi-bash
      hypothetical), the canary path syntax must be extended. DT-3 would
      surface this as `KeyError` on resolution, which is loud-fail rather
      than silent — preferred over silently accepting a missing canary.
    deferred_to_feature_iteration: false  # path syntax is per-fixture-author concern; loud-fail is correct

  - description: |
      Documented fixtures (`post_tool_use`, `user_prompt_submit`,
      `session_start`, `session_end`) snapshot the Claude Code v1.x hooks
      schema at 2026-05-04. If Claude Code adds a NEW field to a documented
      hook event between now and v2 protocol — without a version bump —
      these fixtures will silently under-cover the real payload. ClaudeCode
      Adapter (task-4) plus the `_unmapped` allow-list logic per plan §9
      risk row 3 are the runtime mitigation; the integration test in task-5
      is the verification gate. Within task-2 alone, this is a real but
      bounded silent-failure surface: the worst case is "adapter sees a
      field the fixture doesn't mention", which `_unmapped` captures.
    deferred_to_feature_iteration: true  # belongs to the feature-level (task-4 + task-5) cross-cutting concern about schema drift detection

