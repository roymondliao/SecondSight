narrative: |
  This task is fixture-only. There is no production code in `src/`; the
  five JSON fixtures plus the validation test are the entire deliverable.
  Consequently the scar surface is narrower than task-1's: no ABC seam, no
  registry, no runtime path. The remaining concerns are exclusively about
  fixture authorship honesty and forward drift.

  Three load-bearing decisions surfaced during authoring:

  1. **`_source: verified` for pre_tool_use_bash.json** is narrowly scoped
     to the `tool_input.command` field path (verified empirically against
     `~/.claude/hooks/rtk-rewrite.sh`). The wrapping envelope fields
     (session_id, transcript_path, cwd, hook_event_name, tool_name) are
     documented within a verified envelope. The honesty-preserving move is
     not to invent a per-field provenance schema; it is to make the
     `_capture_origin` paragraph explicit and re-state it in `_README.md`.

  2. **Privacy canary placement for session events** widens the canary
     semantics from "drop-entirely" (tool/prompt events, plan §5) to
     "drop-from-data, route-to-column" (session events: session_id must
     surface only on the top-level Event column per SD §3.7.5, never in
     `data`). Documented per-fixture in `_meta._privacy_canary_field_rationale`
     and in `_README.md`. The DT-3 death test verifies placement;
     meaningfulness is verified by the README + task-4 runtime enforcement.

  3. **Privacy canary substring match** in `_value_appears_in` accepts
     `canary in str(value)` rather than equality. This is the correct
     detection for the regression mode (adapter embedding raw value
     inside a derived string), but pathological fixture authorship could
     produce a false positive. The sentinel string is unique enough that
     this is a paper risk only.

  Test results:
  - Fixture death tests: 22/22 passed (DT-1 + 4 parametrized × 5 fixtures + p1_floor coverage).
  - Full suite via `.venv/bin/pytest -q`: 449 passed, 1 failed (the same pre-existing
    `test_hook_fallback.py::TestDeathTests::test_dt2_parallel_writes_no_truncation`
    flake noted in task-1-scar.yaml; passes in isolation).
  - mypy: not exercised (no .py production code added; only test code, which is permitted to skip mypy per pre-commit config).

  Carry-forward to task-4 (GUR-124):
  - Adapter must enforce: canary at `_meta._privacy_canary_field` MUST NOT
    appear in `Event.data` JSON serialization.
  - Adapter must satisfy AC-5: `normalize().data` ⊇ each fixture's
    `expected_partial_event_data`, with no canary leakage.
  - Adapter must satisfy "drop-from-data, route-to-column" for session_id
    in session events.

  Carry-forward to task-5 (P1-9-int):
  - Integration test should optionally support a "live capture" mode that
    re-validates `documented` fixtures against a real Claude Code v1.x
    session, promoting them to `verified` if successful. This is the
    long-term mitigation for plan §9 risk row 1 (documented-only fixtures
    drift from real Claude Code v1.x emission). Not blocking for P1 ship.
