# Ship Manifest — GUR-102 Phase 2 Analysis Orchestration
# Validate-and-ship gate complete on 2026-05-07.

delivered_capability: >
  The orchestration layer for SecondSight's Phase 2 analysis pipeline:
  three new modules (orchestrator.py composer, behavior.py segment detector,
  aggregator.py cross-session pipeline), a typed AnalysisAgent Protocol
  contract that GUR-103 will implement on PydanticAI, two new storage
  tables (analysis_runs for pipeline-progress audit, session_reports for
  artifact persistence), an additive directives.identity_key column with
  UNIQUE(project_id, identity_key) for stable-identity UPSERT, and the
  filesystem JSON backup writer per SD §7.2. Closes 8 silent-failure
  surfaces (DC-1 through DC-8) named in the kickoff. NO LLM calls (the
  Protocol is the seam), NO HTTP surface (consumers are GUR-103/104/106).

# --- What was built ---
production_modules:
  - id: P2-8a
    path: src/secondsight/storage/analysis_runs_{table,repository}.py
    closes: >
      Pipeline-progress audit. start_run inserts at stage='pending' BEFORE
      any side effect (closes DC-1: KILL between stages still leaves audit
      row). advance_stage validates the stage enum at the repository layer
      (mirrors GUR-100 D1 pattern). count_recent_partial surfaces stuck
      runs to the operator. _row_to_run wraps AnalysisRunStage(...) with
      run_id+session_id context on corrupt DB stage strings (round 1 fix).

  - id: P2-8b
    path: src/secondsight/storage/session_reports_{table,repository}.py
    closes: >
      Artifact persistence with session_id UNIQUE for UPSERT semantics.
      _guard validates key_findings <= 5 and headline bounds before write
      (round 1 fix). On re-run with force=True, UPSERT updates
      analysis_run_id+headline+key_findings+body+updated_at while
      preserving created_at — same identity-key pattern as directives.

  - id: P2-8c
    path: src/secondsight/storage/directives_{table,repository}.py
    closes: >
      Additive identity_key column + UNIQUE(project_id, identity_key)
      constraint. upsert_with_identity_key path returns the canonical
      INSERT ON CONFLICT(project_id, identity_key) DO UPDATE SET
      instruction, frequency, source_sessions, updated_at — preserving
      status, type, source_flag_type, created_at on UPDATE. insert
      wraps IntegrityError → ValueError naming the constraint when an
      empty identity_key collides with the (project_id, "") slot
      (round 1 yin Critical fix). Empty identity_key rejected at the
      _guard boundary.

  - id: P2-8d
    path: src/secondsight/analysis/agent.py
    closes: >
      Typed seam (Protocol contract) between GUR-102 and GUR-103.
      Async-first, three explicit methods (analyze_segments batched form
      to absorb future concurrency without Protocol churn,
      aggregate_flag_type single-call, summarize_session single-call).
      AnalysisAgentError exception type. @runtime_checkable for
      isinstance support; documented signature-blindness limitation at
      Protocol definition site (round 1 fix).

  - id: P2-9
    path: src/secondsight/analysis/behavior.py
    closes: >
      Segment-level detector. Pre-insert _guard validation closes DC-2:
      validate-then-promote-then-insert atomicity (raises on bad
      flag_type / confidence / empty event_ids BEFORE any DB write).
      Deterministic SHA-256 IDs over (session_id, segment_index,
      sorted(event_ids), flag_type.value, draft.reason) for re-call
      idempotency under temperature=0 (round 1 fix broadened from
      single-event_id to full sorted set + reason). validate_draft_pre_insert
      and promote_draft promoted to public in __all__ for orchestrator
      reuse without cross-module private imports (security-review fix).

  - id: P2-10
    path: src/secondsight/analysis/aggregator.py
    closes: >
      Cross-session aggregator implementing SD §5.5.3 verbatim.
      Step 1 group by flag_type (single grouping policy in v1).
      Step 2 one LLM call per non-empty group; ALL-OR-NOTHING on
      AnalysisAgentError (no partial directive writes on Step 2 failure).
      Step 3 sort by occurrence_count DESC with deterministic tie-break
      (flag_type.value ASC, pattern_description ASC) — closes DC-3 silent
      tie-truncation. compute_identity_key now hashes (project_id,
      flag_type.value, sorted(repr_session_ids)) for structural
      cross-project isolation in the hash itself (security-review
      MEDIUM-3 fix). top_n < 0 raises ValueError; top_n=0 valid no-op.
      DEFAULT_CONVENTION_TOP_N=15 hard-coded with TODO referencing
      analysis_config.toml (G2 deferral).

  - id: P2-8 (composer)
    path: src/secondsight/analysis/orchestrator.py
    closes: >
      Composer with three async entrypoints: analyze_session,
      aggregate_project, analyze_and_aggregate. Closes DC-1 (start_run
      at entry), DC-4 (force=True required for completed sessions),
      DC-7 (consumer-not-recoverer principle: _verify_session_complete
      raises rather than re-running GUR-99 backfill), DC-8 (zero-flag
      short-circuit + stale-conventions WARNING disclosure).
      _write_filesystem_backup hardened with is_safe_id guards on
      project_id and session_id + Path.resolve().relative_to
      containment check (security-review HIGH-1 fix).
      _sanitize_failure_message bounds the analysis_runs.error_message
      column to 200 chars + exception class name (security-review
      MEDIUM-2 fix). Outer try/except Exception is the ONE acceptable
      catch-all in this PR — records analysis_runs.stage='failed'
      before re-raise; documented at module docstring.

  - id: schemas
    path: src/secondsight/analysis/schemas.py
    closes: >
      Extended GUR-100's schema module: AnalysisRun, SessionReport,
      AnalysisRunStage enum, TERMINAL_STAGES public frozenset (single
      source of truth shared by analysis_runs_repository), and
      VALID_CONFIDENCE public frozenset (single source of truth shared
      by behavior.py and behavior_flags_repository — round 1 fix).
      identity_key column added to Directive Pydantic model;
      docstring references compute_identity_key by name rather than
      restating the formula (round 1 DRY fix).

