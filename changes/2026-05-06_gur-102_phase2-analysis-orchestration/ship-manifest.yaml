# --- Known failure modes (yin: what can rot) ---
known_failure_modes:
  - mode: >
      Step 3 of aggregator is per-row transactional, not atomic across
      the loop. If upsert_with_identity_key raises mid-loop (DB lock
      timeout, IntegrityError on a constraint we did not name, disk
      full), K-1 of N directives have been written and N-K have not.
      Caller receives an exception (not AggregateProjectResult) and
      cannot distinguish Step 2 vs. Step 3 failure from the exception
      type alone. UPSERT idempotency makes retry safe but the failure
      mode is asymmetric with Step 2's all-or-nothing.
    severity: silent_corruption
    detection: >
      Module docstring explicitly documents the Step 2 vs. Step 3
      distinction and directs callers to inspect via
      DirectivesRepository.get_active_conventions() to disambiguate.
      No automated detection. Future: introduce typed Step3WriteError
      wrapper at the aggregator boundary (deferred Suggestion).

  - mode: >
      _persist_segment_flags in orchestrator.py duplicates the pipeline
      orchestration scaffolding (empty-drafts short-circuit, created_at
      assignment) from behavior.py:detect_segment_flags. Helpers
      (validate_draft_pre_insert, promote_draft) are now public and
      single-sourced — divergence on validation rules is closed. But
      orchestration-level changes still require lockstep updates at
      both call sites.
    severity: degradation
    detection: >
      Module docstring at orchestrator.py:42-52 names the duplication
      and the lockstep requirement. No runtime detection. Quality
      reviewer downgraded from Important to Suggestion after public-
      helper promotion.

  - mode: >
      Race condition: two concurrent analyze_session calls for the same
      session_id can both pass _check_already_analyzed before either
      calls start_run, producing two analysis_runs rows and doubled
      LLM cost. UPSERT on session_reports keeps a single report row;
      both analysis_runs rows reach summary_written; no permanent
      stuck state but the cost doubles per concurrent trigger.
    severity: degradation
    detection: >
      _check_already_analyzed docstring documents the TOCTOU race and
      names the v1 single-trigger assumption (GUR-103 invokes from a
      single trigger per session). No runtime detection. count_recent_partial
      surfaces both runs for audit.

  - mode: >
      LLM determinism dependency: deterministic flag IDs in behavior.py
      hash include `draft.reason`. Idempotency on force-rerun assumes
      the LLM produces the same `reason` string for identical input
      (true at temperature=0; degrades at temperature > 0). Default
      Haiku is temperature-zero per SD §5.7.1, but a future model
      switch may break the assumption.
    severity: degradation
    detection: >
      behavior.py module docstring documents the dependency. No
      runtime detection. Symptom would be: behavior_flags row count
      growing on each force-rerun rather than staying constant.

  - mode: >
      Sync insert_many inside async detect_segment_flags (and the
      analogous orchestrator helpers) blocks the event loop during
      DB writes. Pre-existing from GUR-100; tolerable at the documented
      0.5–2 events/sec rate (SD §3.2). Concurrency may need
      asyncio.to_thread wrapping at GUR-103's trigger boundary.
    severity: degradation
    detection: >
      Yin reviewer flagged on task-3 review; no automated detection.
      Symptom would be: orchestrator latency anomalies under
      concurrent session-end triggers.

  - mode: >
      Aggregator reads ALL flags for a project per flag_type with no
      LIMIT clause. Bounded by BehaviorFlagType cardinality (7 types)
      but not by per-type flag count. A project accumulating 10K+
      flags of one type would load all into memory and pass to the
      LLM in one prompt.
    severity: degradation
    detection: >
      Per-call cost growth in LLM-router monitoring (when GUR-103
      lands). No code-level detection. Mitigated by retention purger
      (GUR-147) keeping flag history bounded at 365 days.

  - mode: >
      Filesystem JSON backup is best-effort. If write_text raises
      (disk full, permissions, race with cleanup), the outer
      try/except records analysis_runs.stage='failed' even though
      the DB session_reports row was already UPSERTed successfully.
      Caller sees pipeline failure for what is actually a backup-only
      issue.
    severity: degradation
    detection: >
      analysis_runs.stage='failed' with error_message naming the
      filesystem path. Operator can grep the error_message column
      for OSError/PermissionError.

  - mode: >
      _log_if_directives_stale is informational only — emits WARNING
      via _logger.warning when active conventions are older than 30
      days. If logs are not aggregated to a monitoring system, the
      WARNING is silently dropped.
    severity: degradation
    detection: >
      Grep runtime logs for the literal substring
      "aggregator skipped: zero flags inserted" + "stale conventions"
      to spot frequency. No structured alerting in v1.

  - mode: >
      @runtime_checkable on AnalysisAgent Protocol checks method names
      only — not signatures, parameter types, return types, or async-
      ness. A sync class with the right method names will pass
      isinstance() but fail at await-time. Documented at the Protocol
      definition site.
    severity: degradation
    detection: >
      mypy/pyright catch the rest at type-check time when GUR-103
      declares a class against the Protocol. No runtime detection.

  - mode: >
      record_failure-also-fails edge case: if the inner try/except in
      analyze_session catches a record_failure failure (DB connection
      lost mid-failure), the analysis_runs row remains at the last-set
      non-terminal stage with completed_at NULL. Caller still sees the
      original pipeline exception; audit trail is incomplete.
    severity: silent_corruption
    detection: >
      count_recent_partial surfaces stuck non-terminal runs to the
      operator. Documented in analyze_session docstring's Failure
      semantics block.

# --- Accepted risks (carry forward; need re-evaluation) ---
accepted_risks:
  - risk: >
      Three LOW security findings accepted as ship-manifest risks per
      board option (A) on security review:
      (1) _row_to_run ValueError echoes session_id + raw_stage in
      message; propagates to logs if caller logs the exception;
      (2) directives.insert IntegrityError → ValueError translation
      echoes identity_key (sha256 hash, not raw session ids) in
      error message;
      (3) _logger.info logs session_id at INFO on zero-flag short-
      circuit (acceptable for local single-user tool; defense-in-
      depth concern if logs ever ship to remote aggregator).
    accepted_by: "human (local-board) — security review option (A)"
    expires: "2026-08-07"
    rationale: >
      All three are defense-in-depth concerns, not direct exploits.
      session_ids are opaque hashes in normal operation; identity_key
      is a one-way hash. Re-evaluate when a remote log aggregator
      (Sentry, Datadog) is introduced.

  - risk: >
      Step 3 of aggregator has no Step3WriteError typed wrapper; caller
      cannot distinguish Step 2 (retry-safe) vs. Step 3 (idempotent-
      safe-retry-via-UPSERT) failure from the exception type. Quality
      reviewer Suggestion deferred.
    accepted_by: "human (local-board) — security review option (A)"
    expires: "2026-08-07"
    rationale: >
      Documentation-only fix is sufficient because the failure source
      is now disclosed (not hidden). Implementing the wrapper is a
      larger refactor that GUR-103's orchestrator-trigger code can
      take on if it needs the distinction.

  - risk: >
      _persist_segment_flags in orchestrator.py duplicates orchestration
      scaffolding from detector. Helpers public and single-sourced;
      orchestration-level lockstep requirement remains.
    accepted_by: "human (local-board) — implement gate accept"
    expires: "2026-08-07"
    rationale: >
      Refactoring detector to return tuple[int, SegmentAnalysis] would
      be cleaner but ripples through task-3 tests. Deferred to feature
      iteration. Lockstep risk is bounded by module docstring + public
      helpers.

  - risk: >
      Race condition on _check_already_analyzed — TOCTOU between read
      and start_run insert, no DB-level lock. Bounded by GUR-103's
      single-trigger assumption.
    accepted_by: "human (local-board) — plan gate accept"
    expires: "2026-11-07"  # re-evaluate when GUR-103 trigger lands
    rationale: >
      v1 deployment is single-process per session via session-end
      hook. If GUR-103 ever introduces multi-trigger or external
      replay, atomic check+insert needed. Re-evaluate at GUR-103
      ship gate.

  - risk: >
      LLM determinism dependency: behavior.py flag IDs hash
      `draft.reason`. Force-rerun idempotency depends on
      temperature=0 (default Haiku per SD §5.7.1).
    accepted_by: "human (local-board) — plan gate accept"
    expires: "2026-08-07"
    rationale: >
      Acceptable for v1 with Haiku default. Re-evaluate if SD §5.7
      adds non-zero temperature models or if GUR-103 introduces
      caller-selectable temperature.

  - risk: >
      Branch accumulation: paperclip-experiment now ~254 files /
      ~47k insertions vs main. Shipping GUR-102 as a merge to main
      would also land all prior phases (GUR-96/97/98/99/100/101/107/
      111/112/113/147) that have not yet merged. Each prior phase
      had its own ship-manifest accepting this same branch risk.
    accepted_by: "human (local-board) — pending choice in this gate"
    expires: "N/A — resolved at branch-completion choice (A/B/C/D)"
    rationale: >
      Per memory feedback `feedback_branch_accumulation`, the
      recommended default is (C) Keep branch — never default-merge
      to main. Merge is a deliberate decision the user makes; this
      manifest does not pre-commit to it.

# --- Silent failure surface ---
silent_failure_surface: high
# Computed from scar reports: 30 unique silent_failure_conditions across
# 5 task scar reports (task-1=4, task-2=2, task-3=5, task-4=9, task-5=10).
# Per format guide: >7 = high.
# As with GUR-100, most entries are documented as LOUD failure modes
# (raises with named message; emits WARNING log). The honest-but-strict
# count rounds to "high" because the breadth of the orchestration layer
# (5 modules + 2 tables + 1 Protocol) creates many small failure surfaces
# even when each is individually well-handled.

# --- Monitoring hooks ---
monitoring_hooks:
  - >
    CI gate: pytest tests/ — 641 tests with deterministic fixtures.
    Failures here block merge. Specific test files for GUR-102:
    tests/analysis/test_{agent_protocol,behavior,aggregator,orchestrator}.py
    + tests/storage/test_{analysis_runs,session_reports}_repository.py.
  - >
    Log signals: grep runtime logs for these literal substrings to
    detect rot:
      "aggregator skipped: zero flags inserted"
      "stale conventions"
      "outside enum" (BehaviorFlagType drift)
      "FakeAnalysisAgent contract violation" (test-only sanity check)
      "validate_draft_pre_insert" with stack frame in production
      "_promote_draft" with stack frame in production
    Frequency spikes are the canary.
  - >
    DB-state signal: count_recent_partial query on the analysis_runs
    table surfaces stuck non-terminal pipeline runs. Operator should
    run this periodically: rows older than 5 minutes in stage NOT IN
    ('summary_written', 'aggregated', 'failed') indicate either a
    record_failure-also-failed scenario or a process that died
    without record_failure being reached.
  - >
    Disable-on-arrival rate (deferred Phase 2 ship gate per D8):
    once GUR-106 dashboard ships, "directives marked disabled within
    24h of created_at" must be ≤ 30% across the first 20 sessions.
    Blocks GUR-104 directive-lifecycle work from starting until
    verified.
  - >
    Schema-contract drift signal: `git diff main -- docs/system_design.md`
    must continue to include §5.5.2 (confidence), §7.4 (disabled_at,
    disabled_reason, identity_key) edits. Future SD update needed for
    analysis_runs + session_reports tables (deferred to GUR-104/106
    ship cycle since those are the primary consumers).

# --- Kill switch ---
kill_switch: >
  Disable orchestrator: rename src/secondsight/analysis/orchestrator.py
  → orchestrator.disabled. The orchestrator is NOT yet imported by any
  production code path (api/, observation/, daemon.py, cli/) — it is
  consumed only by tests and (eventually) GUR-103's session-end trigger.
  Renaming surfaces no production breakage today.

  Disable per-task modules independently: same rename pattern works for
  behavior.py, aggregator.py, agent.py — they are leaf modules with no
  cross-imports outside the analysis/ package.

  Disable storage-layer writes: revert src/secondsight/analysis/__init__.py
  to remove the new re-exports (Orchestrator, AnalysisAgent, etc.) and
  src/secondsight/storage/__init__.py to remove AnalysisRunsRepository
  + SessionReportsRepository. The new tables are created lazily via
  metadata.create_all(checkfirst=True); a fresh intelligence.db will
  not contain them unless the repository is instantiated.

  Disable directives.identity_key migration: the column has
  server_default="" so existing rows would not break, but any
  upsert_with_identity_key call would fail constraint check. Roll back
  by reverting bf36268's directives_table.py + directives_repository.py
  changes.

  Full removal: `rm -rf src/secondsight/analysis/{orchestrator,behavior,
  aggregator,agent}.py src/secondsight/storage/{analysis_runs,session_reports}_*.py
  tests/analysis/test_{agent_protocol,behavior,aggregator,orchestrator}.py
  tests/analysis/_fake_agent.py tests/storage/test_{analysis_runs,
  session_reports}_repository.py changes/2026-05-06_gur-102_phase2-analysis-orchestration/`
  + git revert bf36268 fd02802.

