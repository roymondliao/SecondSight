narrative: >
  Task-5 closes the orchestration layer (GUR-102 Phase 2). The key design decision
  was how to collect SegmentAnalysis objects for the summary prompt step without
  either doubling LLM calls (option c from the task spec) or modifying the
  task-3 behavior.py files (option b). Option (d') was chosen: the orchestrator
  calls agent.analyze_segments once per segment, then uses helpers from behavior.py
  (validate_draft_pre_insert, promote_draft -- now public) to replicate the
  validate+promote+insert pipeline directly.

  Post-review fixes (2026-05-07):
  - CRITICAL-1: Promoted _validate_draft_pre_insert and _promote_draft to public
    (validate_draft_pre_insert, promote_draft) in behavior.py and added both to
    __all__. Updated orchestrator.py import and all internal call sites.
  - IMPORTANT-1: Renamed AnalyzeSessionResult.flags_inserted to flags_attempted
    with a docstring note clarifying it counts LLM-emitted-and-validated flags,
    not newly-persisted DB rows.
  - IMPORTANT-3: Added Thread safety note to _check_already_analyzed docstring
    documenting the check-then-act race condition and the v1 single-trigger assumption.
  - IMPORTANT-4: Added Failure semantics block to analyze_session docstring
    distinguishing record_failure-succeeds vs record_failure-also-fails cases.
  - SUGGESTION-1: Added Protocol-violation guard after analyze_segments call;
    returns AnalysisAgentError if result count != 1 (rather than IndexError).
  - SUGGESTION-2: Applied _ensure_utc() to min(updated_at) in the stale-directives
    log message so the isoformat() output is always UTC-aware.

  The datetime timezone issue (_ensure_utc helper) was discovered during test
  execution: SQLite stores datetimes without timezone, so naive datetimes from
  the DB cannot be directly compared with UTC-aware threshold datetimes. The
  helper was added and verified via DT-5.5.

  All four DC closures (DC-1, DC-4, DC-7, DC-8) are verified by death tests.
  The full suite passes at 640 tests.

