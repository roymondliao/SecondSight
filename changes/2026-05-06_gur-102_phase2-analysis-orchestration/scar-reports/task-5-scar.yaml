completion_status: done

known_shortcuts:
  - description: >
      SegmentAnalysis collection for the summary step uses option (d'): orchestrator
      calls agent.analyze_segments once per segment and then runs the validate+promote+
      insert logic from behavior.py directly (via the now-public validate_draft_pre_insert
      and promote_draft helpers). This replicates the behavior.py detection logic
      in _persist_segment_flags. If behavior.py's validation rules change (new guard,
      new field), _persist_segment_flags must also be updated. The replication is
      intentional to avoid doubling LLM calls (option c) or modifying task-3 files
      (option b). Documented in module docstring under "SegmentAnalysis collection"
      decision log.
    deferred_to_feature_iteration: false

  - description: >
      Sequential per-segment detect calls. No concurrent batching in v1. The
      agent.analyze_segments batched form (len > 1) is the seam where concurrency
      would land. GUR-103 may add concurrent segment processing; this orchestrator's
      loop is the correct place for that change (not inside detect_segment_flags).
      Cost: for sessions with many segments, the total wall-clock time scales
      linearly with segment count x per-LLM-call latency.
    deferred_to_feature_iteration: true

  - description: >
      _verify_session_complete checks only for event count > 0, not for the
      presence of a SESSION_END event. This is intentional (see module docstring):
      an absent SESSION_END may be valid at trigger time, and checking it would
      produce false positives. However, a session that was partially ingested
      (has events but not SESSION_END) will pass the verifier and receive a
      partial analysis. The partial analysis is not detectable from the
      orchestrator layer alone.
    deferred_to_feature_iteration: false

  - description: >
      STALE_DIRECTIVES_THRESHOLD_DAYS = 30 is hard-coded with a TODO comment.
      Configurable via analysis_config.toml (SD §11 line 1392) is deferred.
      Mirroring task-4's DEFAULT_CONVENTION_TOP_N pattern: the constant is
      named and exported so callers can see it, but there is no runtime override
      path yet.
    deferred_to_feature_iteration: true

  - description: >
      Circular import between analysis/__init__.py (which re-exports orchestrator
      symbols) and storage repositories (which import analysis.schemas). Resolved
      by guarding repository type imports under TYPE_CHECKING in orchestrator.py.
      Same pattern as task-3 (behavior.py) and task-4 (aggregator.py).
      Runtime duck-typing suffices; mypy/pyright enforce static types.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      Filesystem JSON backup failure propagates to the outer pipeline boundary
      and causes stage='failed'. The DB record is the authoritative source; the
      filesystem backup is secondary. If the backup path's parent directory cannot
      be created (e.g., permissions, disk full), the entire analysis run fails --
      even though the DB already has the SessionReport. This is a conservative
      choice: failing loudly is preferable to silently omitting the backup.
      Operators who do not use the filesystem backup path may consider this
      over-strict.
    deferred_to_feature_iteration: false

  - description: >
      _log_if_directives_stale reads get_active_conventions() in the hot path of
      analyze_and_aggregate's short-circuit. If the directives table is large
      (many active conventions), this adds a DB read on every zero-flag short-circuit.
      In v1 with top_n=15, the table has at most 15 active rows per project, so
      the read cost is negligible. This assumption is documented here; if the
      table grows (multi-project, high cardinality), the read should be scoped
      to COUNT or limited.
    deferred_to_feature_iteration: false

  - description: >
      SQLite stores datetime without timezone. The _ensure_utc() helper normalizes
      naive datetimes to UTC by attaching timezone.utc. This works correctly as
      long as all DB writes use UTC-aware datetimes (verified: all repository writes
      use datetime.now(tz=timezone.utc)). If a future migration or manual SQL edit
      writes a non-UTC naive datetime, _ensure_utc would silently misinterpret it
      as UTC, producing a wrong stale-directives comparison.
    deferred_to_feature_iteration: false

  - description: >
      _check_already_analyzed reads the LATEST run for the session. If multiple
      concurrent analyze_session calls are made for the same session_id (race
      condition in GUR-103's trigger), both may pass the idempotency check before
      either inserts a run row. Both would proceed to start_run and run the full
      pipeline in parallel. The DB constraints (UPSERT on session_id in
      session_reports) would preserve one report, but two analysis_runs rows would
      exist and two sets of LLM calls would be made. This is acceptable for v1
      where GUR-103 is expected to be a single-threaded trigger. The race condition
      is now explicitly documented in _check_already_analyzed's docstring.
    deferred_to_feature_iteration: false

  - description: >
      record_failure inside the outer try/except has a nested try/except that
      swallows inner exceptions from record_failure itself (DB connection lost,
      etc.). If record_failure fails, the analysis_runs row remains at a non-terminal
      stage (e.g., 'segmented') with no error_message, and count_recent_partial
      will count it as a stuck run. The outer exception still propagates; the
      only loss is the failure audit trail for that specific run. The dual-failure
      semantics are now documented in analyze_session's docstring under
      "Failure semantics".
    deferred_to_feature_iteration: false

