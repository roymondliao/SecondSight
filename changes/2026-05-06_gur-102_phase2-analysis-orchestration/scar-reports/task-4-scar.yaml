completion_status: done

known_shortcuts:
  - description: >
      All-or-nothing per project run is simpler than partial-commit with
      reconciliation. Cost: one LLM failure on flag_type N requires re-running
      flag_types 1..N-1. Acceptable because per-call cost is small (Haiku) and
      total fan-out is bounded (≤ 7 flag types in v1). A partial-commit design
      would need a transactional staging table or two-phase merge, which is
      disproportionate to the problem size at v1.
      NOTE: this shortcut applies to Step 2 (LLM fan-out) only. Step 3 (DB
      UPSERTs) is per-row transactional, not atomic across the loop — see
      silent_failure_conditions for the Step 3 partial-write entry.
    deferred_to_feature_iteration: false

  - description: >
      DEFAULT_CONVENTION_TOP_N=15 hard-coded with a TODO comment.
      Configurable via analysis_config.toml (SD §11 line 1392) is deferred
      to the pre-thinking G2 rationale. The constant is named and exported
      so callers can override via the top_n parameter; the default is not
      buried in magic.
    deferred_to_feature_iteration: true

  - description: >
      BehaviorFlag.intent_summary → FlagSummary.segment_summary field name
      adaptation. The FlagSummary Pydantic model (prompts/aggregate.py) uses
      segment_summary; BehaviorFlag (schemas.py) uses intent_summary. The
      aggregator bridges this at the Step-1 mapping site with an inline comment.
      If FlagSummary's field is ever renamed, this adaptation site will silently
      break at runtime (Pydantic will reject the unknown field name). Verified:
      FlagSummary has model_config = ConfigDict(extra="forbid"), so a wrong field
      name raises ValidationError at construction — NOT silently accepted.
    deferred_to_feature_iteration: false

  - description: >
      Circular import between analysis/__init__.py and storage repositories.
      Resolved by guarding BehaviorFlagsRepository and DirectivesRepository
      imports under TYPE_CHECKING in aggregator.py. Runtime duck-typing suffices
      since the repositories are passed as arguments (not constructed inside
      the module). mypy/pyright enforce the type contract statically.
      Cost: if someone imports BehaviorFlagsRepository from analysis.aggregator
      at runtime, they get an ImportError. That path doesn't exist in the current
      codebase; it's an architectural oddity to document.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      Step 3 (DB UPSERTs) is per-row transactional, NOT atomic across the
      loop. Each directive UPSERT is its own engine.begin() transaction. If the
      K-th UPSERT raises (DB lock timeout, _guard ValueError, IntegrityError,
      disk full), K-1 directives have been written and N-K have not. The caller
      receives an exception, not an AggregateProjectResult. Retry is
      idempotent-safe (UPSERT by identity_key converges), but the caller cannot
      distinguish Step 2 vs. Step 3 failure from the exception type alone.
      Documented in module docstring Failure semantics section (task-5
      orchestrator contract).
    deferred_to_feature_iteration: false

  - description: >
      Top-N tie-break uses Python's tuple sort on (flag_type.value ASC,
      pattern_description ASC). If BehaviorFlagType enum values are changed
      or new values added with names that sort differently, the tie-break
      order changes — silently producing different directive selections across
      versions without any error. The affected surface is narrow (only ties
      at the top_n boundary) and the impact is cosmetic (different but equally
      valid directives selected), not data corruption.
    deferred_to_feature_iteration: false

  - description: >
      frequency = occurrence_count / flags_read. If flags_read=0 (empty
      project), frequency=0.0 as documented. However, occurrence_count > 0
      with flags_read=0 is geometrically impossible (patterns emerge from
      flags, so no flags means no patterns). The guard is there for defensive
      completeness, not a reachable case in well-formed inputs.
    deferred_to_feature_iteration: false

  - description: >
      aggregate_project_flags iterates BehaviorFlagType enum members in
      definition order (Python enum iteration order). If the enum is ever
      re-ordered (e.g., a new member inserted between existing members),
      the iteration order changes, changing which flag_type LLM call is made
      first. Since the all-or-nothing contract propagates on the FIRST failure,
      re-ordering could change which partial work was done before a failure —
      affecting retry cost. This is acceptable because the output (directives)
      is order-independent; only the failure recovery footprint changes.
    deferred_to_feature_iteration: false

  - description: >
      FakeAnalysisAgent used in tests keyed by prompt string verbatim.
      If build_aggregate_prompt changes its output format (e.g., field ordering
      in JSON changes, new section added), all tests that pre-compute prompt
      keys will start raising KeyError — failing loudly. This is a good failure
      mode (tests break, not production), but it means a prompt builder change
      requires updating all test prompt-key computations.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      BehaviorFlag.intent_summary is the correct field to map to
      FlagSummary.segment_summary (verified by reading schemas.py line 98
      and prompts/aggregate.py FlagSummary definition).
    verified: true
    note: >
      Confirmed: schemas.py defines `intent_summary: str` on BehaviorFlag
      (line 98). prompts/aggregate.py defines `segment_summary: str` on
      FlagSummary (line 45). The adaptation is explicit at the Step-1
      mapping site in aggregator.py.
    deferred_to_feature_iteration: false

  - assumption: >
      BehaviorFlagType enum iteration via `for flag_type in BehaviorFlagType`
      produces a stable, well-defined order.
    verified: true
    note: >
      Python enums iterate in definition order. BehaviorFlagType is defined
      in schemas.py with six members in a fixed order. This is stable across
      Python 3.11+ (CPython guarantees definition order for str Enum).
    deferred_to_feature_iteration: false

  - assumption: >
      upsert_with_identity_key raises ValueError on empty identity_key, not
      silently no-ops. (DC-6 depends on this guard.)
    verified: true
    note: >
      Confirmed: directives_repository.py line 159-164 raises ValueError
      explicitly when identity_key is empty.
    deferred_to_feature_iteration: false

  - assumption: >
      The all-or-nothing contract works because no database writes occur
      until Step 3. Step 2 only calls the LLM and accumulates patterns in
      memory. This is verified by the implementation structure.
    verified: true
    note: >
      Confirmed: aggregator.py collects all_patterns in a list during Step 2
      (memory only) and only calls directives_repo.upsert_with_identity_key
      in Step 3 after all LLM calls succeed.
    deferred_to_feature_iteration: false

  - assumption: >
      The circular import between analysis/__init__.py (which re-exports
      aggregator symbols) and storage.behavior_flags_repository (which imports
      analysis.schemas) can be broken by guarding storage imports under
      TYPE_CHECKING without breaking runtime behavior.
    verified: true
    note: >
      Verified: full test suite passes (628 tests) with the TYPE_CHECKING guard.
      The repositories are only referenced as type annotations in function
      signatures; at runtime they are passed as arguments and accessed via
      duck typing. No isinstance() checks on the repo types in aggregator.py.
    deferred_to_feature_iteration: false

