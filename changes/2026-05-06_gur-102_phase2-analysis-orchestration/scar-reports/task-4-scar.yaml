  - original_section: aggregator.py:186 (IMPORTANT-2)
    original_description: >
      Redundant `flags_read = flags_read_total` alias at line 186 adds noise
      and creates two names for the same value. The empty-project short-circuit
      hardcoded flags_read=0 literal rather than using the accumulated variable.
    resolution: >
      Removed the alias. `flags_read_total` is used directly throughout
      (frequency division, both return sites). The empty-project short-circuit
      now uses flags_read=flags_read_total (invariant is explicit, not relying
      on literal 0 matching the accumulator value).

