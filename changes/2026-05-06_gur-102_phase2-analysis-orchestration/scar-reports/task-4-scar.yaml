narrative: >
  Task-4 implements the cross-session aggregator (SD §5.5.3) closing death cases
  DC-3, DC-5, DC-6. The critical design decision was the circular import between
  the analysis package (which re-exports aggregator symbols in __init__.py) and
  the storage repositories (which import analysis.schemas). This was discovered
  during the full-suite run and resolved by guarding repository type imports under
  TYPE_CHECKING — a standard Python pattern for breaking import cycles while
  preserving static type checking.

  The field name adaptation (BehaviorFlag.intent_summary → FlagSummary.segment_summary)
  was noted in the task description and verified against both schemas before
  implementation. The adaptation is a single explicit mapping in Step 1 with an
  inline comment.

  DT-4.3 required a custom _PartialFailureAgent (not the shared FakeAnalysisAgent)
  because FakeAnalysisAgent's raise_on_aggregate_call is all-or-nothing (all calls
  fail). A partial-failure scenario (first succeeds, second fails) needed a
  stateful call counter.

