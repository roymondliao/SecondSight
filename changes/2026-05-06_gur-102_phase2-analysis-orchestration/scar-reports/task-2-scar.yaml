    deferred_to_feature_iteration: false

  - assumption: >
      FakeAnalysisAgent lives in the test file (not a shared _helpers module).
      Task-3/4/5 implementers will import from tests/analysis/test_agent_protocol.py
      or copy/re-implement as needed — the task spec says "task-3/4/5 will
