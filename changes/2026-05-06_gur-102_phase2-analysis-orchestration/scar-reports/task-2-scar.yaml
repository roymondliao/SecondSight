task_id: task-2
completion_status: done

known_shortcuts:
  - description: >
      Three explicit methods on the Protocol (not a generic dispatcher).
      This locks GUR-103 into providing exactly analyze_segments /
      aggregate_flag_type / summarize_session as separate async methods.
      A future `analyze[T](prompt: str) -> T` generic form is explicitly
      rejected (requires runtime type-tag plumbing). If a fourth method
      is needed, the Protocol will require a new method and a FakeAnalysisAgent
      update — acceptable because Protocol changes are explicit contracts.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      @runtime_checkable checks method NAMES only, not signatures or async-ness.
      A GUR-103 implementation with sync methods (not async) would still pass
      isinstance(impl, AnalysisAgent) at import time, but raise TypeError at
      call time when the orchestrator awaits the result. The caller sees a
      TypeError, not an AnalysisAgentError — so the orchestrator's
      skip-vs-fail-loud decision path is bypassed. mypy catches this at type-check
      time, but only if GUR-103 annotates the implementation with the Protocol type.
      Documented at both the Protocol class docstring (IMPORTANT-1 fix) and in
      test DT-2.2 comment.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      SegmentAnalysis, AggregateOutput, and SummaryOutput exist in their
      documented module locations with the field shapes used in the tests
      (segment_summary: str, flags: list[BehaviorFlagDraft], etc.).
    verified: true
    note: >
      Read src/secondsight/analysis/schemas.py and prompts/aggregate.py and
      prompts/summary.py directly. All three models exist with the expected
      field shapes. AggregateOutput.patterns is list[AggregatePattern],
