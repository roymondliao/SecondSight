    verified: true
    note: >
      The task spec explicitly states this placement. CRITICAL-1 fix moved
      FakeAnalysisAgent from src/secondsight/analysis/agent.py (where it
      was incorrectly shipped) to tests/analysis/test_agent_protocol.py.
      If cross-task import becomes awkward, a tests/analysis/conftest.py
