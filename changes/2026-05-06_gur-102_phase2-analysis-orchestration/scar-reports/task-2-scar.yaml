      asyncio.to_thread or similar — that is GUR-103's problem per the task spec.
    verified: false
    note: >
      Cannot verify without reading GUR-103's scope. If PydanticAI's API has
      changed to be sync-only, this Protocol design forces unnecessary
      asyncio.to_thread overhead. The async-first rationale stands (PydanticAI
      is documented as async-native in GUR-103's description).
    deferred_to_feature_iteration: false

debt_registered: false
debt_location: >
  No outstanding debt after targeted fixes. All CRITICAL and IMPORTANT items
  from yin/quality reviews resolved. The remaining silent_failure_condition
  (@runtime_checkable signature-blindness) is a structural Python limitation —
  documented in the Protocol docstring and DT-2.2 test comment, not a debt item.

narrative: >
  Task-2 ships the typed seam between GUR-102 and GUR-103: the AnalysisAgent
  Protocol, AnalysisAgentError, and FakeAnalysisAgent. The Protocol body was
  copied verbatim from the 2-plan.md D1 ratified decision. FakeAnalysisAgent
  uses prompt-string keying for aggregate_outputs (documented choice: explicit
  over substring-search). Death tests cover all seven documented failure modes
  (5 original + DT-2.6 + DT-2.7 from yin review remediation).

  Yin reviewer returned FAIL with 3 Critical findings; quality reviewer returned
  PASS_WITH_CONCERNS with 2 Important findings. Targeted remediation round:
  CRITICAL-1 moved FakeAnalysisAgent to test file; CRITICAL-2 + CRITICAL-3 fixed
  exception types; IMPORTANT-1 + IMPORTANT-2 added bets + runtime_checkable
  warning to Protocol docstring. Final: 604 passed (3 new tests added), 0 failures.

resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Module-level pytestmark = pytest.mark.asyncio caused PytestWarning on
      3 sync test methods in the test file.
    resolution: >
      Removed pytestmark and added @pytest.mark.asyncio explicitly only to
      async test methods. 3 warnings eliminated. Tests still pass: 13/13.
      Full suite: 601 passed, 184 warnings (3 fewer than before fix).

  - original_section: known_shortcuts (CRITICAL-1)
    original_description: >
      FakeAnalysisAgent was shipped in src/secondsight/analysis/agent.py
      (production code). Test double was importable as
      `from secondsight.analysis.agent import FakeAnalysisAgent` from any
      production path, and agent.py was 154 lines instead of ~65.
    resolution: >
      Moved FakeAnalysisAgent class definition entirely from agent.py to
      tests/analysis/test_agent_protocol.py (placed after imports, before
      fixture helpers and test classes). Updated import in test file from
      `from secondsight.analysis.agent import ..., FakeAnalysisAgent` to
      `from secondsight.analysis.agent import AnalysisAgent, AnalysisAgentError`.
      agent.py is now 72 lines (module docstring + imports + AnalysisAgentError
      + AnalysisAgent Protocol only). No other files imported FakeAnalysisAgent
      from the production path. Full suite: 604 passed.

  - original_section: known_shortcuts (CRITICAL-2)
    original_description: >
      FakeAnalysisAgent.analyze_segments slices segment_outputs by
      len(prompts) rather than asserting len(segment_outputs) >= len(prompts).
      If a test passes 3 prompts but only configured 2 outputs, the call
      silently returns 2 items (not 3), violating the Protocol's len(out)==len(in)
      contract without raising any error.
    resolution: >
      Added guard at top of analyze_segments: when len(prompts) > len(self._segment_outputs),
      raises AnalysisAgentError naming the count mismatch (not RuntimeError,
      not AssertionError — uses the Protocol's declared exception type).
      Added DT-2.6 death test verifying the path raises AnalysisAgentError
      with the count mismatch message. Added HP-2.9 confirming spare outputs
      (more outputs than prompts) are still valid. Full suite: 604 passed.

  - original_section: silent_failure_conditions (CRITICAL-3)
    original_description: >
      FakeAnalysisAgent.summarize_session raises RuntimeError (not AnalysisAgentError)
      when called with no summary_output configured. A caller using
      `except AnalysisAgentError:` (which is what GUR-102 task-5 orchestrator
      tests will do) would silently bypass this RuntimeError.
    resolution: >
      Changed `raise RuntimeError(...)` to `raise AnalysisAgentError(...)` in
      summarize_session. aggregate_flag_type has no parallel RuntimeError path
      (it raises KeyError for missing key, which is intentional test-setup-error
      signal — unchanged per yin reviewer guidance). Added DT-2.7 death test
      verifying summarize_session raises AnalysisAgentError (not RuntimeError)
      on missing summary_output. Full suite: 604 passed.

  - original_section: silent_failure_conditions (IMPORTANT-1 + IMPORTANT-2)
    original_description: >
      @runtime_checkable signature-blindness was documented only in the test
      (DT-2.2 comment), not at the Protocol definition site. A GUR-103
      implementer reading agent.py directly would infer stronger isinstance
      guarantees than the decorator provides. The async-first and all-or-nothing
      batch bets were documented in the module header and method bodies, but
      not at the class signature.
    resolution: >
      Added comprehensive class-level docstring to AnalysisAgent Protocol
      documenting: (a) the three planning-gate bets (async-first,
      all-or-nothing batch, three explicit methods) and (b) the
      @runtime_checkable limitation warning (isinstance checks names only —
      not signatures, param types, return types, or async-ness; mypy catches
      the rest). Both items are now visible to a GUR-103 implementer reading
      agent.py directly without needing to cross-reference the test file.
