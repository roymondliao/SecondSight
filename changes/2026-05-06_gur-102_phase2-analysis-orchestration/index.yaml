      - "DT-2.2 isinstance conformant class True; non-conformant False"
      - "DT-2.3 analyze_segments len contract"
      - "DT-2.4 raise_on_*_call flags raise AnalysisAgentError"
      - "DT-2.5 Pydantic validation at fake-construction"
      - "DT-2.6 underconfigured analyze_segments raises AnalysisAgentError (added in fix pass; closes silent truncation)"
      - "DT-2.7 missing summary_output raises AnalysisAgentError (added in fix pass; closes RuntimeError leak)"
    expected_scar_items:
      - "Three explicit methods (analyze_segments / aggregate_flag_type / summarize_session) instead of generic dispatch — chosen for type-clarity + GUR-103 ergonomics"
      - "Async-first (PydanticAI alignment); sync callers wrap at GUR-103 boundary"
      - "@runtime_checkable signature-blindness — accepted Python limitation, documented at Protocol site + DT-2.2"
    status: done
    scar_count: 8  # initial + fix pass items
    resolved_count: 5  # CRITICAL-1/2/3 + IMPORTANT-1/2 all closed in fix pass
    unresolved_assumptions: 1  # @runtime_checkable name-only check (Python limitation, not fixable here; documented)
    review_status: "PASS — yin + quality re-review post-fix; both PASS with zero concerns. One yin Suggestion (test class organization for raise_on_*_call tests) deferred to feature iteration."
    test_count_delta: "+13 tests (591 → 604)"  # 5 death + 8 happy initially, then +DT-2.6 +DT-2.7 +HP-2.9 in fix pass
    file_summary: "agent.py 72 lines (Protocol+Exception only); test_agent_protocol.py 465 lines (FakeAnalysisAgent + tests)"
    depends_on: []

  - id: task-3
