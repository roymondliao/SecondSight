      - "intent_summary filled from FLAG_DEFINITIONS[flag_type].description (frozen SD §5.5.1 content)"
    status: done
    scar_count: 13  # initial scar items + review-pass findings
    resolved_count: 7  # 3 Critical + 2 Important + 2 Suggestions all closed in fix pass
    review_status: "PASS — yin + quality re-review post-fix; both PASS. CRITICAL-2 (empty event_ids), CRITICAL-3 (parallel _VALID_CONFIDENCE), IMPORTANT-1 (hash-collision narrowing via full event_ids+reason), IMPORTANT-2 (return-value semantics warning at call site), SUGGESTION-1 (single-element list comment), SUGGESTION-2 (AnalysisAgentError import cleanup) all closed."
