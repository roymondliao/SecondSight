      - "DT-4.6 compute_identity_key stability (order-independent)"
      - "DT-4.7 negative top_n raises ValueError; zero is valid no-op (added in fix pass)"
    expected_scar_items:
      - "DEFAULT_CONVENTION_TOP_N=15 hard-coded with TODO; AnalysisConfig deferred"
      - "All-or-nothing applies to Step 2 only; Step 3 is per-row transactional with UPSERT-idempotent retry semantics"
      - "Step 3 mid-loop failure indistinguishable from Step 2 failure by exception type alone — caller must inspect DB via get_active_conventions to disambiguate"
      - "TYPE_CHECKING guard for repository imports (mirrors task-3 circular-import resolution)"
    status: done
    scar_count: 13  # initial scar items + fix-pass + reviewer findings
    resolved_count: 7  # 2 Important + 3 Suggestions from initial reviews + 2 self-iter findings (intent_summary mapping, circular import)
    unresolved_assumptions: 2  # top_n upper-bound asymmetry (Suggestion); Step3WriteError wrapper (Suggestion deferred to feature iteration)
    review_status: "PASS — yin + quality re-review post-fix; yin PASS with 1 Suggestion; quality PASS_WITH_CONCERNS with 2 Suggestions (top_n upper-bound stated; potential Step3WriteError typed wrapper). Both prior Important findings (alias + soundproof framing) closed. D-principle concern downgraded to Suggestion because defect is now disclosed rather than hidden."
    test_count_delta: "+15 tests (611 → 630)"  # 6 death + 7 happy initially, +DT-4.7 (2 tests) in fix pass
    file_summary: "aggregator.py 272 lines; test_aggregator.py 1002 lines (heaviest in this PR — multi-stage pipeline coverage)"
    depends_on: [task-1, task-2]

  - id: task-5
    title: "analysis/orchestrator.py — composer with consumer-not-recoverer + short-circuit"
    plan_ref: "MH-5 (D4, D6, D7, DC-1, DC-4, DC-7, DC-8)"
    sd_ref: ["5.6"]
    death_tests:
      - "DT-1.1 KILL between stage transitions leaves audit row"
      - "DT-1.4 completed session requires force=True"
      - "DT-1.6 zero events raises consumer-not-recoverer"
      - "DT-1.7 summary failure leaves resumable state"
      - "DT-1.9 short-circuit logs when directives stale"
      - "HP-3.1 full pipeline evidence chain"
      - "HP-3.3 zero-flag short-circuits aggregator"
      - "HP-3.4 force re-run idempotent with audit trail"
    expected_scar_items:
      - "_verify_session_complete is verifier-only (does NOT recover GUR-99 backfill failures)"
      - "Sequential per-segment detector calls (no concurrent batching in v1; GUR-103 may add)"
      - "Outer try/except Exception at pipeline boundary — ONE place catch-all is acceptable in this PR (records analysis_runs.stage='failed' before re-raise)"
