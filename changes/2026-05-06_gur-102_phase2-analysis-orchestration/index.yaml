# Step 0 commitments (samsara — recorded for audit):
#   1. Most-wanted shortcut REJECTED:
#        "fold session reports into analysis_runs.summary_json"
#      because pipeline-run identity ≠ artifact identity; folding pushes
#      an incidental run-filter into every dashboard query forever
#      (Sebastian round-2 G1 override).
#   2. This implementation MUST NOT ship when:
#        - SD §7 patches for analysis_runs + session_reports tables are absent from the PR diff
#        - The orchestrator's _verify_session_complete is missing or downgraded to "best effort"
#        - aggregator's identity_key UPSERT is missing or computed from input flags rather than emerged patterns (DC-6)
#        - Re-run on completed session does not require force=True (DC-4)
#   3. Silent failure surface this PR closes:
#        - Pipeline killed mid-stage with no DB audit row (DC-1)
#        - Behavior detector partial commit (DC-2)
#        - Aggregator silently truncates ties at top_n boundary (DC-3)
#        - Silent re-LLM on completed sessions (DC-4)
#        - Aggregator reads stale flags after retention purge without disclosure (DC-5)
#        - Identity-key collision across distinct emerged patterns (DC-6)
#        - Consumer-not-recoverer violation runs vacuously (DC-7)
#        - Short-circuit elides aggregation when conventions are stale (DC-8)
#   4. What lives one year from now:
#        AnalysisAgent Protocol (most load-bearing — every Phase 2/3
#        agent integration depends on it); the two new tables; the
#        identity_key UPSERT contract on directives. Orchestrator class
#        is most replaceable.

