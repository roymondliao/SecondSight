  - id: task-1
    title: "Storage layer: analysis_runs + session_reports tables and repos; directives.identity_key migration"
    plan_ref: "MH-1 (D2 + D3)"
    sd_ref: ["7.3", "7.4"]
    death_tests:
      - "DT-1.1 partial-write on KILL between stage transitions (analysis_runs row at entry, not exit)"
      - "Repository _guard rejects empty identity_key on directives upsert"
      - "session_reports UNIQUE(session_id) UPSERT on second insert"
    expected_scar_items:
      - "Hardcoded server_default='' on identity_key transitional only — flag for v2 cleanup once first row written"
      - "analysis_runs stage validation lives at repository (mirrors GUR-100 D1 enum guard)"
    status: done
    scar_count: 12  # initial scar items + fix-pass resolutions
    resolved_count: 8  # all 3 Critical + 5 Important findings from review pass 1 closed in fix pass
    unresolved_assumptions: 1  # ALTER TABLE migration path for non-empty existing DBs (genuinely deferred to feature iteration)
    review_status: "PASS — yin + quality re-review post-fix; both PASS. Two Suggestions remain (fragile test assertion message check; count_recent_partial ghost promise) — both deferred to feature iteration."
    test_count_delta: "+8 tests (583 → 591)"  # 8 new death + happy tests including 5 from fix pass
    depends_on: []

