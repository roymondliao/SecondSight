    plan_ref: "MH-3 (DC-2)"
    sd_ref: ["5.5.2"]
    death_tests:
      - "DT-3.1 batch-validation-before-insert atomicity (DC-2)"
      - "DT-3.2 agent failure does not partial-write"
      - "DT-3.3 empty SegmentAnalysis returns zero, no insert"
      - "DT-3.4 confidence guard at pre-insert"
      - "DT-3.5 empty event_ids raises before insert"
    expected_scar_items:
