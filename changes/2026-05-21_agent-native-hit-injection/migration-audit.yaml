# ============================================================
# BOUNDARY NOTES — files adjacent to deletion scope
# (Layer C: open decision register; resolved once task-4 acts)
# ============================================================

boundary_notes:

  - note: >
      src/secondsight/feedback/prompt_guidance.py is NOT in the deletion scope
      despite being imported by injection.py's user-prompt handler and by
      prompt_evaluator.py. The overview.md lists deletion of the prompts/feedback/
      templates (classifier.jinja2 + guidance/ folder) but does NOT list
      prompt_guidance.py itself.

      After task-4 deletes prompt_evaluator.py and the user-prompt handler,
      prompt_guidance.py will have NO remaining callers in src/ or scripts/ or
      tests/ (confirmed by grep — tests/feedback/test_prompt_guidance.py is its
      only test, and that file tests only guidance_for_category and bypass_registry
      which are otherwise unused after the deletion).

      RECOMMENDED DEFAULT for task-4: delete prompt_guidance.py AND
      tests/feedback/test_prompt_guidance.py as dead code. Rationale: keeping
      dead code with no callers creates silent rot — a future import will
      succeed without triggering any behavior, and a future developer will not
      know whether it is safe to remove. Delete unless task-4 finds evidence
      of an external caller not covered by this audit (e.g., a dynamically
      constructed import, or a caller outside src/ scripts/ tests/).
      If task-4 chooses to retain them as dormant, document the decision
      explicitly in the task-4 scar report.

  - note: >
      tests/feedback/test_prompt_guidance.py exists and is NOT in the primary
      grep hits (it does not reference "prompt_evaluator" or the route URL).
      It will become a test file that tests unreachable code after deletion.
      Per the recommended default above, task-4 should delete it along with
      prompt_guidance.py unless evidence of external callers exists.

  - note: >
      _resolve_cli_agent_from_state in injection.py has no external callers
      (confirmed by grep). It can be co-deleted with the user-prompt handler
      without any other surgical changes required.

