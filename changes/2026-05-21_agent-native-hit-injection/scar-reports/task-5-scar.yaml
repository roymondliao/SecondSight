# ============================================================
# STEP 0 prerequisite answers
# ============================================================

step_0_answers:
  q1_path_resisted: >
    The easiest path was a one-liner inline comment like
    "# also serves as contamination tripwire" on the confidence field.
    Avoided that because it omits the invariant reference path, leaving
    future readers unable to find the framing. Chose Field(description=...)
    instead, which makes the dual-role text visible in model_fields inspection
    and in generated OpenAPI schema — durable, not just source-readable.

  q2_when_not_to_implement: >
    Should not have been implemented if: (a) the confidence field were
    about to be renamed or removed (not the case), or (b) the dual-role
    text were already documented elsewhere that would be the canonical
    location (it was not — the class docstring mentioned confidence only
    as a Pydantic validation death case in the module header).

  q3_silent_failure_first_discoverer: >
    If this docstring were vague or omitted the invariant reference, the
    failure path is: distribution-shift contamination occurs (meta-injection
    wrapper artefacts inflate low-confidence flags), the low-confidence ratio
    spikes, but the on-call operator sees only "more low confidence flags"
    with no documented link to contamination detection. They fix individual
    flags as data quality issues rather than halting the pipeline. By the
    time the pattern is recognized, weeks of sessions may have produced
    contaminated directives. The operator (yuyu_liao) would be the first
    discoverer — but only after the directive pool has drifted.

# ============================================================
# Known shortcuts
# ============================================================

known_shortcuts:
  - item: >
      BehaviorFlagDraft.confidence (the LLM-emitted shape, schemas.py line 120)
      was NOT given the same Field(description=...) annotation. The dual-role
      rationale applies to the persisted form (BehaviorFlag); Draft is a
      transient shape that is promoted before any monitoring occurs.
      Omitting the annotation on Draft is intentional, not an oversight.
    risk: low
    deferred_to_feature_iteration: false

# ============================================================
# Silent failure conditions
# ============================================================

silent_failure_conditions:
  - condition: >
      Future maintainer changes confidence from Literal["high","medium","low"]
      to a different type (e.g., float 0.0-1.0) and forgets to migrate the
      Field description. The description would then reference "low" as a
      string value that no longer exists, making the operational instruction
      ("monitor the 'low' ratio") meaningless.
    detection: >
      No automated guard. The description is a free-form string; Pydantic
      does not enforce cross-referencing between description text and the
      Literal values. A co-modification reminder in the description itself
      ("if confidence type changes, update this description") would be the
      lowest-cost guard but was not added — the description is already long
      and the risk is low given the field's stated stability.
    severity: low

  - condition: >
      OpenAPI spec generation omits field-level descriptions if the schema
      generator does not walk FieldInfo.description. This would silently
      drop the dual-role text from any auto-generated API docs. However,
      the description is still visible via model_fields inspection and in
      source code, so this is a documentation reach issue, not a runtime issue.
    detection: >
      python -c "from secondsight.analysis.schemas import BehaviorFlag;
      print(BehaviorFlag.model_fields['confidence'])" confirms the
      description is present. Test added in verification step.
    severity: very_low

