# ============================================================
# Silent failure conditions
# ============================================================

silent_failure_conditions:
  - description: >
      If a future change re-introduces a sidecar classifier (resurrects
      prompt_evaluator.py or registers /hook/injection/user-prompt/{agent}),
      DT-8 + DT-9 will catch it on the next CI run. The Q1 framing of
      this entire change chain explicitly forbids this; re-introduction
      requires re-litigating the research-stage decision.
    deferred_to_feature_iteration: false

  - description: >
      If a developer copies user-prompt.sh to a new hook (e.g.,
      another_user_prompt.sh) without removing the new Python invocation
      block, the new hook will silently inject into a different event
      type's flow. Mitigation: hook script is registered by name in
      Claude Code settings; copying doesn't auto-register.
    deferred_to_feature_iteration: true

