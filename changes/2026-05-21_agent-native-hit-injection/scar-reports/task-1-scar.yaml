    finding: >
      task-4.md DT-8's grep scope was `src/ tests/` — same fractal bug as the
      original Critical #1. Post-deletion validation would silently green-light
      a deletion that left scripts/hooks/user-prompt.sh:118 intact.
    resolution_strategy: >
      Inline TODO note added above DT-8 in task-4.md; DT-8 grep command in the
      spec updated to include scripts/. task-4 implementer will see both the
      note and the corrected spec when they read task-4.md at task-4 start.
    deferred_to_feature_iteration: false
    deferred_to: task-4
    severity_if_unfixed: critical-adjacent (would re-introduce silent rot in validation)

  - id: dot-codex-extended-scope-doc
    source: samsara:code-reviewer (yin) — re-review, Important
    finding: >
      `.codex/` not listed in migration-audit.yaml extended_scope_audit
      searched-paths block. A direct grep confirms no matches, so no live
      reference is missed — but the audit claim "verified by grep run" is not
      fully documented.
    resolution_strategy: >
      Documentation gap only; no live finding. Accepted as Suggestion-level.
      If task-4 finds a `.codex/` reference at audit-replay time, escalate.
    deferred_to_feature_iteration: true
    severity_if_unfixed: low (documentation completeness)

  - id: task-4-coupling-residual
    source: samsara:code-quality-reviewer — re-review, Suggestion
    finding: >
      task-4.md "Delete entire file" enumerates individual guidance/*.jinja2
      while migration-audit.yaml records guidance/ as a single
      `delete-entire-directory`. Non-isomorphic enumeration; if a file is
      added to guidance/ between audit and task-4 execution (very unlikely
      within one planning iteration), task-4.md checklist would miss it.
    resolution_strategy: >
      Accepted. The cross-reference note declaring migration-audit.yaml
      authoritative is the practical mitigation. task-4 Step 1 ("Re-read
      migration-audit.yaml and verify it matches current grep state")
      provides a re-sync point.
    deferred_to_feature_iteration: true
    severity_if_unfixed: low (real-world probability of guidance/ growth in
      same planning iteration is near zero)

  - id: scar-debt-registered-restates-recommendation
    source: samsara:code-quality-reviewer — re-review, Suggestion
    finding: >
      scar report's debt_registered block restates the "delete both files"
      recommendation with independent prose instead of pointing only to
      migration-audit.yaml boundary_notes. If boundary_notes is revised,
      debt_registered text would diverge.
    resolution_strategy: >
      Accepted. scar report is a one-shot artifact; the divergence risk is
      epistemic, not operational. Will not consume future maintenance effort.
    deferred_to_feature_iteration: true
    severity_if_unfixed: very low

  - id: layer-abc-local-convention
    source: samsara:code-quality-reviewer — re-review, Suggestion
    finding: >
      Layer A / B / C documentation framing in migration-audit.yaml is a
      local convention with no canonical reference elsewhere. If future audit
      YAMLs copy the structure, the update constraints may not travel with
      the names.
    resolution_strategy: >
      Accepted. No second audit YAML currently exists. If a future change
      writes a second audit YAML, the convention should be promoted to a
      canonical reference document (e.g., docs/audit-yaml-conventions.md).
      Until then, the convention lives where it's used.
    deferred_to_feature_iteration: true
    severity_if_unfixed: low (recurs only if pattern is copied)

