resolved_items:
  - original_section: "assumptions_made"
    original_description: "RouterTerminalError-wrapped ValidationError can be sent directly to the shared classifier and still produce schema-mismatch retry behavior."
    resolution: "Added dispatcher-side ValidationError chain unwrapping before shared classification and covered both retry-success and retry-exhausted paths in tests."
  - original_section: "silent_failure_conditions"
    original_description: "Fatal SDK execution failures can lose the concrete exception type in error_details, weakening forensics."
    resolution: "Fatal execution failures now prefix error_details.error with the exception class name while retaining shared reason/failure_class/recovery_trace fields."
  - original_section: "known_shortcuts"
    original_description: "SDK success outputs still set fallback_used=false even when the fallback model wins, because LLMRouter.call() does not expose which model produced a successful result."
    resolution: "Added RouterCallResult and LLMRouter.call_with_metadata(), wired SDK success output to per-call router attribution, and replaced dispatch-patched fallback success tests with real dispatcher path coverage."
  - original_section: "known_shortcuts"
    original_description: "Router success attribution was briefly represented as mutable instance side-channel state, which could be corrupted by concurrent SDK dispatches sharing a router."
    resolution: "Removed the mutable side-channel and changed SDK dispatcher to consume per-call RouterCallResult from call_with_metadata(); then removed unused RouterCallResult.model_name so the public contract only exposes consumed fields."
  - original_section: "silent_failure_conditions"
    original_description: "Dispatcher-built AnalysisOutput validation errors could be caught inside the model retry loop and misclassified as model output schema failures."
    resolution: "Moved success output construction outside the router-call retry catch and made unexpected dispatcher failures return fatal_execution_error without output-repair retry."
