narrative: |
  ## Critical Bug Discovery and Fix (Task 6 addendum, fixed in Task 7)

  During E2E test development, the CLI gated tests revealed a production bug:

  `build_project_analysis_runtime()` in `src/secondsight/analysis/runtime.py`
  unconditionally called `_build_analysis_agent()`, which constructs `LLMRouter`.
  For CLI-mode projects with no provider API keys configured, `LLMRouter.__init__`
  raises `RouterTerminalError: no provider keys resolvable`.

  This means ANY CLI-mode user would encounter a server error on their first
  session_end hook dispatch. The feature as implemented in Tasks 1-6 was
  non-functional for CLI mode users.

  The initial fix was applied inside build_project_analysis_runtime() as a
  mode-conditional: `if cfg.general.mode == "sdk": agent = _build_analysis_agent(...)`
  else `agent = cast(None)`. This fixed the production breakage but placed the
  mode-conditional OUTSIDE ModeAwareDispatch, violating the architecture invariant
  declared in runtime.py lines 8-21 ("no module outside ModeAwareDispatch should
  reference config.general.mode").

  The Task 7 scar narrative previously cited "task spec exception clause: if it's a
  one-line obvious fix." This exception clause was not present in task-7.md, and the
  fix was ~15 lines, not one line. That citation was inaccurate and has been removed.

  The proper fix was applied in Task 8 (CRITICAL FIX 1): the mode-conditional was
  removed from build_project_analysis_runtime() entirely. Agent construction is now
  lazy inside ModeAwareDispatch._get_sdk_dispatcher(). The architecture invariant is
  restored and verified by three new death tests.

  ## Death Tests Written and Their Purpose

  - TestDTLegacyLoaderBehavior: verifies DC12 — loader warns not raises; WARN
    mentions "legacy"; mode defaults to "cli". Catches silent acceptance of legacy
    config without upgrade warning.

  - TestDTLegacyPrecheckBehavior: verifies explicit agent resolution (not "auto")
    and binary-miss failure mode. Original death test assumed state_missing failure
    — the BUILTIN_DEFAULT_AGENT discovery corrected this during development.

  - TestDTLegacyUpgradeSucceeds.test_legacy_config_with_binary_passes_precheck:
    verifies the full precheck chain completes with legacy config + real binary.
    This death test would have caught the RouterTerminalError bug if the precheck
    layer had invoked agent construction.

  ## What the Non-Gated Test Suite Cannot Verify

  1. Real CLI dispatch chain (CLI binary actually invoked, produces analysis output)
     → requires SECONDSIGHT_TEST_REAL_CLI=1
  2. Real SDK dispatch chain (LLM API called, analysis row written)
     → requires SECONDSIGHT_TEST_REAL_LLM=1 + ANTHROPIC_API_KEY
  3. DC4 fallback behavior (primary fails, fallback used, fallback_used=True in DB)
     → requires SECONDSIGHT_TEST_REAL_LLM=1 + two distinct model configurations
  4. SDK error row with error_details populated
     → requires SECONDSIGHT_TEST_REAL_LLM=1 + invalid API key

