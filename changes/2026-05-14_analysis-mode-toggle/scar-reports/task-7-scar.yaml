silent_failure_conditions:
  - description: >
      CLI gated tests spin up a real `secondsight serve` process and poll its
      /health endpoint. If the server starts but the project DB is never created
      (e.g., due to a storage initialization race), the POST /hook/session_end
      will return 200 but no row will be written. The test asserts on DB row
      presence — this will produce a clear assertion failure, not silence.
      However, if the DB is created but the row has status="error" due to a
      transient CLI timeout, the test will fail loudly, not silently. This is
      acceptable behavior.

  - description: >
      test_dc4_sdk_invalid_primary_valid_fallback_uses_fallback requires
      SECONDSIGHT_TEST_REAL_LLM=1. The test asserts fallback_used=True in the
      DB row. If the SDK router does not persist fallback_used correctly, this
      test would fail — but only when the gated environment is configured.
      CI without the gate variable will skip this test, so the fallback behavior
      goes unverified in standard CI.
    deferred_to_feature_iteration: true

  - description: >
      test_legacy_config_serve_succeeds_with_binary (non-gated) starts a real
      `secondsight serve` process with a 5-second timeout. If CI machines are
      slow, the server may not reach READY state within 5 seconds, causing the
      test to fail with a false negative. The 5-second timeout was chosen
      empirically on a fast developer machine.
    deferred_to_feature_iteration: false

