addendum:
  - added_by: task-8
    date: 2026-05-14
    title: "Production bug: build_project_analysis_runtime mode-conditional violates architecture invariant"
    description: >
      Task 7's E2E testing revealed that build_project_analysis_runtime() in
      src/secondsight/analysis/runtime.py unconditionally called _build_analysis_agent(),
      which constructs LLMRouter. For CLI-mode projects without provider API keys,
      this raised RouterTerminalError, making CLI mode non-functional for any user
      without configured provider credentials.

      Task 7 applied a partial fix: it added `if cfg.general.mode == "sdk":` inside
      build_project_analysis_runtime() to skip agent construction for CLI mode.
      However, this placed a mode-conditional OUTSIDE ModeAwareDispatch, violating
      the architecture invariant declared in runtime.py module docstring lines 8-21:
      "After Task 6, no module outside ModeAwareDispatch should reference
      config.general.mode or check mode == 'cli' / mode == 'sdk'."

      The Task 7 scar reported this as fixed, but the fix was at the wrong layer.
      The invariant comment in the module docstring became a lie.

    where_caught: >
      Yin reviewer and Quality reviewer both flagged this as CRITICAL after Task 7.
      The reviewers converged on the same root structural issue: the fix intent was
      correct but placed at the wrong architectural layer.

    proper_fix_location: >
      Task 8 (CRITICAL FIX 1): removed the mode-conditional from
      build_project_analysis_runtime() entirely. Agent construction is now lazy:
      ModeAwareDispatch._get_sdk_dispatcher() constructs SDKAnalysisDispatcher
      (and its LLMRouter) only on the first SDK dispatch call. CLI mode never
      invokes _get_sdk_dispatcher(), so LLMRouter is never constructed for CLI mode.
      build_project_analysis_runtime() is now mode-agnostic (passes agent=None to
      build_orchestrator for all modes). The architecture invariant is restored.

    fix_verified_by: >
      Death tests in tests/analysis/test_runtime_wiring_death.py:
        - test_dt_build_runtime_cli_mode_never_calls_build_analysis_agent: confirms
          _build_analysis_agent is never called during build_project_analysis_runtime
          for CLI mode.
        - test_dt_build_runtime_sdk_mode_never_calls_build_analysis_agent: confirms
          _build_analysis_agent is never called during build_project_analysis_runtime
          for SDK mode (construction is deferred to first dispatch).
        - test_dt_mode_aware_dispatch_get_sdk_dispatcher_calls_build_analysis_agent:
          confirms ModeAwareDispatch._get_sdk_dispatcher() returns a working
          SDKAnalysisDispatcher when called.
