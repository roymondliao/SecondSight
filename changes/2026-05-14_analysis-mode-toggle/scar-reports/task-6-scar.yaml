debt_location: changes/2026-05-14_analysis-mode-toggle/scar-reports/task-6-scar.yaml

narrative: >
  Task 6 third-iteration (critical fixes applied after two FAIL reviews). The root cause:
  ModeAwareDispatch.dispatch() and AnalysisOutputsRepository were built in earlier iterations
  but NEVER called by production code. Trigger.dispatch() bypassed ModeAwareDispatch entirely
  and called orchestrator.analyze_and_aggregate() directly (SDK-only legacy path).

  CRITICAL FIX 1 resolved this by wiring mode_aware_dispatch into Trigger. The fix required:
  (a) ModeAwareDispatch.__init__ accepting project_id, project_root, and repository;
  (b) ModeAwareDispatch.dispatch() calling repo.insert_or_ignore() after each successful dispatch;
  (c) Trigger.__init__ accepting mode_aware_dispatch parameter;
  (d) Trigger.dispatch() routing to mode_aware_dispatch.dispatch() when provided;
  (e) build_project_analysis_runtime() constructing both and wiring them together.

  Death tests verify the end-to-end contract: test_dt_dispatch_persists_output_to_repository
  uses a real DB to confirm that dispatch() writes a row. If ModeAwareDispatch.dispatch() is
  deleted or the repo call is removed, the death test fails — the class cannot be dead code.

  The remaining concern is the semantic asymmetry introduced by CRITICAL FIX 1: Trigger now
  blocks when mode_aware_dispatch is wired (awaits the full dispatch), but the legacy path
  is non-blocking (asyncio.create_task). This changes caller behavior without changing the
  DispatchResult return contract.

