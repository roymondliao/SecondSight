known_shortcuts:
  - description: >
      ModeAwareDispatch._session_locks is a plain dict[str, asyncio.Lock].
      Locks are created on first dispatch and NEVER evicted. In a long-running server
      with thousands of unique session_ids, this dict grows unboundedly.
      For current usage (single-server, session-bound lifecycle) this is benign,
      but it is a memory leak in any deployment where session_ids accumulate over
      the server's lifetime.
    deferred_to_feature_iteration: true

  - description: >
      precheck() in serve.py is called only at server startup, not before every dispatch.
      If a CLI binary is removed from PATH after server start, ModeAwareDispatch will still
      try to invoke it and fail at dispatch time (not at startup), producing a less actionable
      error than the precheck message.
    deferred_to_feature_iteration: false

  - description: >
      build_project_analysis_runtime() reconstructs config and state from disk on every call.
      There is no caching or singleton guard. If called concurrently (e.g., from multiple
      server request handlers), it will read config.toml and state.json in parallel without
      coordination. This is benign for reads but wasteful and mildly races on cold-start.
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: >
      DC10 lock check-then-acquire in ModeAwareDispatch: the lock is checked via
      lock.locked() BEFORE acquisition in a non-atomic two-step: check locked() → acquire.
      In pure asyncio (single-thread event loop), this is safe because nothing else runs
      between the check and the acquire. However, if asyncio.to_thread() or a
      ThreadPoolExecutor is ever used in the dispatch path, the check-then-acquire
      pattern would be a race condition. Currently safe; silently unsafe if threading
      is introduced later.
    deferred_to_feature_iteration: false

  - description: >
      precheck(config, state=None) returns PrecheckResult.fail() when state is None for
      "auto" agents. This is correct. However, if config loader returns a SecondSightConfig
      with mode="cli" and default_agent="claude_code" but the actual state.json exists and
      contains agent="opencode", the precheck will pass (claude_code binary found), but
      dispatch will silently use claude_code instead of the user's installed agent.
      This mis-resolution is silent: no log at dispatch time names the final resolved agent.
    deferred_to_feature_iteration: false

  - description: >
      analysis_outputs_table.py uses events_table.metadata for shared create_all().
      If create_all() is called before analysis_outputs_table is imported, the table
      will not exist. Import order matters. There is no explicit __all__ or registration
      guard to force the import. A module that calls metadata.create_all() without first
      importing analysis_outputs_table will create all other tables but NOT analysis_outputs.
    deferred_to_feature_iteration: false

  - description: >
      build_project_analysis_runtime() reads ~/.secondsight/state.json silently on every
      call without declaring this side effect in its signature or docstring. Callers
      (ProjectRegistry._build_resources) are not told that state.json is read. If the
      file changes between construction and dispatch, state is stale. If state.json is
      missing, the exception is caught and state=None is used, which silently disables
      CLI "auto" agent resolution without notifying the caller.
    deferred_to_feature_iteration: false

  - description: >
      If repository.insert_or_ignore() raises an unexpected exception (DB locked, disk full,
      SQLAlchemy engine error), the dispatch result is returned to the caller but the row is
      not persisted. The exception is logged at ERROR level but not re-raised. This means
      successful dispatch results can be silently lost if the DB is unavailable at persistence
      time. No retry, no dead-letter queue.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      asyncio.Lock.locked() is safe to call from the same event loop thread as the coroutine
      that may hold the lock. It does not block and reflects current lock state accurately
      within a single-threaded event loop.
    verified: true
    verification_method: >
      asyncio.Lock.locked() is documented as a non-blocking property that returns True if
      the lock is acquired. Within a single coroutine (no await between check and acquire),
      no other coroutine can run in the asyncio event loop, so the state is stable.
      Confirmed by test_dc10_concurrent_dispatch_same_session_id_only_one_executes
      (in-memory counter) and test_dt_dc10_concurrent_dispatch_produces_exactly_one_db_row
      (DB row count) both passing.

  - assumption: >
      SQLite's INSERT OR IGNORE semantics on UNIQUE constraint violation silently drops
      the duplicate row without raising an exception through SQLAlchemy.
    verified: true
    verification_method: >
      test_insert_or_ignore_second_write_for_same_session_is_no_op passes — second insert
      does not raise and the first row's values are preserved.

  - assumption: >
      sa.CheckConstraint() can be passed as a positional argument to sa.Column() before
      keyword arguments (nullable=, server_default=).
    verified: true
    verification_method: >
      Fixed syntax bug during final run: CheckConstraint must appear before keyword args.
      All table-level imports pass after fix.

  - assumption: >
      SecondSightState.init_agent contains exactly the string that matches the
      _AGENT_BINARY_MAP keys ("claude_code", "codex", "opencode"). If an older
      state.json used a different spelling or case, precheck() would silently fall
      through to the "agent not in map" branch and return ok() with no binary check.
    verified: false
    verification_method: >
      Not verified. _AGENT_BINARY_MAP was constructed from the plan's stated values.
      No check of historical state.json schema or migration path was performed.

  - assumption: >
      The 6 failing integration tests in tests/integration/test_phase1_e2e.py are
      pre-existing failures, not introduced by Task 6 changes.
    verified: true
    verification_method: >
      Git log shows the most recent commits before Task 6 include refactor(logging-stage2).
      The integration failures are in TestMH1SingleEvent/TestMH2MultiEvent/TestMH5CliLifecycle
      which test phase-1 observation adapter functionality unrelated to dispatch, precheck,
      or storage. The Task 6 files do not touch observation/, adapters/, or phase1 code paths.

  - assumption: >
      Trigger.dispatch() can be used as an async-synchronous bridge: when mode_aware_dispatch
      is provided, dispatch() awaits the ModeAwareDispatch call (blocking until analysis completes).
      When mode_aware_dispatch=None (legacy path), dispatch() fires asyncio.create_task
      (non-blocking, background task). These two behaviors are semantically different: one
      blocks the caller, one does not. Callers that previously expected non-blocking behavior
      will now block when mode_aware_dispatch is wired.
    verified: true
    verification_method: >
      test_trigger_dispatch_calls_mode_aware_dispatch_when_provided verifies the mock is
      called and result.dispatched=True. The semantic difference (blocking vs. non-blocking)
      is documented in the trigger.py code comment. Sweeper callers are not affected since
      they await the result explicitly; SESSION_END callback creates its own task wrapper.

