resolved_items:
  - original_section: silent_failure_conditions
    original_description: >
      T6 silent_failure_conditions #2: if config loader returns a SecondSightConfig with
      mode="cli" and default_agent="claude_code" but the actual state.json exists and
      contains agent="opencode", the precheck will pass (claude_code binary found), but
      dispatch will silently use claude_code instead of the user's installed agent.
      This mis-resolution is silent: no log at dispatch time names the final resolved agent.
    what_was_done: >
      Part B: Added INFO log line in ModeAwareDispatch.dispatch() before the dispatcher.dispatch()
      call. The log names session_id, mode, and the effective agent (CLI) or primary model (SDK).
      Format: "dispatch start: session_id=... mode=... agent=... primary_model=..."
      This makes the mis-resolution visible in logs: if config says claude_code but the actual
      invocation should have used a different agent, the log shows 'agent=claude_code' and a
      developer can cross-reference with state.json to detect the discrepancy.

  - original_section: unverified_assumptions
    original_description: >
      T6 unverified_assumptions #1: SecondSightState.init_agent contains exactly the string
      that matches the _AGENT_BINARY_MAP keys. If an older state.json used a different
      spelling or case, precheck() would silently fall through to the "agent not in map"
      branch and return ok() with no binary check.
    what_was_done: >
      Part A: Added _KNOWN_CLI_AGENTS frozenset and unknown_agent check BEFORE binary lookup.
      An unrecognised spelling (e.g., "claude-code", "CLAUDE_CODE") now fails immediately
      with reason="unknown_agent" and an actionable message listing valid agent names.
      The assumption is now enforced at startup: any state.json with an unrecognised spelling
      fails precheck rather than silently passing or giving a confusing "binary missing" error.

  - original_section: yin_reviewer_suggestion
    original_description: >
      precheck.py:194: The unknown-agent branch returns reason="cli_binary_missing" for an
      agent that is unknown. A more honest reason code would be "unknown_agent" because the
      binary may or may not exist; we simply don't know what binary to look for.
    what_was_done: >
      Renamed the reason code from "cli_binary_missing" to "unknown_agent" for the
      unrecognised-agent failure path. Updated PrecheckResult docstring to include
      "unknown_agent" and "unknown_mode" in the known values list. Moved the check before
      the opencode rejection so the code flow is: enum validation → unsupported check →
      binary lookup. No existing tests asserting cli_binary_missing for unknown-agent
      scenarios were found (grep confirmed); the three existing cli_binary_missing assertions
      all target genuinely-missing-binary cases which correctly still use cli_binary_missing.

  - original_section: yin_reviewer_round1_critical
    original_description: >
      precheck.py:241: _KNOWN_CLI_AGENTS incorrectly included "auto" as a valid
      effective_agent value. This caused state.init_agent="auto" (corrupt state) to pass
      the enum check, then crash at _AGENT_BINARY_MAP["auto"] with KeyError, violating the
      "precheck never raises" contract. Crash produces an unactionable Python traceback
      instead of a clean PrecheckResult.fail(reason="unknown_agent").
    what_was_done: >
      Removed "auto" from _KNOWN_CLI_AGENTS. Updated the frozenset expression and the
      module-level docstring comment to explain the intentional exclusion. Updated the
      inline comment at the enum check call site to reflect that "auto" reaching the enum
      check indicates state corruption. Also updated _valid_agent_names construction at the
      error log site to remove the now-redundant `- {"auto"}` filter.
      Death test added: test_death_f2_state_init_agent_auto_returns_unknown_agent_not_keyerror.
      Test confirmed RED with current code (KeyError at precheck.py:241), then GREEN after fix.
      Full suite: 1581 passed, 0 new failures.

  - original_section: yin_reviewer_round1_important
    original_description: >
      tests/analysis/test_runtime_dispatch_mode.py:414:
      `assert "claude_code" in all_messages or "agent" in all_messages` — the "or 'agent'"
      arm is vacuous (the word "agent" appears in many other log messages), making the test
      unable to detect a regression where the dispatch-start log omits the agent name.
      Same pattern applied to test_death_f2_dispatch_sdk_logs_primary_model.
    what_was_done: >
      Replaced both vacuous assertions with dispatch-start-line-specific assertions.
      New pattern: filter caplog.records where "dispatch start" in r.message.lower(),
      assert at least one record found, then assert agent/model NAME verbatim in that
      record's message. This makes both tests FAIL if the dispatch-start log omits the
      agent/model name, regardless of other log messages that happen to contain "agent"
      or "primary_model" as substrings. Both tests remain GREEN after the assertion change.

narrative: >
  The task bundled two related scar items: an honest reason code for unrecognised agents
  (Part A) and a missing forensic log line at dispatch time (Part B).

  Part A required adding _KNOWN_CLI_AGENTS as a complete enum of valid agent strings, then
  moving the unknown-agent check to run before binary lookup. The check order (enum → unsupported
  → binary) is now explicit in the docstring. The implementation had a subtle bug in the first
  pass: the original code had binary_name = _AGENT_BINARY_MAP.get(effective_agent) before the
  None check; when I replaced the entire block, I removed this assignment. The binary lookup
  at line 236 then saw binary_name as undefined. Fixed by switching to direct indexing
  (_AGENT_BINARY_MAP[effective_agent]) which is safe post-validation.

  Part B required only a 14-line addition to runtime.py's dispatch() method, inside the
  async with lock block, before dispatcher.dispatch() is called. The CLI path inline-resolves
  the effective agent (respecting auto → state.init_agent) to produce a meaningful log value.
  A known shortcut: this duplicates the auto-resolution logic from precheck.py. Documented
  as a shortcut with rationale.

  Death tests were written before implementation. All 6 failed correctly before the fix.
  All 6 passed after. No existing tests were broken. Full suite: 1159 passed, 1 pre-existing
  integration failure unrelated to these changes.
