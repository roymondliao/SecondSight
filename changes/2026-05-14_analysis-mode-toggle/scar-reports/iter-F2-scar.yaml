residual_risk:
  - "dispatch() resolves effective_agent for the log inline (duplicates the 'auto' resolution
    logic from precheck.py:_check_cli_mode). If auto-resolution logic changes in precheck,
    the dispatch log will show a stale value. Mitigated by the fact that the dispatch
    log is forensic-only — it does not affect dispatch routing. The actual routing is done
    by CLIAnalysisDispatcher which reads its own config. Two sources of truth for the log
    only, not for dispatch behaviour."
  - "The dispatch log for CLI mode shows the config-resolved agent (what precheck would
    accept), NOT the agent that CLIAnalysisDispatcher actually invokes. If CLIAnalysisDispatcher
    has its own internal resolution that differs, the log and the actual subprocess invocation
    could diverge. This is acceptable as a forensic starting point but means the log is
    'config says X' not 'subprocess invoked X'."
  - "_KNOWN_CLI_AGENTS is computed as a frozenset expression at module load time. If a
    developer adds a new agent to _AGENT_BINARY_MAP but forgets to check _KNOWN_CLI_AGENTS,
    the new agent is automatically included (because _KNOWN_CLI_AGENTS derives from
    _AGENT_BINARY_MAP). This is the correct behaviour — no risk here."

known_shortcuts:
  - description: >
      The dispatch log effective agent resolution in runtime.py is a local inline copy of
      the resolution logic in precheck.py:_check_cli_mode (auto -> state.init_agent). This
      creates a two-place maintenance burden. If precheck gains a third resolution step
      (e.g., env variable override), the dispatch log will not reflect it unless both files
      are updated. The honest fix would be to expose a resolve_effective_agent() helper in
      precheck.py and use it from both places.
    deferred_to_feature_iteration: true
    rationale: >
      Identified in round-1 yin review as deferred item. The task constraint says "do NOT
      modify the dispatcher classes themselves (Task 4/5 owners)". Extracting
      resolve_effective_agent() would touch precheck.py (same file as this task) and
      runtime.py (also this task's scope). However, the extraction is a refactor beyond the
      immediate scar fix, and the inline copy is functionally correct for the current
      two-resolution-step logic. Leaving as documented shortcut; the risk is annotated in
      residual_risk. strategy_hint=minimal_fix per iteration budget.

  - description: >
      DC11: PrecheckResult.reason is typed as str | None rather than
      Literal["state_missing", "cli_binary_missing", "opencode_not_supported",
      "no_providers", "primary_model_missing", "unknown_agent", "unknown_mode", None].
      This typing weakness means callers cannot get static exhaustiveness checking on
      the reason field.
    deferred_to_feature_iteration: true
    rationale: >
      Pre-existing typing weakness identified in round-1 yin review. Fixing it requires
      changing the PrecheckResult dataclass field type and updating all callers that pattern-
      match on reason. This is a type safety improvement with no runtime behavior change.
      Deferred per strategy_hint=minimal_fix. The existing docstring lists all known reason
      values as documentation mitigation.

  - description: >
      Coupling concern: config.analysis.sdk.primary_model is accessed directly in
      runtime.py's dispatch log line rather than through a named accessor. If the config
      schema path changes, the log line will silently break with AttributeError. Currently
      no test covers the AttributeError path.
    deferred_to_feature_iteration: true
    rationale: >
      Identified in round-1 yin review. This is a structural coupling issue between runtime
      layer and config schema. Resolving it requires either a config accessor pattern or a
      runtime-level config validation step. Beyond minimal_fix scope for this iteration.

silent_failure_conditions:
  - condition: >
      The dispatch log for CLI mode always says agent=<default_agent or state.init_agent>,
      even if state=None and default_agent="auto". In that case, _effective_agent would be
      "auto" (the sentinel) rather than the actual resolved agent. Precheck would have
      already rejected this at startup (state_missing), but if dispatch() is called without
      going through precheck (e.g., tests or direct instantiation), the log is misleading.
    detectability: medium — the log says agent='auto' which is recognisable as the sentinel
    mitigation: >
      This is a "can't happen in production" case: precheck rejects mode=cli + auto + no state
      before the server starts. In tests that bypass precheck, agent='auto' in the log is a
      signal that the test is in a degraded state. Acceptable as-is.

  - condition: >
      The effective_agent logged at dispatch time may not match what CLIAnalysisDispatcher
      actually does. If CLIAnalysisDispatcher reads state.init_agent at dispatch time
      (rather than at construction time) and state has changed on disk between precheck and
      dispatch, the log shows the precheck-time agent while the subprocess invokes a different
      one. This is an edge case (state.json is not updated during normal operation).
    detectability: low — logs look consistent; only visible if state.json is mutated between
      server start and dispatch, which requires external intervention
    mitigation: >
      State.json mutation during server operation is not a supported workflow. The risk is
      documented for completeness. A future improvement would be for CLIAnalysisDispatcher
      to include the effective agent in its own AnalysisOutput.cli_agent field, which would
      provide ground truth in the DB.

