narrative: |
  Task 5 implements Decision E1 (explicit key injection, no implicit env fallback)
  across three layers: config/loader.py (_resolve_provider_keys), sdk/router.py
  (resolved_keys required parameter + explicit provider construction), and
  analysis/sdk_dispatcher.py (SDKAnalysisDispatcher class).

  The three death cases were the primary design drivers:

  DC7 (empty config key must NOT read env): LLMRouter._validate_provider_keys_at_init
  raises RouterTerminalError at construction time when primary provider key is empty.
  The validation is at construction, not at first dispatch — this means the error
  appears during server startup (registry materialization), not during a user request.
  4 death tests verify this across different empty/partial key scenarios.

  DC8 (cache-once contract): resolved_keys is snapshotted as dict(resolved_keys)
  in LLMRouter.__init__. The _make_explicit_agent_factory closure closes over a
  separate copy (_keys = dict(resolved_keys)). Two copies ensure neither the caller's
  dict nor os.environ can mutate the factory's keys after construction. 3 death tests
  verify the snapshot behavior by mutating both the original dict and os.environ
  after construction.

  DC4 (both providers fail → error_details has both errors): SDKAnalysisDispatcher
  catches RouterChainExhaustedError, checks len(exc.attempts) > 1, and calls
  _make_dual_failure_output() which produces error_details with both 'primary_error'
  and 'fallback_error' keys. AnalysisOutput.check_cross_fields() (Task 2) enforces
  this at validation time — constructing an output with fallback_used=True and
  missing either key raises ValidationError. 2 death tests verify this invariant.

  Review pass (yin+quality reviewer): 8 structural fixes applied.
  - Fix A: Created AnalysisDispatcher Protocol. Unified dispatch() signature.
  - Fix 1: Added dropped flag accounting in _make_success_output (logger.warning + error_details).
  - Fix 2: Rewrote vacuous DC8 test to exercise production factory path.
  - Fix B: Deleted _infer_provider copy-A from sdk_dispatcher.py; DRY import from model_selection.
  - Fix C: Extended AST check to all sdk/ .py files, not just router.py.
  - Fix D: Promoted _resolved_keys to public resolved_keys property on LLMRouter.
  - Fix E: Added assert for attempt ordering invariant in DC4 path.
  - Fix F: Updated task-5-scar.yaml with resolved_items; cross-referenced task-1-scar.yaml.
  - Fix G: Made _build_system_prompt template render failure FATAL (no fallback).

  One pre-existing integration test (test_mh1_single_event_evidence_chain) was failing
  before Task 5 work began. It continues to fail for unrelated reasons (hooks session-start
  script modification). Task 5 did not introduce this failure.

  Original Task 5: 24 new tests. Review pass: 28 additional new tests.
  Total: 52 new tests added across both passes.
  1485 non-integration tests pass (was 1457 before review pass).
