      deferred_to_feature_iteration=false but classified as acceptable shortcut.
    resolution: >
      Removed inline fallback entirely. _build_system_prompt() now re-raises the original
      exception. dispatch() moves the _build_system_prompt() call inside the try block so
      render failures are caught and returned as AnalysisOutput(status='failure', error_details={error:...}).
      This converts silent degradation (success with weak output) to observable failure.
      Death test added: test_dispatch_returns_failure_when_prompt_render_fails.

