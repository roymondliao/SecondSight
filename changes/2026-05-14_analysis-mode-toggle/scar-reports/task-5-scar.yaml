    verified: true
    note: >
      Verified by test_dc4_both_providers_fail_error_details_has_both_errors.
      RouterChainExhaustedError.attempts is a list of per-attempt error strings.

  - assumption: >
      RouterChainExhaustedError.attempts[0] is the primary error and attempts[1]
