      (now the new AnalysisConfig type) where select_model() expected
      GlobalAnalysisConfig shape. This was a latent type mismatch silently exercised
      only when SDK mode dispatch actually ran end-to-end.
    resolution: >
      Task 5 changed runtime.py:87 from cfg.analysis to cfg.analysis_global as part
      of integrating SDK key injection. The bridge bug is now fixed. Note: Task 1's
      scar may overstate the bridge's working state — cross-link added to task-1-scar.yaml.

  - section: known_shortcuts
    original_description: >
      _build_system_prompt() falls back to an inline prompt string when template
