known_shortcuts:
  - description: >
      Fallback detection in dispatch() is imprecise. After a successful router call,
      the code assumes fallback_used=False because it did not catch an exception.
      However, LLMRouter's internal call() may have transparently retried on the
      fallback and succeeded without raising RouterChainExhaustedError.
      The router's internal attempt trace is not exposed via a public API.
      Impact: AnalysisOutput.fallback_used may be False when fallback actually fired.
      This is a metric accuracy issue, not a correctness issue.
    deferred_to_feature_iteration: true

  - description: >
      _infer_provider() defaults unknown model names to "anthropic" with a warning log.
      If a non-Anthropic model (e.g. a Gemini model name) is configured, it silently
      constructs with anthropic provider and fails at dispatch with a 401-style error
      (not at construction). A RouterTerminalError at construction would be safer.
    deferred_to_feature_iteration: false

  - description: >
      _build_system_prompt() falls back to an inline prompt string when template
      rendering fails. The inline prompt is semantically weaker than behavior.jinja2
      and does not include flag_definitions_block or the structured schema context.
      This ensures dispatch continues when template is missing but weakens output quality.
      Template rendering failure is logged as WARNING, not ERROR.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      If the LLM returns a valid JSON list that passes coercion in _make_success_output
      but contains semantically wrong behavior flags (e.g., correct schema, wrong analysis),
      dispatch returns status='success' with no detection. Semantic validation is
      intentionally deferred to Task 6/7's analysis quality layer.
    deferred_to_feature_iteration: false

  - description: >
      If pydantic-ai's Agent raises UnexpectedModelBehavior (LLM returned valid response
      but wrong structure), it propagates to the bare except branch in dispatch() and
      is returned as a single-failure output. This is correct behavior but the error type
      is not specifically tested — it falls through to the generic Exception handler.
      A future pydantic-ai version changing this exception type would still produce a
      valid failure output (correct degradation path) but with a less specific error message.
    deferred_to_feature_iteration: false

  - description: >
      LLMRouter.call() called with output_type=list — if pydantic-ai's list type
      validation rejects the model output (e.g., model returns a dict, not a list),
      it raises RouterChainExhaustedError which is caught and returned as failure.
      This is correct but the caller receives no information about what the LLM
      actually returned — the raw response is not included in error_details.
    deferred_to_feature_iteration: false

  - description: >
      resolved_keys snapshot is a dict copy at LLMRouter.__init__ time. If the caller
      mutates the dict they passed in AFTER construction, the router is unaffected (DC8).
      However, if the caller passed api_key values that were themselves mutable objects
      (not possible with plain strings, but worth noting for future type widening),
      that assumption would break. Current implementation: dict[str, str] — strings
      are immutable in Python, so this is fully safe as specified.
    deferred_to_feature_iteration: false

  - description: >
      SDKAnalysisDispatcher does not have a retry loop. The CLI dispatcher (Task 4)
      has a retry-with-augmented-prompt loop (up to 3 retries on JSON validation failure).
      The SDK dispatcher relies entirely on LLMRouter's fallback chain for resilience.
      If the primary model returns a structurally invalid response (not caught by
      pydantic-ai's output_type), there is no retry — the result is returned as-is or
      fails. This asymmetry with CLIAnalysisDispatcher is undocumented at the call site.
    deferred_to_feature_iteration: true

assumptions_made:
  - assumption: >
      AnthropicProvider(api_key=...) and OpenAIProvider(api_key=...) accept the
      resolved string directly without additional credential wrapping. Empty string
      api_key does NOT result in silent fallback to os.environ inside pydantic-ai.
    verified: true
    note: >
      Verified by DC8 death tests: test_dc8_provider_constructed_with_snapshot_key
      and test_dc8_unset_env_after_load_does_not_affect_router confirm that the
      closed-over key is what gets passed to the provider, not os.environ.
      Introspection via agent._model.client.api_key confirms the snapshot value.

  - assumption: >
      pydantic-ai's Agent(model=explicit_model_instance, defer_model_check=True)
      construction does not attempt any network call or API key validation at init time.
      defer_model_check=True suppresses the "is this model accessible?" check.
    verified: true
    note: >
      Verified by test_happy_path_anthropic_key_resolved and the fact that all
