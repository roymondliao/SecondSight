narrative: |
  ## Summary

  Task 8 applied all CRITICAL and IMPORTANT fixes identified by Yin and Quality
  reviewers after Task 7's implementation.

  ## CRITICAL FIX 1: Architecture Invariant Restored

  Task 7 fixed a production bug (RouterTerminalError for CLI mode) by adding an
  `if cfg.general.mode == "sdk":` conditional inside build_project_analysis_runtime().
  This violated the architecture invariant in runtime.py module docstring lines 8-21:
  "no module outside ModeAwareDispatch should reference config.general.mode."

  The proper fix: moved all agent/dispatcher construction lazily into
  ModeAwareDispatch._get_sdk_dispatcher(), which is already the designated mode-branch
  site. build_project_analysis_runtime() now passes agent=None to build_orchestrator()
  for ALL modes and does NOT reference cfg.general.mode. The invariant is restored.

  Three new death tests verify:
    1. _build_analysis_agent is never called during build_project_analysis_runtime
       (CLI mode) — guards against regression.
    2. _build_analysis_agent is never called during build_project_analysis_runtime
       (SDK mode) — construction must be lazy.
    3. ModeAwareDispatch._get_sdk_dispatcher() returns a working SDKAnalysisDispatcher
       — the lazy path must actually construct something useful.

  ## CRITICAL FIX 2: _poll_analysis_outputs_table bare except

  Both gated test files had `except Exception: pass` in the DB poll loop. This made
  DB connection failures indistinguishable from "row not yet written." Fixed by
  creating tests/e2e/conftest.py with a shared poll_analysis_outputs_table() that:
    - Catches sqlalchemy.exc.OperationalError (table not ready yet — transient,
      continue polling with DEBUG log)
    - Re-raises all other exceptions (unexpected DB errors produce actionable failures)

  ## IMPORTANT FIX 3: Scar cross-reference

  task-6-scar.yaml now has an addendum documenting the production bug and its
  proper fix location. task-7-scar.yaml's false "exception clause" citation was
  corrected to accurately describe what happened and what was fixed in Task 8.

  ## IMPORTANT FIX 4: Test rename

  test_legacy_config_serve_succeeds_with_binary renamed to
  test_legacy_config_passes_precheck_with_binary. The new name accurately reflects
  that _run_server is patched to a no-op — the test verifies precheck passes,
  not that the HTTP server actually serves.

  ## IMPORTANT FIX 5: Shared conftest

  Created tests/e2e/conftest.py with shared wait_for_server(), poll_analysis_outputs_table(),
  _SERVER_PORT, _SERVER_URL. Both gated test files now import from here instead of
  maintaining verbatim copies. The port conflict constraint is documented in one place.

  ## IMPORTANT FIX 6: Composed DC5 scenario test

  Added TestDTLegacyConfigWithStateServe.test_legacy_config_with_state_serve_warns_and_succeeds
  to test_legacy_config_upgrade.py. Composes: legacy config + state.json + binary →
  WARN log + exit 0 + mode="cli". Previous tests covered each piece separately.

  ## IMPORTANT FIX 7: TestRegressionSDKTestsUnderExplicitSDKMode moved

  The class was misplaced in test_legacy_config_upgrade.py. Moved to new file
  tests/e2e/test_sdk_regression.py. Imports consolidated via _make_sdk_config() helper.

