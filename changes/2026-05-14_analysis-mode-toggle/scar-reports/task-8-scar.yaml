debt_registered: true
debt_location: >
  src/secondsight/analysis/runtime.py — _get_cli_dispatcher() does not cache
  (minor inconsistency with _get_sdk_dispatcher() lazy caching);
  tests/e2e/ — TestRegressionSDKTestsUnderExplicitSDKMode moved to test_sdk_regression.py,
