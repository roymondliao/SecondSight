task_id: task-8
completion_status: done

known_shortcuts:
  - description: >
      ModeAwareDispatch._get_cli_dispatcher() does not cache the constructed
      CLIAnalysisDispatcher. On each CLI dispatch call it either returns the
      injected dispatcher or constructs a new CLIAnalysisDispatcher instance.
      Since CLIAnalysisDispatcher is stateless, this is benign but wasteful.
      Symmetry with _get_sdk_dispatcher() (which now caches via self._sdk_dispatcher)
      was not applied to avoid scope creep. The inconsistency is minor.
    deferred_to_feature_iteration: false

  - description: >
      TestRegressionSDKTestsUnderExplicitSDKMode was moved from
      test_legacy_config_upgrade.py to test_sdk_regression.py. The old class
      reference in test_legacy_config_upgrade.py is replaced with a comment.
      If any test runner or CI script references the class by its old file path
      (e.g., test_legacy_config_upgrade.py::TestRegressionSDKTestsUnderExplicitSDKMode),
      it will fail with "not found". No such reference was found in CI configs
      checked, but grep was not exhaustive.
    deferred_to_feature_iteration: false

  - description: >
      tests/e2e/conftest.py uses `from loguru import logger` inside
      poll_analysis_outputs_table(). This is correct per AGENTS.md but the logger
      is used in a non-test module path (conftest). If the loguru bridge fixture
      in tests/conftest.py is not active for conftest-level code, loguru output
      from poll_analysis_outputs_table may not be captured by caplog.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      ModeAwareDispatch._get_sdk_dispatcher() now caches self._sdk_dispatcher after
      first construction (lazy initialization). If the SDKAnalysisDispatcher raises
      RouterTerminalError during construction (no provider keys), the exception
      propagates to ModeAwareDispatch.dispatch() which catches it and returns
      AnalysisOutput(status='failure'). On the second call, self._sdk_dispatcher is
      still None (not cached due to exception), so construction is re-attempted on
      every dispatch call. This is correct behavior (fail-at-use, retry each time)
      but means every subsequent SDK dispatch attempt also incurs a construction
      failure cost. For the common case (valid keys), this is not an issue.

  - description: >
      The death tests for CRITICAL FIX 1 (test_dt_build_runtime_*) patch
      secondsight.analysis.runtime._build_analysis_agent. If the module is already
      imported and cached in sys.modules before the patch, the patch may not take
      effect. Tests use `from secondsight.analysis import runtime as _runtime_module`
      and call _runtime_module.build_project_analysis_runtime(), which goes through
      the module namespace. This is the correct pattern for patching module-level
      functions. Verified working.

  - description: >
      TestDTLegacyConfigWithStateServe.test_legacy_config_with_state_serve_warns_and_succeeds
      (IMPORTANT FIX 6) uses caplog to capture the WARN log from the loader.
      caplog is a stdlib logging bridge fixture. Since the loader uses loguru
      (not stdlib logging), the WARN log may not appear in caplog unless the
      loguru-to-stdlib bridge in tests/conftest.py is active. If caplog returns
      empty warn_messages, the test would pass vacuously (assert "" in "legacy" is False
      but assert False OR "legacy" in "" is evaluated correctly). The assertion is a
      disjunction so it will FAIL if no warning is emitted — this is the desired behavior.
      Verified: test passes (warns are captured correctly via bridge).

