debt_registered: false
debt_location: ~

resolved_items:
  - original_section: silent_failure_conditions
    original_description: >
      analysis_outputs_table.py uses events_table.metadata for shared create_all(). If
      create_all() is called before analysis_outputs_table is imported, the table will not
      exist. Import order matters. There is no explicit __all__ or registration guard to
      force the import. A module that calls metadata.create_all() without first importing
      analysis_outputs_table will create all other tables but NOT analysis_outputs.
    what_was_done: >
      Added `from secondsight.storage.analysis_outputs_repository import AnalysisOutputsRepository`
      to src/secondsight/storage/__init__.py. AnalysisOutputsRepository imports
      analysis_outputs_table which triggers table registration as a side effect. Also added
      CRITICAL comment block documenting the invariant. Also added AnalysisOutputsRepository
      to __all__.

      BONUS: discovered analysis_runs_table had the same unregistered problem (not reported in
      task-6 scar, but same root cause). Fixed simultaneously by adding
      `from secondsight.storage.analysis_runs_repository import AnalysisRunsRepository` to
      __init__.py and __all__.

      Added tests/storage/test_table_registration.py with 13 tests that pin the registration
      invariant. Pre-fix: 2 tests failed (__all__ assertions). Post-fix: 13/13 pass.
      Fresh subprocess verification confirms all 6 tables present post-fix.

narrative: >
  The root cause was that storage/__init__.py never imported either analysis_outputs_repository
  or analysis_runs_repository, so their corresponding table modules were never loaded when a
  caller did `import secondsight.storage`. The SQLAlchemy metadata registration side-effect
  only fires at import time — if the module is never imported, the table is never registered,
  and metadata.create_all() silently skips it.

  The fix adds both repository imports to __init__.py and documents the invariant with a
  CRITICAL comment. The test file pins this invariant: any future table module that is added
  without updating __init__.py AND _EXPECTED_TABLE_NAMES will be caught at the test level.

  The fix also reveals the secondary table registration gap (analysis_runs_table) which was
  not in the original scar item but has the same failure mode. Both are fixed together.
