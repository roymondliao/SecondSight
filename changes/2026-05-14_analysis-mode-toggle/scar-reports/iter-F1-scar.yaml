residual_risk:
  - "Future table additions: if a developer adds a new *_table.py without updating __init__.py,
    the registration is broken again. Mitigated by: (1) CRITICAL comment in __init__.py,
    (2) test_table_registration.py checks _EXPECTED_TABLE_NAMES set — but _EXPECTED_TABLE_NAMES
    must also be updated when new tables are added. This is a two-step process; a developer
    who forgets step 2 (updating _EXPECTED_TABLE_NAMES) will not get a test failure."
  - "The _EXPECTED_TABLE_NAMES set in test_table_registration.py is a static list. It does not
    auto-discover new *_table.py files. A new table that is correctly registered in __init__.py
    but not added to _EXPECTED_TABLE_NAMES will pass all tests silently — the test only catches
    absence of known-expected tables, not presence of newly-added ones."

known_shortcuts:
  - description: >
      The registration invariant comment in __init__.py relies on developer discipline.
      There is no automated enforcement (e.g. a test that discovers *_table.py files and
      verifies each is in __init__.py). The test pins known tables but does not auto-discover
      new ones. A test using glob/importlib to enumerate *_table.py modules and assert each
      is registered would be fully automatic — but that's a more invasive test approach.
    deferred_to_feature_iteration: false
    rationale: >
      The static _EXPECTED_TABLE_NAMES approach is sufficient for current 6-table surface.
      Auto-discovery would also work but introduces a dependency on filesystem structure in
      a test. The comment + static list is the simpler approach for now.

silent_failure_conditions:
  - condition: >
      A developer adds a new *_table.py file but does NOT update __init__.py AND does not
      update _EXPECTED_TABLE_NAMES in test_table_registration.py. Both steps are now required
      to maintain the invariant. The CRITICAL comment in __init__.py explains this, but
      the enforcement gap remains.
    detectability: low — neither test will catch this until the table is in _EXPECTED_TABLE_NAMES
    mitigation: >
      Consider adding a discovery test in a follow-up that enumerates *_table.py files and
      asserts each is registered. Not done here because it changes the test's dependency
      surface (filesystem structure) and is out of scope for this iteration fix.

