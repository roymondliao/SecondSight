# Fix F1: table registration invariant — __init__.py must import all table modules
# so metadata.create_all() always creates every table.
#
# Pre-fix: `import secondsight.storage` in a fresh process registered only 4 tables:
#   events, behavior_flags, directives, session_reports
# Post-fix: all 6 tables registered:
#   events, behavior_flags, directives, session_reports, analysis_runs, analysis_outputs
#
# Evidence: subprocess verification before/after, 13 new tests all green, 179 storage tests pass.

