residual_risk:
  - risk: >
      The 3 SDK gated tests in test_mode_toggle_sdk.py have never executed against
      a real LLM. If the SDK dispatch chain (ModeAwareDispatch._get_sdk_dispatcher →
      LLMRouter → Anthropic API → analysis_outputs row write) has a bug that only
      manifests at runtime (e.g., async context issue, model name resolution, response
      parsing), no current test will catch it before production.
    likelihood: low
    mitigation: >
      The SDK dispatch chain was verified at the unit test level (LLMRouter tests,
      SDKAnalysisDispatcher tests, ModeAwareDispatch tests). The test_sdk_regression.py
      tests verify routing correctness. The unverified gap is the full server-to-DB
      chain with a real API call. Operator probe required before production promotion.
    operator_action: >
      Run tests/e2e/test_mode_toggle_sdk.py with SECONDSIGHT_TEST_REAL_LLM=1 and
      a valid ANTHROPIC_API_KEY. Capture results. Update e2e-results.md.

narrative: >
  The F6 scar item was about an honest gap: the document was omitted because partial
  results risked misleading reviewers. The fix resolves this by writing a document
  that is explicitly PARTIAL — the status line says so, the SDK section says "awaiting
  operator probe," and the operator action items section tells exactly what to do next.

  The document also corrects a count discrepancy: the task plan said "15 non-gated"
  but the actual count is 16 (Task 8 added test_sdk_regression.py, which postdated
  the task plan). This discrepancy is documented inline so reviewers see accurate
  numbers.

  The production bug chain is documented in the "Production bug found by E2E" section
  because it is a key piece of E2E provenance: the CLI gated tests were the mechanism
  that caught the RouterTerminalError bug. Without documenting this, a reader of the
  e2e-results.md would not understand why Task 7 and Task 8 were both needed.

