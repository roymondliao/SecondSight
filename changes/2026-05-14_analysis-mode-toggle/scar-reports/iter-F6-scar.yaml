silent_failure_conditions:
  - condition: >
      If the SDK gated tests are never run by an operator, the e2e-results.md
      will remain PARTIAL indefinitely. There is no automated reminder or CI gate
      that enforces the operator probe. The document's "Pending operator" status
      could be overlooked when the feature ships.
    likelihood: medium
    detection: >
      The e2e-results.md status header says "PARTIAL" explicitly and the operator
      action items section names the three specific tests and commands required.
      A release checklist reviewer would need to check this file before shipping.

