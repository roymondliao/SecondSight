# Fix F6: write e2e-results.md (T7 known_shortcuts #3)
#
# Scar item addressed (verbatim from task-7-scar.yaml known_shortcuts #3):
#   "e2e-results.md was not written. The task spec called for capturing test
#    results in changes/2026-05-14_analysis-mode-toggle/e2e-results.md. This
#    was omitted because the gated SDK tests could not produce real results,
#    and writing partial results risks misleading reviewers."
#
# Resolution approach:
#   The concern was misleading reviewers. The fix is an honest document that
#   clearly separates:
#     (a) what ran and passed — non-gated (16) + CLI gated (2)
#     (b) what was skipped and why — SDK gated (3, no ANTHROPIC_API_KEY)
#     (c) what was found — the RouterTerminalError production bug + two-round fix
#   The document's status header says "PARTIAL" explicitly. No inflation.
#
# Count correction:
#   The task spec said "15 non-gated tests." The actual count is 16:
#     12 in test_legacy_config_upgrade.py + 4 in test_sdk_regression.py.
#   test_sdk_regression.py was created in Task 8 IMPORTANT FIX 7 (after the
#   task plan was written). The e2e-results.md uses the accurate count.
#   Total: 16 non-gated + 2 CLI gated + 3 SDK gated = 21 (not 20).

