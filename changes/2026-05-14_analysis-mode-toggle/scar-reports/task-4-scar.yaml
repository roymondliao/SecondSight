debt_location: >
  No new debt registered. Pre-existing debt from original Task 4:
  - Large session payload testing (deferred, not blocking).
  Both critical debts from original scar are now resolved (SIGTERM phase, jinja template).

narrative: |
  Task 4 revision resolves all 4 Critical and all 4 Important issues flagged by both reviewers.

  Critical Fix 1 (jinja bypass): Migrated prompt from inline f-string to
  src/secondsight/prompts/analysis/cli_dispatch.jinja2, rendered via _loader.render().
  Option (b) was chosen: new CLI-specific template, because behavior.jinja2 outputs
  BehaviorFlagDraft shape (segment-level), while CLI dispatcher needs full AnalysisOutput.
  SDK vs CLI template asymmetry is explicitly documented. Both dispatchers (CLI Task 4,
  SDK Task 5) use _loader.render() -- the shared-source guarantee holds.

  Critical Fix 2 (syntax): Line 351 had "except asyncio.TimeoutError, Exception:" which
  is Python 2 syntax. In Python 3.14 this is parsed as a tuple catch (semantically valid
  but overly broad -- catches any Exception). Fixed to explicit single-exception handlers:
  TimeoutError first, then a separate bare except for unexpected errors.

  Critical Fix 3 (SIGTERM): proc.terminate() (SIGTERM) is now sent before proc.kill()
  (SIGKILL). 1-second grace window allows subprocess to flush stderr gracefully.
  Death tests verify terminate() is called before kill(), and that stderr written during
  the SIGTERM grace window is captured into error_details.

  Critical Fix 4 (retry test): Restructured test_retry_augmented_prompt_includes_validation_error_verbatim
  to assert on captured CLI args (the last positional arg is the prompt for claude_code),
  not on stdin. The assertion is now unconditional (no `if x is not None:` guard).

  Important Fix 5 (dishonest default): Removed `agent_name="claude_code"` default from
  _make_failure_output(). All callers now explicitly pass agent_name. state_missing path
  uses _UNKNOWN_AGENT = "unknown" sentinel. Verified: AnalysisOutput cross-field invariant
  allows any non-None string for cli_agent when dispatched_via='cli'.

  Important Fix 6 (dead build_env): Removed build_env() from both adapters (claude_code.py
  and codex.py). Env filtering is centralized in dispatcher._filter_env(). The adapters'
  __init__.py docstring is updated. build_env tests migrated to note in test_cli_adapters.py
  (env filtering tested via TestEnvIsolation in test_cli_dispatcher.py).

  Important Fix 7 (codex tempfile): Codex output file now created in tempfile.TemporaryDirectory()
  (system temp, NOT project_root). Death test verifies output file path is not under project_root.
  TemporaryDirectory cleanup is explicit at each return path in _run_once.

  Important Fix 8 (stderr on success): On success with non-empty stderr, dispatcher now
  embeds stderr in error_details={"stderr": ...}. On clean success (no stderr), error_details
  remains None. Death tests verify both behaviors.

resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Prompt embedded as inline f-string in _build_poc_variant1_prompt() bypassing
      Task 3's jinja2 loader.
    resolution: >
      Created src/secondsight/prompts/analysis/cli_dispatch.jinja2.
      Dispatcher now calls _loader.render("analysis/cli_dispatch", context=...).
      _build_poc_variant1_prompt() removed. Content verified equivalent to old f-string.
      cli-protocol-poc-results.md updated to note the migration.

  - original_section: known_shortcuts
    original_description: >
      SIGTERM phase missing -- proc.kill() (SIGKILL) called directly without SIGTERM first.
    resolution: >
      Now: proc.terminate() (SIGTERM) -> asyncio.wait_for(..., timeout=1.0) -> on timeout:
      proc.kill() (SIGKILL). proc.communicate() after SIGKILL drains remaining output.
      Death tests: test_timeout_sends_sigterm_before_sigkill and test_sigterm_handler_stderr_captured.

  - original_section: known_shortcuts
    original_description: >
      Codex output file in project_root pollutes user state.
    resolution: >
      Output file now created in tempfile.TemporaryDirectory(prefix="secondsight_codex_").
      The tmpdir reference is kept alive for the duration of _run_once and cleaned up at
      each return point. Death test: test_codex_output_file_not_in_project_root.

  - original_section: silent_failure_conditions
    original_description: >
      Vacuous retry test (if captured_communicate_inputs[1] is not None:) meant the assertion
      about retry prompt augmentation was never executed for claude_code.
    resolution: >
      Restructured test to capture create_subprocess_exec args (the CLI positional args),
      not stdin. For claude_code, prompt is last CLI arg. Assertion now unconditional.

  - original_section: assumptions_made
    original_description: >
      _make_failure_output had default agent_name="claude_code" -- a lie for state_missing.
    resolution: >
      Default removed. All callers explicitly pass agent_name. state_missing uses
      _UNKNOWN_AGENT="unknown". Death test: test_state_missing_returns_unknown_agent_not_default.

  - original_section: silent_failure_conditions
    original_description: >
      build_env() in adapters was dead code (dispatcher called _filter_env() directly).
    resolution: >
      Removed build_env() from both claude_code.py and codex.py adapters.
      Updated __init__.py docstring. test_cli_adapters.py updated accordingly.

  - original_section: silent_failure_conditions
    original_description: >
      stderr not captured on success path despite spec/test claiming forensics.
    resolution: >
      Dispatcher now captures stderr into error_details={"stderr":...} on success when
      stderr is non-empty. Clean success (no stderr) preserves error_details=None.
      Tests: test_stderr_captured_in_error_details_on_success and
      test_clean_success_no_stderr_has_none_error_details.

  - original_section: known_shortcuts
    original_description: >
      ADAPTER_REGISTRY in __init__.py was dead code.
    resolution: >
      (Already resolved in prior iteration) Replaced with SUPPORTED_AGENTS frozenset.

  - original_section: assumptions_made
