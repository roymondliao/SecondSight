task_id: task-4
completion_status: done

known_shortcuts:
  - description: >
      Codex output file cleanup: on dispatcher crash (SIGKILL), the TemporaryDirectory
      finalizer may not run. The tmpdir cleanup is explicit at each return point in _run_once,
      but a hard SIGKILL to the dispatcher process itself would bypass the finally path.
      In that scenario, the OS will clean up the temp directory eventually (most OS temp
      cleanup policies handle this). The risk is minor and temporary.
    deferred_to_feature_iteration: false

  - description: >
      cli-protocol-poc-results.md documents the PoC verdict as PROCEED. The PoC used
      a minimal 10-event fixture. Production sessions with thousands of events approaching
      LLM context limits have NOT been tested. If large sessions cause context overflow
      (LLM truncates or refuses), the dispatcher's retry loop will catch the schema failure,
      but won't automatically truncate the payload. This is a known gap.
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: >
      If the LLM produces valid JSON that passes AnalysisOutput.model_validate_json() but
      contains semantically wrong behavior flags (correct schema, wrong analysis), the
      dispatcher returns success. There is no semantic correctness check. This is intentional:
      semantic validation belongs to Task 6/7's analysis quality layer, not the dispatcher.
    deferred_to_feature_iteration: false

  - description: >
      If os.environ is modified between CLIAnalysisDispatcher.__init__() and
      CLIAnalysisDispatcher.dispatch(), the dispatcher captures the modified env at
      dispatch time (not init time). _filter_env(os.environ.copy()) is called in _run_once,
      not at construction. This is correct behavior but the timing dependency is undocumented.
    deferred_to_feature_iteration: false

  - description: >
      If a future pydantic version changes the error type name from "json_invalid" to
      something else, the json_decode vs schema_mismatch classification in _run_once breaks
      silently (falls through to schema_mismatch). Monitored by pydantic version pinning.
    deferred_to_feature_iteration: false

  - description: >
      The codex adapter's build_command() generates an output file in the passed tmpdir.
      If the system temp directory is not writable (rare), codex subprocess writes will fail.
      The dispatcher catches OSError on output file read and returns 'output_file_missing'
      failure. This is the correct failure path.
    deferred_to_feature_iteration: false

  - description: >
      On success with stderr, dispatcher embeds stderr in error_details. This means
      error_details is non-None for a status='success' result. Downstream consumers that
      assume error_details is None on success will misread this. The cross-field invariant
      in AnalysisOutput does NOT enforce error_details=None on success -- only DC4 requires
      specific keys when fallback_used=True and status='failure'. The behavior is documented
      in the dispatcher and tested. Callers must check error_details for the 'stderr' key,
      not assume None means no forensics.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      claude --output-format json always wraps the LLM response in
      {"type":"result","result":"..."} envelope, even when the response is a raw JSON object.
    verified: true
    note: >
      Verified by 10 PoC probes. extract_result() falls back to raw stdout if envelope absent.

  - assumption: >
      codex exec --ephemeral -o <file> - reads the prompt from stdin and writes the last
      agent message to the output file as plain text.
    verified: true
    note: >
      Verified by 10 PoC probes. Output file contains raw LLM response text (valid JSON).

  - assumption: >
      asyncio.create_subprocess_exec's process.communicate(input=...) correctly closes
      stdin after writing and does not deadlock on large prompts.
    verified: true
    note: >
      Verified indirectly by PoC probes (prompt is ~7-8KB). No deadlock observed.

  - assumption: >
      asyncio.Process.terminate() sends SIGTERM on Unix (not SIGKILL).
    verified: true
    note: >
      Python asyncio docs confirm: terminate() sends SIGTERM on Unix, kill() sends SIGKILL.
      The SIGTERM -> grace -> SIGKILL sequence is now correctly implemented.

  - assumption: >
      pydantic ValidationError's error "type" field is "json_invalid" for invalid JSON
      input to model_validate_json().
    verified: true
    note: >
      Verified by test coverage. Pydantic version 2.13 (from venv).

  - assumption: >
      The PoC fixture session payload (10 events) is representative enough to validate
      the prompt's schema compliance. Production sessions may be much larger.
    verified: false
    note: >
      Only tested with a 10-event fixture. Large sessions have NOT been tested.
    deferred_to_feature_iteration: true

  - assumption: >
      Both claude and codex CLI binaries remain in PATH for the lifetime of the dispatcher.
      FileNotFoundError on spawn is caught and returned as 'subprocess_exit' failure.
    verified: true
    note: >
      FileNotFoundError catch in _run_once handles DC6. Covered by structural test coverage.

  - assumption: >
      jinja2 cli_dispatch.jinja2 template renders content equivalent to the old f-string prompt.
    verified: true
    note: >
      Verified by direct comparison: length differs by 1 byte (trailing newline from trim_blocks).
      All content checks pass: header, flag defs, session payload, schema, required fields.

  - assumption: >
      AnalysisOutput.model_json_schema() is stable enough to embed in a jinja template.
      If the schema changes, the template auto-updates (schema is injected at render time,
      not hardcoded in the template). The template uses {{ analysis_output_schema_json }}.
    verified: true
    note: >
      Schema is injected as a context variable each time render() is called.
      Template does not hardcode the schema. Schema changes are reflected immediately.

