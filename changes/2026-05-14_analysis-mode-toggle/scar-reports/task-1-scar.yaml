narrative: |
  ## Structural contradiction resolved: `analysis` field type change

  The task dispatch required replacing `analysis: GlobalAnalysisConfig` with `analysis: AnalysisConfig`
  in SecondSightConfig, while simultaneously forbidding changes to `analysis/runtime.py` dispatch logic.
  These two requirements are contradictory: runtime.py uses `cfg.analysis` with GlobalAnalysisConfig
  duck-typing (accessing `.default_agent` and `.models`).

  Resolution: Added `analysis_global: GlobalAnalysisConfig` as a parallel backward-compat field.
  `cfg.analysis` is now the new AnalysisConfig (cli+sdk aggregate). `cfg.analysis_global` carries
  the old GlobalAnalysisConfig for runtime.py and select_model(). runtime.py line 83 updated to
  use `cfg.analysis_global`.

  This creates a naming confusion debt: callers must know which field to use. Task 6 should migrate
  select_model() to use `cfg.analysis.cli.default_agent` and then remove `analysis_global`.

  ## AnalysisConfig name collision in config.schema

  The existing test `test_analysis_config_NOT_in_schema` in test_schema.py explicitly guarded
  against adding AnalysisConfig to config.schema. This task intentionally adds a NEW AnalysisConfig
  (the cli+sdk aggregate, distinct from analysis.config.AnalysisConfig which is the per-project
  TOML reader). The test was updated to reflect the new reality and verify the two classes remain
  distinct objects.

  ## Re-review round fixes (CRITICAL FIX 1, 2, IMPORTANT FIX 3, 4)

  CRITICAL FIX 1: `_render_text` in init.py now renders state_status for all 4 outcome variants:
  bold red for write failures, yellow for declined overwrites, dim for dry-run, plain for success.
  The original scar report wrongly classified this as "needs architecture change" — the fix is
  one block in one function. Reviewer was correct: task-scoped, not a deferral.

  CRITICAL FIX 2: `_build_global_analysis_config` now also warn-and-ignores the legacy flat
  [analysis] default_agent key when [analysis.cli] is absent — same condition as
  `_build_analysis_config`. A shared helper `_legacy_default_agent_should_be_ignored` ensures
  the two code paths cannot drift independently. Both now produce BUILTIN_DEFAULT_AGENT for
  ignored legacy configs, preventing the divergence where runtime.py (via analysis_global)
  dispatched to the "ignored" agent while Task 6 consumers (via analysis.cli) saw a different value.

  IMPORTANT FIX 3: DC12 warn condition updated to `flat key present AND no nested [analysis.cli]`.
  Migration configs (flat + nested) no longer trigger the warning. This prevents alert fatigue
  and makes the ignore semantics unambiguous.

  IMPORTANT FIX 4: SDK model defaults extracted to named constants (BUILTIN_SDK_PRIMARY_MODEL,
  BUILTIN_SDK_FALLBACK_MODEL, BUILTIN_ANALYSIS_TIMEOUT_SECONDS) in schema.py. Both schema dataclass
  defaults and loader fallbacks now reference the same constants — single source of truth.

