silent_failure_conditions:
  - description: >
      If `_write_state_json` fails with an OSError (disk full, permissions), the warning is
      logged and the state_status field in the summary now renders the failure message in
      bold red in `_render_text`. This was the previously-silent path. After CRITICAL FIX 1,
      the user sees the failure in the init output. However: init still exits 0. The user
      must act on the visible error themselves.

  - description: >
      The `caplog` fixture in `test_loader_v2.py` uses pytest's caplog to capture loguru warnings.
      This relies on the conftest.py loguru-caplog bridge fixture. If that bridge fixture is
      removed or broken, the DC12 warning tests will silently pass (caplog.records will be empty,
      `matching` will be [], and the assert will fail — but if a future dev changes the assert
      to a skip, detection would be lost).
    deferred_to_feature_iteration: false

  - description: >
      `AnalysisConfig.timeout_seconds` validation only checks isinstance(int). A TOML float
      like `timeout_seconds = 300.0` would raise SecondSightConfigError from the isinstance check.
      A TOML string like `timeout_seconds = "300"` also raises. Neither is documented clearly
      in the error message. Users who write floats get a confusing type error.
    deferred_to_feature_iteration: false

