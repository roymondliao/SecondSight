resolved_items:
  - original_section: assumptions_made
    original_description: >
      render_flag_definitions() header duplication when template also has the header.
    resolution: >
      Detected during self-iteration by inspecting rendered output (showed duplicate
      "The following are all valid behavior flag types..." lines). Fixed by removing
      the header from render_flag_definitions() so it only returns per-type definition
      entries; the template provides the surrounding [Flag Type Definitions] header.
      All 79 prompt tests pass after fix.

  - original_section: silent_failure_conditions
    original_description: >
      ty-check type error on the hasattr(ev, "model_dump") pattern carried over from
      the original behavior.py.
    resolution: >
      Replaced hasattr(ev, "model_dump") with isinstance(ev, BaseModel) for proper
      type narrowing. This is a direct improvement over the original code (not a
      preservation of a pre-existing issue). Added BaseModel import from pydantic.
      ty-check no longer flags behavior.py:70 for this pattern.
