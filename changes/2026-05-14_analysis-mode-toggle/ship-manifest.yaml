# =============================================================================
# Three-Year-Curse Points (for future maintainers)
# =============================================================================

three_year_curses:
  - location: "src/secondsight/analysis/runtime.py — analysis_global bridge field"
    curse: >
      analysis_global is a backward-compat bridge documented as deprecated.
      Without an explicit removal milestone tied to a ticket, this field
      will live forever as a permanent 'transitional' layer.
    mitigation: "Tracked in deferred_items.D1; iteration-log records the blocker"

  - location: "src/secondsight/sdk/trigger.py — Trigger.dispatch() blocking change"
    curse: >
      Docstring still claims non-blocking. Wired path is synchronous.
      Sweeper.sweep_stale_sessions() now serializes per-session dispatch.
      A future operator scaling N sessions will hit O(N × analysis_duration)
      sweeper lag without obvious cause.
    mitigation: "Documented in iter-F2 scar + iteration-log; needs Trigger refactor follow-up"

  - location: "src/secondsight/analysis/cli_dispatcher.py + sdk_dispatcher.py — Python 2 except syntax"
    curse: >
      Two except clauses use `except A, B:` (Python 2 form parsed as tuple-catch
      in Python 3.14). Works today; fragile to future Python parser changes.
      Same shape as a bug already fixed in cli_dispatcher.py:351 (Task 4 round-2).
    mitigation: "Documented in iter-F2 known_shortcuts; defer to a syntax-modernization sweep"

  - location: "src/secondsight/storage/__init__.py — import-as-registration pattern"
    curse: >
      All table modules must be imported in __init__.py to register with
      shared metadata. Future contributor adding a new *_table.py module
      may forget the registration import — metadata.create_all() silently
      creates all OTHER tables but not theirs.
    mitigation: "iter-F1 added CRITICAL comment block + test_table_registration.py invariant test pinning all 6 known tables"

