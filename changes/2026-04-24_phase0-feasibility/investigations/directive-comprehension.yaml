  Live agent execution was not feasible in Phase 0. This document contains:
  (1) experiment protocol designed for Phase 1 execution,
  (2) protocol-based result entries (compliance=not_tested) that define the
      full experiment matrix, and
  (3) failure mode analysis based on agent architecture knowledge from Tasks 1-4.
  Results will be populated during Phase 1 live testing. The protocol is
