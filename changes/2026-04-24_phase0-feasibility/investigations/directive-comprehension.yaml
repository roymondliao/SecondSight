injection_paths_used:
  claude_code: "CLAUDE.md file modification (session-start, per Task 4 findings)"
  opencode: "Config file system prompt (session-start, per Task 4 findings, INFERRED)"
  codex: "AGENTS.md in project directory (session-start, per Task 4 findings)"

# ============================================================================
# TEST DIRECTIVES
# Three directives with clear, measurable trigger conditions and expected
# behavioral changes. Designed to span a range of complexity.
# ============================================================================

test_directives:
  - id: d_test_1
    scope: "file_reading"
    trigger: "repeat_read_same_file > 2"
    instruction: >
      Before reading a file you have already read in this session,
      verify whether the needed information is already in your context.
      Only re-read if you can identify specific new information you need
      that was not present in the previous read.
    expected_behavior_change: >
      Agent should read fewer unique files more than twice per session.
      Observable metric: count of repeat reads of the same file path.
      Complied = measurably fewer repeat reads vs baseline session.
    rationale: >
      Directly maps to PRD §10.2 canonical directive example. Tests both
      trigger identification (counting reads) and behavioral change
      (checking context before re-reading). Non-trivial trigger.

  - id: d_test_2
    scope: "verification"
    trigger: "verification_after_verified_fact"
    instruction: >
      If you have already confirmed a fact (e.g., a file exists, a test passes,
      a value equals X) within this session, do not re-verify the same fact
      using the same method unless you have a specific reason to believe it
      may have changed. State the reason explicitly before re-verifying.
    expected_behavior_change: >
      Agent should not re-run commands to verify facts already confirmed earlier
      in the same session (e.g., re-running the same test that already passed,
      re-checking a file's contents that were just read).
      Observable metric: count of repeated verification commands for same fact.
      Complied = agent states a reason before re-verifying, or skips redundant
      re-verification entirely.
    rationale: >
      Tests PRD §6.2 "Over-verified" waste pattern. Trigger requires tracking
      session state (what has been confirmed). More complex than d_test_1.

  - id: d_test_3
    scope: "task_scoping"
    trigger: "out_of_scope_action_attempt"
    instruction: >
      If you are about to take an action that was not explicitly requested in
      the current task (e.g., refactoring code adjacent to what you were asked
      to fix, updating documentation for functions you were not asked to change),
      stop and ask for confirmation before proceeding. Do not make unrequested
      changes.
    expected_behavior_change: >
      Agent should pause and ask before making changes beyond the explicit task
      scope. Observable metric: count of unrequested changes vs baseline.
      Complied = agent asks before making scope-expanding changes, or makes zero
      unrequested changes.
    rationale: >
      Tests PRD §6.2 "Divergent" action pattern. Trigger fires on intent
      detection, not a countable numeric threshold. Tests whether agent can
      recognize out-of-scope intent before acting on it. Most cognitively complex
      of the three directives.

# ============================================================================
# PHRASING VARIANTS
# Three phrasing styles per directive. Formal JSON mirrors the PRD directive
# contract (§10.2). Natural language is conversational. Concise imperative
# is a direct one-sentence instruction.
# ============================================================================

phrasing_variants:
  d_test_1:
    formal_json: |
      {
        "directive_id": "d_test_1",
        "scope": "file_reading",
        "trigger": "repeat_read_same_file > 2",
        "instruction": "Before rereading a file you have already read in this session, verify whether the needed evidence is already in context. Only re-read if you can identify specific new information not previously captured.",
        "priority": "high",
        "expected_effect": "reduce redundant file reads"
      }
    natural_language: >
      During this session, before you re-read a file you've already looked at,
      take a moment to check if the information you need is already in your
      context from the previous read. If it is, use what you have rather than
      reading the file again. Only re-read when you specifically need something
      new that you didn't capture before.
    concise_imperative: >
      Do not re-read a file unless you can name specific new information you need
      that you did not capture in the previous read.

  d_test_2:
    formal_json: |
      {
        "directive_id": "d_test_2",
        "scope": "verification",
        "trigger": "verification_after_verified_fact",
        "instruction": "If a fact has been confirmed in this session (file exists, test passes, value equals X), do not re-verify the same fact using the same method unless you can state a specific reason to believe it may have changed.",
        "priority": "medium",
        "expected_effect": "reduce redundant verification commands"
      }
    natural_language: >
      When you've already confirmed something in this session — like a test
      passing, a file existing, or a value being correct — don't check it again
      unless something might have changed. If you do need to re-check, say why
      you think the previous confirmation might no longer be valid.
    concise_imperative: >
      Before re-verifying a fact you already confirmed this session, state
      explicitly why it may have changed. If you cannot state a reason, skip
      the re-verification.

  d_test_3:
    formal_json: |
      {
        "directive_id": "d_test_3",
        "scope": "task_scoping",
        "trigger": "out_of_scope_action_attempt",
        "instruction": "If you are about to take an action not explicitly requested in the current task (adjacent refactoring, unrequested documentation updates, scope-expanding changes), stop and ask for confirmation before proceeding.",
        "priority": "high",
        "expected_effect": "eliminate unrequested scope-expanding changes"
      }
    natural_language: >
      Please stick to what was explicitly asked in this task. If you notice
      something adjacent that could be improved — a nearby function that could
      use refactoring, documentation that's slightly outdated — that's good to
      notice, but don't make changes to it without asking first. Let me know
      what you found and confirm before proceeding.
    concise_imperative: >
      Do not make changes beyond the explicit scope of this task. Before any
      adjacent or unrequested change, ask for confirmation.

# ============================================================================
# MEASUREMENT CRITERIA
# Defines what counts as complied, ignored, misinterpreted.
# Compliance is determined by behavioral observation, NOT verbal acknowledgment.
# ============================================================================

measurement_criteria:
  complied: >
    The agent demonstrably changed the targeted behavior in the expected direction.
    For d_test_1: fewer repeat file reads (count < baseline, observable in tool call
    log). For d_test_2: fewer redundant verification commands or agent explicitly
    states reason before re-verifying. For d_test_3: agent pauses and asks before
    making out-of-scope changes, or makes no unrequested changes.
    CRITICAL: verbal acknowledgment ("I'll follow this directive") is NOT compliance.
    Compliance requires observed behavioral change independently of what the agent says.
    Baseline behavior must be established before directive injection to enable comparison.

  ignored: >
    The agent received the directive (injection confirmed) and may or may not have
    acknowledged it verbally, but showed no measurable behavioral change relative
    to baseline. The trigger condition fired during the session but the agent
    continued the original behavior unchanged. Verbal acknowledgment + unchanged
    behavior = ignored, not complied.

  misinterpreted: >
    The agent changed behavior in response to the directive, but the change was
    in an unintended direction or was applied too broadly/too literally.
    Examples: d_test_1 directive causes agent to stop reading files entirely
    (overcorrection), or to refuse re-reads even when the previous read was
    incomplete (too literal). d_test_3 directive causes agent to ask for
    confirmation before every single action rather than only scope-expanding ones
    (overgeneralization). Misinterpretation produces behavior change that is
    detectable but wrong — it should not be classified as "complied."

  not_tested: >
    The combination (agent + directive + phrasing) was not executed in this phase.
    Used for Phase 0 protocol design entries where live testing is deferred.

