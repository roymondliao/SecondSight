narrative: |
  The most significant finding is the identity clarification: the archived opencode-ai/opencode (Go) is not the same project as sst/opencode (TypeScript/Bun), which is what opencode.ai now documents. This could have caused the investigation to fail silently if the wrong repo was analyzed.

  The second critical finding is the Bun runtime constraint: OpenCode plugins are JavaScript/TypeScript, not Python. SecondSight needs a bridge layer (JS plugin that forwards events via HTTP to Python). This is documented but not prototyped — it is a Phase 1 task.

  The DB polling path (lazyagent approach) covers all 8 SecondSight requirements but is unofficial. The plugin API covers 6/8 officially. The recommended approach is to use both: DB polling for observation (all data) and plugin hooks for injection (directive delivery).

  Sub-agent detection is an important gap in the plugin API: session.created fires but doesn't carry parent_id in the event payload — parent_id must be retrieved from DB or via a client API call from within the plugin.
