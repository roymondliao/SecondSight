delivered_capability: >
  Convention injection into agent sessions and directive lifecycle management —
  ConventionSelector with ≤2000 token budget (greedy fill), ClaudeCodeAdapter
  inject_convention() formatting, POST /hook/session-start endpoint for
  synchronous convention query, directive lifecycle state machine (active →
  disabled/obsolete/superseded/expired with re-activation paths), and
  effectiveness tracking (flag frequency change → effective/ineffective judgment).

tasks_completed: 6
test_count_added: 33
test_count_total: 901
all_tests_pass: true

security_review:
  round_count: 1
  findings_total: 5
  findings_fixed: 5
  findings_accepted: 0
  details:
    - id: H-1
      severity: high
      issue: "Convention instructions injected into system prompt without sanitization — prompt injection vector"
      resolution: "Fixed: sanitize in inject_convention (collapse newlines, strip, truncate to 1000 chars)"
    - id: H-2
      severity: high
      issue: "Agent field reflected in error responses without validation — injection vector"
      resolution: "Fixed: validate agent field with is_safe_id; use static error messages"
    - id: M-1
      severity: medium
      issue: "Unbounded get_active_conventions query — no LIMIT"
      resolution: "Fixed: added LIMIT(100) to bound query cost"
    - id: M-2
      severity: medium
      issue: "No defense-in-depth filter for expired conventions in DB query"
      resolution: "Fixed: filter expired conventions (expires_at > now) in query"
    - id: M-3
      severity: medium
      issue: "RuntimeError detail forwarded in 503 response — internal state leakage"
      resolution: "Fixed: replaced with generic 'Project resources temporarily unavailable' message"

known_failure_modes:
  - mode: >
      If ALL conventions for a project individually exceed the 2000-token
      budget, none are selected — conventions="" and count=0. This is by
      design (greedy fill, no mid-text truncation), but an operator might
      interpret it as "no conventions exist" rather than "conventions too large."
    severity: degradation
    detection: "budget_used=0 with budget_total=2000 in session-start response when conventions are known to exist."

  - mode: >
      Convention with source_flag_type=None (manually created) always reports
      INSUFFICIENT_DATA for effectiveness — can never be judged effective or
      ineffective. These conventions persist indefinitely unless manually disabled.
    severity: degradation
    detection: "Operator queries effectiveness and sees persistent INSUFFICIENT_DATA for non-auto-generated conventions."

  - mode: >
      Effectiveness measurement baseline uses all sessions before convention
      created_at. In a long-running project, early sessions (different team,
      different practices) dilute the baseline. Frequency change may not
      reflect the convention's actual impact.
    severity: degradation
    detection: "Convention judged EFFECTIVE despite no behavioral change in recent sessions. Requires manual review of per-window frequencies."

  - mode: >
      superseded is a terminal state. If the replacement convention is later
      disabled or expires, the original stays superseded — no automatic
      fallback to the original.
    severity: degradation
    detection: "Operator notices a disabled replacement with no active alternative. Must manually re-activate the original via PATCH."

  - mode: >
      Token budget estimation uses chars/4 heuristic (conservative). For
      non-English text or code-heavy conventions, actual token count may
      differ significantly. Over-estimation (fewer conventions) is safe;
      under-estimation is unlikely given the 4x divisor.
    severity: degradation
    detection: "Actual injected text uses fewer Claude tokens than budget_used reports. Observable via Claude's token usage metrics."

accepted_risks: []

