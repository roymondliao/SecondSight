title: "實作統一 loader：SecondSightConfig, load_global_config, load_project_config（含 .env 載入 + ${VAR} interpolation）"
completion_status: done
# Post-review critical fixes applied 2026-05-13 — see resolved_items below for sfc-2-fix, sfc-5, sfc-6, sfc-7

known_shortcuts:
  - id: shortcut-1
    description: >
      RESOLVED (see resolved_items: shortcut-1-fix). The original implementation called
      load_global_config() inside load_project_config(), then parsed the global TOML a second
      time. Refactored to extract _build_config_from_docs() as a shared internal helper, and
      load_project_config() now parses global TOML only once.
    severity: none
    deferred_to_feature_iteration: false

  - id: shortcut-2
    description: >
      _resolve_ttl_field and _resolve_bool_field are imported from secondsight.storage.retention
      with their leading underscore names (private helpers). This creates a hidden coupling to
      retention.py's internal API — if those helpers are renamed or moved, loader.py breaks
      without any public API warning. A RetentionConfig.from_sections() classmethod in retention.py
      would be the correct boundary, but that would require modifying retention.py (outside this
      task's file scope).
    severity: low
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - id: sfc-1
    description: >
      _load_dotenv_if_exists() modifies os.environ for the entire process. In test environments
      that do NOT use monkeypatch, a test that calls load_global_config() or load_project_config()
      will permanently alter os.environ for subsequent tests in the same process. The test suite
      uses monkeypatch throughout test_loader.py, but future callers of load_global_config() in
      integration tests or other unit tests may not, causing cross-test env contamination that
      is intermittent and order-dependent.
    detection: >
      First detected when a test that does NOT call load_global_config() sees an unexpected
      ANTHROPIC_API_KEY or other key in os.environ. Difficult to trace because the source is a
      different test that ran earlier. CI test order randomization would expose this immediately;
      fixed test order masks it.
    deferred_to_feature_iteration: false

  - id: sfc-2
    description: >
      _interpolate_dict() and _interpolate_list() import os inside the function body (to avoid
      a module-level os import that the linter might flag). If a future refactor moves the import
      to module level and also changes how env is injected, the function signature (dict[str, str])
      and the internal os.environ reference may diverge silently. _interpolate_vars() accepts env
      as a parameter but _interpolate_dict() calls os.environ directly — there is a mismatch
      between the public interface and internal implementation.
    detection: >
      Tests pass os.environ to _interpolate_vars() directly (correct). But _interpolate_dict()
      does not accept an env parameter — it calls os.environ internally. If a test needs to inject
      a custom env dict into _interpolate_dict(), it cannot do so without monkeypatching os.environ.
      This is not currently a problem but limits testability.
    deferred_to_feature_iteration: false

  - id: sfc-3
    description: >
      The ${VAR} interpolation regex matches only [A-Z_][A-Z0-9_]* (uppercase). If a future
      operator writes a TOML value like ${my_lowercase_var} expecting interpolation, the value
      is returned as the literal string "${my_lowercase_var}" with no warning or error. The loader
      cannot distinguish "operator made a typo" from "this literal string is intentional".
    detection: >
      First detected when the operator sees a cryptic error from a downstream consumer (LiteLLM,
      etc.) complaining about a model name containing "${". No config-layer error is raised.
    deferred_to_feature_iteration: false

  - id: sfc-4
    description: >
      load_project_config() applies the SECONDSIGHT_DEFAULT_AGENT env var overlay only through
      load_global_config() → _build_global_analysis_config(). If the global config.toml does not
      exist AND SECONDSIGHT_DEFAULT_AGENT is not set, the default_agent is BUILTIN_DEFAULT_AGENT
      ("claude_code"). This is correct. But if load_project_config() is refactored in the future
      to not call load_global_config() (e.g. for performance), the env overlay for default_agent
      would be lost silently.
    detection: >
      Only detected via an explicit test for SECONDSIGHT_DEFAULT_AGENT overlay at project scope.
      Currently tested in TestUTLoadGlobalConfig.test_env_var_overrides_toml_default_agent.
    deferred_to_feature_iteration: false

  - id: sfc-5
    description: >
      ORIGINAL CLAIM FALSE: sfc-2 resolved_items claimed "env threaded recursively" but the actual
      production call chain _parse_toml → _interpolate_dict did NOT pass env. _parse_toml called
      _interpolate_dict(doc) without the env parameter, so any custom env dict passed to _parse_toml
      would be silently ignored and os.environ used instead.
    detection: >
      Code review (post-implementation) found that _parse_toml signature did not accept env at all.
      Confirmed by death test DT-loader-7: calling _parse_toml(path, env=custom_dict) raised
      TypeError: _parse_toml() got an unexpected keyword argument 'env'.
    deferred_to_feature_iteration: false

  - id: sfc-6
    description: >
      RetentionConfigError from _resolve_ttl_field and _resolve_bool_field (inside
      _build_retention_config) was not caught and re-raised as SecondSightConfigError. A caller
      using `except SecondSightConfigError` around load_global_config() or load_project_config()
      would silently miss retention parse errors (malformed TTL type, non-positive integer, etc).
    detection: >
      Code review found no try/except around the _resolve_* calls in _build_retention_config.
      Confirmed by death test DT-loader-8: load_global_config with retention TTL = "not-an-int"
      raised RetentionConfigError directly, not SecondSightConfigError.
    deferred_to_feature_iteration: false

  - id: sfc-7
    description: >
      _build_config_from_docs was missing from __all__ with no explanation, creating an inconsistency
      with the other testing-exposed helpers (_interpolate_vars, _interpolate_dict, _parse_toml all
      in __all__). Future test writers would infer _build_config_from_docs is not testable in isolation.
    detection: >
      Code review identified the inconsistency. The function is imported directly by tests without issue
      (Python __all__ only gates `from module import *`), but the missing entry + no comment was misleading.
    deferred_to_feature_iteration: false

assumptions_made:
