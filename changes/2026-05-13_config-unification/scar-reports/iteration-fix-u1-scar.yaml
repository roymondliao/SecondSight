narrative: |
  _build_orchestrator() was an 87-line function in analyze.py that assembled
  the Orchestrator dependency graph (LLMRouter, PydanticAIAnalysisAgent,
  all five repositories). It was never called from any live code path.

  The maintenance burden: every structural change to the build pipeline
  (RunConfig shape, RuntimeAnalyzer constructor, AnalysisTools parameters)
  created an implicit obligation to keep _build_orchestrator() in sync —
  even though no caller would ever surface a divergence. The function
  accumulated several internal comments referencing design decisions from
  runtime.py that it shadowed.

  The fix: single-pass deletion. Death test first — RED confirms the function
  existed before. Delete the function body — GREEN confirms it's gone.
  316 unit tests pass with zero regressions.

