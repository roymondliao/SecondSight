completion_status: done_class_identity_split_resolved

known_shortcuts:
  - id: shortcut-1
    description: >
      RESOLVED (see resolved_items: shortcut-1-fix). The class identity split
      between config/schema.py and analysis/config.py for AnalysisConfig and
      AnalysisConfigError has been eliminated. AnalysisConfig and AnalysisConfigError
      are no longer defined in config/schema.py. The canonical versions remain in
      analysis/config.py with AnalysisConfig.load() intact. Task-2's loader
      integration will eventually make AnalysisConfig a re-export, but the split
      is fully resolved now.
    severity: none
    deferred_to_feature_iteration: false

  - id: shortcut-2
    description: >
      storage/retention.py does NOT import RetentionConfig from config/schema.py
      (which would be a circular import: schema.py imports from retention.py).
      Instead, schema.py imports from retention.py and re-exports. This is the
      correct direction, but it means RetentionConfig's __module__ remains
      secondsight.storage.retention rather than secondsight.config.schema.
      This is intentional and correct; the test TestDTSchema3RetentionConfigIdentity
      verifies same-object identity.
    severity: low
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - id: sfc-1
    description: >
      If a developer adds a new class to analysis/config.py after the GUR-103
      task-3 block (which now has a comment saying "do NOT redefine here"),
      the new class would be defined locally in analysis/config.py, NOT in
      config/schema.py. This creates a class identity split. The comment is the
      only guard — no runtime check enforces it.
    detection: >
      Would be caught only by a test that asserts class identity for the new
      class, or by a code reviewer reading the analysis/config.py file. No
      automated detection currently.
    deferred_to_feature_iteration: true

  - id: sfc-2
    description: >
      _verify_adapter_registry_consistency() runs at module import of
      sdk/model_selection.py and imports ModelsConfig from analysis.config.
      If analysis.config somehow fails to re-export ModelsConfig from config.schema
      (e.g. import error during schema module load), the RuntimeError from
      _verify_adapter_registry_consistency would surface at import time — but
      the error message would say "ModelsConfig fields != adapter keys" rather
      than "import failed", potentially confusing diagnosis.
    detection: >
      Import error at test collection time — would be immediately visible.
      Not a silent failure per se, but the error message may mislead diagnosis.
    deferred_to_feature_iteration: false

  - id: sfc-3
    description: >
      get_env_analysis_model() and get_env_default_agent() normalize "" to None
      using `if not value`. A value of whitespace-only (e.g. " ") would be
      returned as " " (non-empty, truthy) and treated as a valid model name by
      the loader in task-2. This would cause a ModelSelectionError or LiteLLM
      error at analysis time, not at config load time.
    detection: >
      First detected by the user when analysis fails with a mysterious model
      name error. No test covers whitespace-only env var values.
    deferred_to_feature_iteration: true

