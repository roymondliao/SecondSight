debt_registered:
  - id: debt-1
    description: >
      AnalysisConfig.load() remains in analysis/config.py (analysis layer owns it).
      The schema identity split is resolved — config/schema.py no longer defines
      AnalysisConfig at all. Task-2 should integrate load() into the unified loader,
      at which point analysis.config.AnalysisConfig becomes a pure re-export from
      config.schema (if desired). This is an optional consolidation, not a bug.
    location: src/secondsight/analysis/config.py (AnalysisConfig.load classmethod)
    target_task: task-2

  - id: debt-2
    description: >
      sfc-3: whitespace-only env var values (e.g. SECONDSIGHT_ANALYSIS_MODEL=" ")
      are not normalized to None. Task-2's loader should strip and re-check, or
      env.py helpers should strip before the empty check.
    location: src/secondsight/config/env.py (get_env_analysis_model, get_env_default_agent)
    target_task: task-2

debt_location: src/secondsight/config/

narrative: >
  The main structural risk in this task was circular imports. config/schema.py
  needs RetentionConfig but cannot define it without pulling in the entire storage
  layer. The solution (import RetentionConfig FROM retention.py into schema.py,
  not the other direction) keeps the dependency arrow clean: config/ depends on
  storage/ for RetentionConfig only, and storage/ does not depend on config/ at all.

  The second risk was class identity: analysis.config previously defined its own
  ModelsConfig etc. After adding imports from config.schema at the top of
  analysis/config.py, the old class definitions further down the file were still
  shadowing them. This required explicitly removing the duplicate definitions and
  replacing them with a comment explaining why they must not be re-added.

  The _verify_adapter_registry_consistency() check (sdk/model_selection.py) that
  runs at import time served as a live integration test: if the import chain broke,
  it would have raised RuntimeError during test collection.

resolved_items:
  - original_section: silent_failure_conditions
    original_id: sfc-1
    description: >
      No runtime guard against re-adding class definitions in analysis/config.py
      that would shadow the re-exports from config/schema.py.
    resolution: >
      Added four new tests in TestUTBackwardCompatibility:
      test_global_analysis_config_class_identity, test_fallback_models_config_class_identity,
      test_project_analysis_config_class_identity, and test_analysis_config_class_identity_preserved.
      Each asserts `ClassFromAnalysis is ClassFromSchema` using `is` identity.
      Also added TestUTImportChainIntegrity with test_model_selection_import_succeeds
      and test_no_circular_import_config_to_storage as live import-chain guards.
      These tests will fail immediately if someone re-adds a class definition in
      analysis/config.py that shadows the re-export.

  - original_section: silent_failure_conditions
    original_id: sfc-3
    description: >
      Whitespace-only env var values (e.g. SECONDSIGHT_ANALYSIS_MODEL="  ") were
      not normalized to None — they would be returned as " " and treated as a valid
      model name by the task-2 loader, causing ModelSelectionError at analysis time
      rather than at config load time.
    resolution: >
      Fixed in env.py: both get_env_analysis_model() and get_env_default_agent() now
      call .strip() on the raw value before the empty check. A whitespace-only value
      strips to "" which is falsy, so the helper returns None.
      Added test_whitespace_only_returns_none to TestUTEnvAnalysisModel to guard this.

  - original_section: silent_failure_conditions
    original_id: sfc-2
    description: >
      Import chain integrity: if schema.py import fails, _verify_adapter_registry_consistency()
      error message may be misleading.
    resolution: >
      Added TestUTImportChainIntegrity.test_model_selection_import_succeeds which imports
      sdk.model_selection at test time (triggering _verify_adapter_registry_consistency()).
      If the import chain breaks, this test fails at collection time with a clear ImportError
      before any misleading RuntimeError can appear.

  - original_section: known_shortcuts
    original_id: shortcut-1-fix
    description: >
      AnalysisConfig class identity split between config/schema.py and
      analysis/config.py: two separate class objects with the same name broke
      isinstance() checks and except-clause matching across module boundaries.
    resolution: >
      Removed AnalysisConfig, AnalysisConfigError, BUILTIN_SIZE_CAP_KB, and
      BUILTIN_READ_PROJECT_FILE_ENABLED from config/schema.py entirely.
      The canonical definitions remain in analysis/config.py (with load() method).
      Updated __all__ in schema.py to remove the four names.
      Updated test TestDTSchema4ModelConfigsImportable::test_analysis_config_importable
      to test_analysis_config_NOT_in_schema — now a death test asserting ImportError.
      Added five new guard tests in TestUTBackwardCompatibility:
        - test_analysis_config_has_load_method (load() still present in analysis.config)
        - test_analysis_config_error_is_exception (AnalysisConfigError still in analysis.config)
        - test_analysis_config_not_in_schema (hasattr check — config.schema has no AnalysisConfig)
        - test_analysis_config_error_not_in_schema (hasattr check — no AnalysisConfigError in schema)
      Verified post-fix: `from secondsight.config.schema import AnalysisConfig` raises
      ImportError; `from secondsight.analysis.config import AnalysisConfig` succeeds with load().
      Full suite: 1055 passed, 6 pre-existing integration failures unchanged.
