debt_registered:
  - id: debt-1
    description: >
      Structural typing contract between SimpleNamespace wrappers and select_model() is
      implicit — no Protocol or type annotation enforces it. If select_model() or
      SecondSightConfig attribute names change independently, the wiring silently degrades.
      A typed wrapper dataclass or Protocol that select_model() accepts would make this
      contract explicit and detectable by mypy.
    debt_location: >
      src/secondsight/analysis/runtime.py:_build_analysis_agent() (lines wrapping cfg in SimpleNamespace)
      src/secondsight/cli/analyze.py:_build_orchestrator() (same)
      src/secondsight/sdk/model_selection.py:select_model() (function signature uses object)

  - id: debt-2
    description: >
      _build_orchestrator() in cli/analyze.py is dead code. It should either be wired up
      or deleted. Leaving it corrected but uncalled creates a maintenance burden: any future
      change to the build pipeline must be applied to both _build_in_process_trigger() and
      _build_orchestrator() independently.
    debt_location: src/secondsight/cli/analyze.py:_build_orchestrator()

narrative: >
  The implementation is minimal: replace two hardcoded constructor calls with load_project_config()
  and correctly wrap the result for select_model()'s structural typing interface.

  Critical insight: select_model() expects project_config.analysis.model and global_config.analysis.{...}.
  SecondSightConfig has cfg.project_analysis (not cfg.analysis for the project-level model).
  Therefore the wrappers MUST be:
    project_config=SimpleNamespace(analysis=cfg.project_analysis)
    global_config=SimpleNamespace(analysis=cfg.analysis)
  Passing cfg directly as either argument would silently produce wrong model selection
  (cfg.analysis has no .model attribute; cfg.project_analysis has no .default_agent attribute).

  The death tests DT-wire-1 and DT-wire-2 are the critical protection: they assert the
  resolved model name matches the TOML/env override, catching any SimpleNamespace wiring bug
  without requiring the tests to know about select_model()'s internal implementation.

  The _build_orchestrator() fix also corrects a pre-existing bug where ProjectAnalysisConfig()
  was passed directly as project_config (without SimpleNamespace wrapping) — select_model()
  would have raised AttributeError on .analysis.model if that dead code path were ever activated.

