known_shortcuts:
  - id: shortcut-1
    description: >
      runtime.py:_build_analysis_agent() and cli/analyze.py:_build_orchestrator() have
      overlapping model-selection logic (both call load_project_config + select_model with
      the same SimpleNamespace wrapper pattern). This is pre-existing duplication not
      introduced by this task. The two helpers serve different call paths (_build_orchestrator
      is dead code in v1; _build_analysis_agent is the live path via build_project_analysis_runtime).
      Not merged in this task — merging would require understanding the full _build_orchestrator
      lifecycle, which is outside this task's scope.
    severity: low
    deferred_to_feature_iteration: true

  - id: shortcut-2
    description: >
      _build_orchestrator() in cli/analyze.py is dead code (defined but never called from
      any live code path in v1). The fix is applied anyway for correctness and to prevent
      the bug from silently surfacing if _build_orchestrator() is wired in the future.
      Leaving dead code corrected is preferable to leaving it broken.
    severity: none
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - id: sfc-1
    description: >
      select_model() uses structural typing (object with .analysis.*). The wiring
      uses SimpleNamespace(analysis=cfg.project_analysis) and SimpleNamespace(analysis=cfg.analysis)
      to match the expected interface. If SecondSightConfig's attribute names change
      (e.g., project_analysis renamed to project_model_config), the SimpleNamespace wrapping
      will produce an object with wrong attribute names — select_model() will access the
      wrong attribute and return the built-in default silently. No exception, no log line.
    detection: >
      The death tests DT-wire-1 and DT-wire-2 catch this directly: they assert on the
      resolved model name and fail if select_model() gets wrong input.
    deferred_to_feature_iteration: false

  - id: sfc-2
    description: >
      load_project_config() calls _load_dotenv_if_exists() which has a process-wide side
      effect on os.environ (override=False). Called on every analysis run, this means
      .env file is loaded repeatedly. With override=False this is safe (existing env vars
      win), but if the .env file changes between calls within the same process, the change
      is not picked up (os.environ already has the key from the first load). This is
      accepted behavior per the loader docstring; mentioned here for visibility.
    detection: None in v1 — operator would need to restart the process to pick up .env changes.
    deferred_to_feature_iteration: false

  - id: sfc-3
    description: >
      load_project_config() is called on every _build_analysis_agent() invocation (every
      analysis run). No caching. For a high-throughput deployment, this adds TOML parsing
      overhead per run. In v1 with single-project, single-threaded use this is negligible.
      Accepted for v1.
    detection: Operator would see elevated analysis latency if TOML parsing becomes a bottleneck.
    deferred_to_feature_iteration: true

  - id: sfc-4
    description: >
      If both runtime.py and analyze.py:_build_orchestrator() are active simultaneously
      (future refactor wires _build_orchestrator), the two load_project_config() calls
      per run would race on .env loading. With override=False both reads are idempotent,
      so this is not a correctness issue. Mentioned for the architectural record.
    detection: Race is benign with override=False. No detection needed.
    deferred_to_feature_iteration: false

