debt_location: src/secondsight/config/template.py, src/secondsight/cli/init.py

narrative: >
  The main structural decision was WHERE to put write_config_if_needed(): the task
  spec said "installer.py" but that file doesn't exist — the init orchestration lives
  in cli/init.py. The function was placed in config/template.py (correct per the
  import rules: no analysis/sdk imports) and wired into cli/init.py as Stage 3.

  The diff protection logic uses flat key-path set comparison (_flatten_toml).
  This is deliberately simple (Scar-1) — it handles presence/absence only and
  does not detect type changes. The scar is documented and deferred.

  The "never raise" contract for Stage 3 (write_config_if_needed returns string,
  never raises) is enforced by catching bare Exception from tomllib.load(). The
  tradeoff is that I/O errors (sfc-2) are misclassified as "malformed". This is
  the correct tradeoff: hook installation succeeding is more important than a
  perfect config.toml error message.

  The existing dry-run test (test_death_init_dry_run_does_not_touch_disk) remains
  valid — dry_run=True causes write_config_if_needed to skip all writes and return
  a message. The test uses --format json and only checks exit_code==0 and absence
  of hook files, so the new keys in the JSON summary don't break it.

resolved_items:
  - original_section: assumptions_made
    original_id: assumption-1
    description: >
      Python version constraint: whether tomllib is always available as stdlib.
    resolution: >
      Verified by reading pyproject.toml: `requires-python = ">=3.14,<3.15"`.
      Python 3.14 has tomllib as stdlib (added in 3.11). The tomli fallback
      import in template.py is defensive dead code — harmless but not needed.
      Debt-1 (pyproject.toml check) is closed.

  - original_section: known_shortcuts
    original_id: shortcut-2
    description: >
      Existing CLI tests (test_init_apply_then_idempotent, test_init_codex_apply_then_idempotent,
      test_death_init_dry_run_does_not_touch_disk) did not pass --secondsight-home,
      so Stage 3 would run against the real ~/.secondsight during testing.
    resolution: >
      Updated all three tests in tests/cli/test_cli_app.py to pass
      `--secondsight-home {tmp_path}/secondsight`, isolating Stage 3 from the
      real filesystem. Also added explicit assertion to dry_run test:
      `assert not (fake_ss_home / "config.toml").exists()`.
      This is within task scope (test isolation for new CLI option) even though
      it modifies existing test files.

  - original_section: silent_failure_conditions
    original_id: sfc-2
    description: >
      Bare `except Exception` misclassifies I/O errors as "malformed TOML".
    resolution: >
      Documented the intentional tradeoff in a code comment (lines 242-250 of
      template.py). The "never raise" contract is more important than perfect
      error classification. No code change — only documentation. The sfc-2
      entry remains in the scar report as accepted risk.

  - original_section: known_shortcuts
    original_id: shortcut-1
    description: >
      Fragile string-prefix heuristic in _render_text() for config_status coloring.
    resolution: >
      The rendering logic distinguishes "malformed" (yellow warning) from "new key"
      (diff output) from other messages (plain text). The multiline diff case
      iterates lines and applies yellow only to the first line (path-based message).
      This is the best fix achievable within the constraint that write_config_if_needed()
      returns a string (not a structured type). Marked severity: low — acceptable.

  - original_section: known_shortcuts
    original_id: vocabulary-coupling
    description: >
      Post-review cleanup (task-4 PASS_WITH_CONCERNS): _render_text() in cli/init.py
      pattern-matched against raw string literals ("malformed", "new key") that were
      also produced by write_config_if_needed() in template.py — no shared contract.
      A rename of either string would silently break coloring with no test failure.
    resolution: >
      Added MSG_GENERATED, MSG_MALFORMED, MSG_NEW_KEYS, MSG_UP_TO_DATE string constants
      to template.py (exported via __all__). write_config_if_needed() now builds its
      return strings using these constants (e.g. f"...is {MSG_MALFORMED}."). cli/init.py
      imports MSG_MALFORMED and MSG_NEW_KEYS and uses them in the _render_text() checks.
      Five death tests in tests/config/test_template.py pin each constant against the
      actual return value (test_death_msg_constants_match_*) and verify importability
      (test_death_vocab_constants_are_importable). An ImportError is now the immediate
      signal for a coupling break — no more silent color regression.
