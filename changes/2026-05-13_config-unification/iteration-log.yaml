          rationale: "Current MVP scope is global+project only. Env-var attribution is future work tracked in feature backlog."
        - description: "D-4: _interpolate_dict() resolves env vars greedily at parse time; no lazy or deferred substitution"
          expiry_date: "2026-08-13"
          rationale: "Lazy interpolation is not required for current use cases. Acceptable until dynamic config loading is needed."
        - description: "D-5: config show --source uses string matching to attribute TTL keys; brittle if key names change"
          expiry_date: "2026-08-13"
          rationale: "Key names are constants (_TTL_INT_KEYS). A rename would break the match but the death test would catch it."
        - description: "A-1: _parse_toml() does not accept a raw_env parameter override; callers must load .env before calling"
          expiry_date: "2026-08-13"
          rationale: "All callers follow the _load_dotenv_if_exists() → _parse_toml() ordering contract. Documented in scar reports."
