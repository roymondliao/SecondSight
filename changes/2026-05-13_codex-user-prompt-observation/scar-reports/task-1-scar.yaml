      `user_prompt_submit.json` uses `session_id` as the privacy canary because
      the expected normalized payload must contain the real prompt text. Prompt
      leakage back into `Event.data` is still covered by adapter assertions, but
      the fixture-governance test cannot treat `prompt` itself as a drop-boundary
      canary.
    deferred_to_feature_iteration: false

