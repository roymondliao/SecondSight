task_id: task-1
completion_status: done

known_shortcuts:
  - description: >
      `read_historical_flags` fetches all flags per BehaviorFlagType with N separate
      repo calls (one per flag_type enum value — currently 6). The `limit` parameter is
      applied after fetch in Python, not at the SQL level. For a project with many
      flags per type, this reads more data than necessary before truncating.
      Documented in the method docstring. Accept for v1 — cost bounded by 6 types.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      Latin-1 or other high-byte encodings that are valid UTF-8 by accident:
      A file encoded in Latin-1 whose bytes all happen to decode as valid UTF-8
      codepoints (not common but possible) will pass the binary guard and the
      UnicodeDecodeError check, returning garbled-but-decodable content to the LLM
      instead of the binary placeholder. The null-byte check catches .pyc and most
      true binary files; the UTF-8 decode catches Latin-1 failures. The residual
      case (valid-UTF-8 from Latin-1) is rare in practice.
    deferred_to_feature_iteration: true

  - description: >
      `read_project_file` does not check if the path resolves to a directory.
      `Path.resolve(strict=True)` on a directory succeeds; `read_bytes()` on a
      directory raises `IsADirectoryError` (Linux) or similar OS error. This is
      caught by the generic `OSError` handler and wrapped as `ProjectFileToolError`,
      but the error message says "OS error: [Errno 21] Is a directory" — confusing
      for an LLM tool caller.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      `project_root` passed to AnalysisTools is an absolute path pointing to an
      existing directory. The constructor validates absoluteness (ValueError on relative
      paths) but does NOT validate existence.
    verified: true
    note: >
      Verified: constructor raises ValueError for relative paths (DT-1.7 covers this).
      Existence check deferred — if directory doesn't exist, the first
      `read_project_file` call will fail at `Path.resolve(strict=True)` step since
      the base directory itself doesn't exist. The error surfaces as
      `ProjectFileToolError` with an OS error message.

  - assumption: >
      `BehaviorFlagsRepository.get_project_flags_by_type` accepts a
      `BehaviorFlagType` enum value (not raw string) as the second argument.
    verified: true
    note: >
      Verified by reading behavior_flags_repository.py:99-111. Method signature
      is `(project_id: str, flag_type: BehaviorFlagType)`.

  - assumption: >
      `BehaviorFlagsRepository.count_by_type` exists and accepts `project_id: str`.
    verified: true
    note: >
      Verified by reading behavior_flags_repository.py:113-138.

  - assumption: >
      `DirectivesRepository.get_active_conventions` exists and accepts `project_id: str`.
    verified: true
    note: >
      Verified by reading directives_repository.py:106-130.

  - assumption: >
      The `[analysis.read_project_file]` TOML section nesting is the correct
      config format per 2-plan.md §6. Task-4 (sdk/agent.py) must call
      AnalysisConfig.load() and pass config values to AnalysisTools at
      construction time. Now includes read_project_file_enabled parameter.
    verified: false
    note: >
      The section name matches 2-plan.md §6. AnalysisTools now accepts
      read_project_file_enabled parameter (default True). If task-4 constructs
      AnalysisTools without loading AnalysisConfig, the extra_denylist,
      size_cap_bytes, and read_project_file_enabled will all default to built-ins
      — not a security regression, but config overrides would be silently ignored.
    deferred_to_feature_iteration: true

  - assumption: >
      Binary detection operates on the full file bytes before truncation. A 300 KiB
      file with text in first 256 KiB and null bytes after must return binary
      placeholder, not truncated text.
    verified: true
    note: >
      Verified in fix-loop: binary check now runs on full raw_bytes before the size
      cap slice. Death test DT-1.5b covers this case specifically.

debt_registered: true
debt_location: >
  src/secondsight/analysis/tools.py:242-247 (directory read: IsADirectoryError
  catches as generic OSError);
  src/secondsight/analysis/tools.py:387-396 (read_historical_flags: Python-level
