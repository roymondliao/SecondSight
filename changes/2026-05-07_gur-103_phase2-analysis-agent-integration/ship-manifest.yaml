# --- Notes for next phase ---

notes_for_phase_3:
  - >
      Recurring private-attribute coupling pattern caught 4× during
      this issue (LLMRouter._primary, EventsRepository._db,
      LazyCacheWithLocking._values, original agent.py inert proxies).
      Each fix added a public read API on the source module. Phase 3
      should consider whether the standard module shape needs an
      explicit "configuration view" public API by default — or
      whether a project-wide convention codifies this expectation.
  - >
      D7 'auto' mode is implemented as opt-in but currently always
      raises ModelSelectionError because events.agent_type column
      doesn't exist. When that schema migration lands (deferred from
      P1 scope), the test
      test_events_repository_get_latest_session_agent_type_always_returns_none
      becomes the marker — its failure signals the migration landed and
      the auto-mode behavior must be re-validated against real data.
  - >
      LLMRouter logging schema (provider/model/tokens_in/tokens_out/
      duration_ms/attempt/total_attempts/outcome) is the contract
      Phase 3 dashboard's fallback_chain_success_rate sub-metric will
      parse. Keep this schema STABLE across refactors. Test
      DT-2.5/DT-2.5b protect the keys-present invariant; values-correct
      protection is a feature-iteration item.

