    expires: "2026-08-08"

  - risk: >
      GlobalAnalysisConfig TOML loader not yet implemented; CLI
      in-process construction uses GlobalAnalysisConfig() defaults
      (claude_code adapter, default fallback chain). Operator's
      ~/.secondsight/config.toml is silently ignored for model
