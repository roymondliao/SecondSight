# --- Monitoring hooks ---

monitoring_hooks:
  - >
      Router INFO logs (provider, model, tokens_in, tokens_out,
      duration_ms, attempt, total_attempts, outcome) — used by future
      aggregator sub-metric "fallback_chain_success_rate". Schema is
      machine-parseable (key=value).
  - >
      analysis_runs.stage column — terminal stages (summary_written /
      aggregated / failed) and completed_at timestamp — used by future
      dashboard to surface stuck/failed analyses.
  - >
      Sweeper coordinator WARNING logs (project_id, session_id,
      last_event_ts) — used by operator to spot timeout-fallback
      candidates.
  - >
      ProjectFileToolError WARN logs on every denylist or sandbox
      rejection — preserves the resolved path AND the original
      relative_path so audits can detect paths attempting escape.
  - >
      ModelSelectionError raise messages include suggested_config
      TOML snippet — operator gets actionable guidance directly from
      the error.
  - >
      DT-1.5b death test (binary check on full bytes before
      truncation) regression-protects against the binary-truncation
      ordering vulnerability.

# --- Kill switches ---

kill_switch: >
  Per-feature kill switches available without code changes:
  (a) [analysis.read_project_file] enabled = false in
      ~/.secondsight/projects/{project_id}/config.toml — disables
      read_project_file tool for that project (D8 escape valve);
      implemented as first check in tools.py:264, raises
      ProjectFileToolError("read_project_file is disabled by project
      config") with NO FS access attempted.
  (b) Set [analysis.models.fallback] fallback_models = [] in global
      config — disables fallback routing globally (router logs WARN at
      construction; primary failure raises immediately, never silent
      fallback to a different provider).
  (c) Stop the API server (`secondsight serve --stop`) — disables the
      Sweeper coordinator (timeout-fallback inactive); event-driven
      trigger also stops because pipeline.ingest is server-bound.
      Manual CLI (secondsight analyze) still works.
  (d) Comment out
      `pipeline.add_post_ingest_callback(trigger.handle_session_end)`
      in api/server.py lifespan — disables the event-driven trigger
      while keeping the server running. Sweeper + manual CLI still work.

