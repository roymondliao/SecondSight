    accepted_by: human
    expires: "2026-08-08"

  - risk: >
      Test scaffolding partial migration: tests/_factories.py exists
      but test_trigger.py and test_analyze.py still use module-local
      _make_event helpers with different default constants
    accepted_by: human
    expires: "2026-08-08"

  - risk: >
      Deferred test for in-process CLI orchestrator construction
      end-to-end — would have caught the security-review Medium-1+2
      kwargs typo before ship; the fix-loop closed those bugs but a
      smoke test should land in feature iteration
    accepted_by: human
    expires: "2026-07-08"  # earlier expiry — high preventability

  - risk: >
      SECONDSIGHT_SERVER_URL env var has no scheme/host validation
