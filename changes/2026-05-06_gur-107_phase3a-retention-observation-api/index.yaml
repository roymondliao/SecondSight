    - "P3A-11 analysis_ttl_days wiring"
    - "Post-analysis cleanup trigger"
  blocked_on: GUR-100 (Phase 2 analysis tables: analysis_results, behavior_flags)
  defers_to: GUR-107b (to be filed)

unblocked_subset_in_scope:
  - "P3A-13 — Observation API endpoints (GET sessions/, sessions/{id}, sessions/{id}/segments, sessions/{id}/segments/{idx})"
