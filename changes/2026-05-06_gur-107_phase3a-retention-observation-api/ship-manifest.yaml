# --- Security & privacy ---
security_privacy_review:
  artefact: changes/2026-05-06_gur-107_phase3a-retention-observation-api/security-privacy-review.md
  verdict: PASS_WITH_ONE_MEDIUM
  high: 0
  medium: 1
  medium_finding: >
    MEDIUM-1: RawTracesPurger._delete_fs_session does not re-validate
    session_id against the RawTraceStore _SAFE_SESSION_ID regex before
    shutil.rmtree. Defense-in-depth gap, not exploitable under current
    invariants (single-writer RawTraceStore + adapter validation).
    Deferred to a follow-up issue (see carry_forward).
  risks_accepted: 0

# --- Carry-forward (NOT blocking ship) ---
carry_forward:
  - id: GUR-147-followup-1
    summary: "Harden RawTracesPurger session_id validation (MEDIUM-1 from security review)"
    rationale: >
      Add regex re-validation in _delete_fs_session before shutil.rmtree.
      Near-zero-cost fix; should land before any new event writer is
      introduced (e.g. a future adapter that bypasses RawTraceStore).
    blocking_ship: false
  - id: GUR-107b
    summary: "analysis_ttl_days enforcement + post-analysis cleanup trigger"
    rationale: >
      Defers to GUR-101 analysis orchestrator (still missing the
      post-completion event hook that cleanup will register against).
      Behavior_flags + directives tables already shipped via GUR-100.
    blocking_ship: false  # explicitly out-of-scope per board (A) split

