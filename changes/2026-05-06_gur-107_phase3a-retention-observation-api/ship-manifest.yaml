# Ship Manifest — GUR-147 (unblocked subset of GUR-107 Phase 3A)
# Validate-and-ship gate complete on 2026-05-06.

scope_note: >
  GUR-147 is the unblocked subset of GUR-107 (P3A) per board confirmation
  `a0a92005` (option A split, accepted 2026-05-06T02:32:13Z). The remainder
  — analysis_ttl_days enforcement + post-analysis trigger — is filed as
  GUR-107b and remains blocked on GUR-101 analysis orchestrator
  (per CEO advisory `e3c7e9ee`).

delivered_capability: >
  Three operator-facing surfaces grounded against SD §3.10 + §10.4:
  (1) raw_traces TTL retention via TOML config + RetentionConfig +
  enumerate_expired_sessions + RawTracesPurger with FS-first / DB-second
  partial-failure contract; (2) `secondsight cleanup [--dry-run]
  [--project-id PID] [--format json|text]` CLI subcommand reusing the
  cli/sync.py FS-walk pattern (D8 asymmetry: CLI is sync, API uses async
  ProjectRegistry); (3) Observation API with 4 GET endpoints (sessions
  list/detail, segments list/detail) over the existing events table,
  required project_id query param (DC-4) closing cross-project leakage,
  ETag freshness markers (DC-7) + opaque cursor pagination. NO new auth
  surface — inherits Phase 1 local-only-bind trust model. NO LLM calls
  — those land in GUR-101.

# --- What was built ---
production_modules:
  - id: A1
    path: src/secondsight/storage/retention.py (RetentionConfig + helpers)
    closes: >
      First config consumer in the codebase (verification finding C1).
      stdlib tomllib loader; per-project TOML > global TOML > built-in
      default (90 days). Resolved value carries source attribution
      (per_project_config / global_config / builtin_default) so cleanup
      logs prove which file the TTL came from. DC-6 (malformed/wrong-type/
      negative raises RetentionConfigError) + DC-6b (no files → built-in
      default, never raises) both pinned by death tests.

  - id: A2
    path: src/secondsight/storage/retention.py (enumerate_expired_sessions + ExpiredSession)
    closes: >
      Pure read-side enumerator. Single SQL aggregate
      (SELECT session_id, MAX(timestamp) FROM events GROUP BY session_id
      HAVING MAX(timestamp) <= cutoff) returns sessions whose
      last_event_at is at or before the TTL cutoff. Boundary is
      last_event_at, NOT created_at (decision D1) — DC-2 pins this.
      DC-1 pins empty-table → empty list. Inclusive cutoff (exact-boundary
      IS expired) verified by TestBoundaryPrecision.

  - id: A3
    path: src/secondsight/api/observation.py (Pydantic schemas)
    closes: >
      Frozen + extra=forbid response shapes for SD §10.4 endpoints:
      SessionSummary, SessionDetail, SegmentSummary, SegmentDetail,
      ListSessionsResponse, ListSegmentsResponse. SegmentSummary surfaces
      aggregate duration_ms / token_count so dashboard Level 2 can render
      without a follow-up Level 3 fetch.

  - id: A4
    path: src/secondsight/storage/retention.py (RawTracesPurger + PurgeResult + PurgeFailure)
    closes: >
      Destructive side. FS-first (shutil.rmtree on
      sessions/{session_id}/) then DB-second
      (DELETE FROM events WHERE session_id=?). Per-session try/except
      so one corrupt session cannot kill the batch. DC-5 partial-failure
      contract: FS-success/DB-failure logs structured ERROR with
      session_id and surfaces as PurgeFailure(stage=database) which the
      CLI maps to non-zero exit. shutil.rmtree on missing dir is
      idempotent — operator-cleaned-then-cleanup converges.

  - id: A5
    path: src/secondsight/api/observation.py (router) + src/secondsight/api/server.py (mount)
    closes: >
      4 GET endpoints under /api/sessions[...]. project_id is a required
      Query parameter on every endpoint (DC-4) — FastAPI returns 422 if
      absent; cross-project enumeration impossible by construction. DC-7
      ETag is SHA-1(project_id|max_timestamp|count) with
      usedforsecurity=False; If-None-Match matches return 304.
      Aggregation queries are SQL-only (D7); only segment-detail opens
      events.data JSON. Resources resolved via
      AppState.registry.get(project_id), reusing the Phase 1 hooks
      router pattern.

  - id: A6
    path: src/secondsight/cli/cleanup.py + src/secondsight/cli/app.py (subcommand mount)
    closes: >
      `secondsight cleanup [--home PATH] [--project-id PID] [--dry-run]
      [--format text|json]`. FS-walks `<home>/projects/` (D8 / verification
      C2: NOT via async ProjectRegistry). DC-3 enforced via shared
      _enumerate_for_project helper — dry-run and real-run consume the
      same _EnumerationOutcome shape so they cannot diverge. DC-5
      propagation: any PurgeFailure or enumeration error sets non-zero
      exit. Per-project errors do not abort the loop.

  - id: A7
    path: src/secondsight/api/observation.py (pagination + ETag wiring)
    closes: >
      Bounded JSON listing (D6 — no streaming). Either ?offset=N OR
      ?cursor=str(offset); supplying both is rejected with 422 to keep
      the cursor contract unambiguous. ETag preserves freshness across
      the cursor walk. limit defaults 50, max 500.

# --- Acceptance verification ---
acceptance:
  total: 24  # A-F1..A-F7 + A-T1..A-T4 + A-T4b + A-B1..A-B3 + A-E1..A-E3 + A-X1..A-X3 + A-D1..A-D2
  passed: 24
  breakdown:
    functional:    "A-F1..A-F7  (7/7) — 4 endpoints + cleanup --dry-run + cleanup actual + cleanup --project-id"
    ttl_resolution: "A-T1..A-T4b (5/5) — per-project / global / builtin / malformed / no-files"
    boundary:      "A-B1..A-B3  (3/3) — last_event_at boundary, dry-run/real identity, partial-failure exit-code"
    etag_pagination: "A-E1..A-E3 (3/3) — ETag set + 304 on match + ETag changes on new event + limit/offset bounds"
    coverage_gate: "A-X1..A-X3 (3/3) — new test files at expected paths, all 8 death cases represented, no Phase 1 regressions"
    documentation: "A-D1..A-D2 (2/2) — SD §3.10 reference confirmed, --help lists --dry-run + --project-id + exit codes"

# --- Death-case ledger ---
death_cases:
  total: 8
  green: 8
  enumerated:
    - "DC-1: empty events → [] (no spurious deletions on fresh install)"
    - "DC-2: old-first/recent-last NOT expired (boundary on last_event_at, NOT created_at)"
    - "DC-3: --dry-run and real-run share enumeration helper (no drift)"
    - "DC-4: every API endpoint requires project_id (no cross-project leak)"
    - "DC-5: FS-success/DB-failure surfaces as PurgeFailure + non-zero CLI exit"
    - "DC-6: malformed TOML / wrong-type / negative all raise RetentionConfigError"
    - "DC-6b: no config files → built-in default, never raises (fresh-install path)"
    - "DC-7: ETag stable across identical state, changes on new event"

