scar_items:
  - id: scar-B6-1
    severity: medium
    title: "Factory has NO production caller — documented dead-but-correct gap"
    description: >
      `build_orchestrator` exists as the canonical wiring helper but no
      production code currently calls it. Verified via `Grep -p Orchestrator\\(`
      across `src/` returning zero matches outside tests. The orchestrator
      has no production entry point yet — analyze_session is invoked only
      from test fixtures. Task-B6.md explicitly anticipates this state:
      "If no production construction site exists yet... document that as
      a gap; the wiring will land later when the orchestrator gets a
      real entry point."
    decision_taken: >
      Factory is built as the seam future entry points (CLI analyze
      command, HTTP analyze endpoint) MUST use to get DC-B4-correct
      wiring. Bypassing the factory would silently re-introduce the
      DC-B4 silent-failure mode. Documented in module docstring +
      this scar so any future contributor adding an entry point sees
      the canonical wiring path.
    deferred_to_feature_iteration: true
    deferral_rationale: "Production caller arrives with a future analyze entry point (CLI/HTTP); not GUR-149 scope."
    resolved_items: []

  - id: scar-B6-2
    severity: low
    title: "Config schema expanded with `cleanup_after_analysis: bool`"
    description: >
      Added new boolean field to `[retention]` TOML section. New
      `_resolve_bool_field` helper in retention.py handles the
      per-project → global → builtin chain (defaults to False, the
      safe direction). Bool typing is strict — string values raise
      RetentionConfigError rather than coercing. Source attribution
      is intentionally NOT tracked for booleans (no value choice to
      disambiguate vs. typo; typo on key falls through to False,
      which is the safe default).
    decision_taken: >
      Match raw_traces_ttl_days's strict-int validation for symmetry.
      A future contributor who adds a non-bool boolean-like config
      should follow this pattern.
    deferred_to_feature_iteration: false
    resolved_items: []

  - id: scar-B6-3
    severity: low
    title: "Factory builds 4 analysis repos lazily from db_engine"
    description: >
      `ProjectResources` only exposes events_repository + raw_trace_store
      + db_engine. The factory constructs BehaviorFlagsRepository,
      DirectivesRepository, AnalysisRunsRepository, and
      SessionReportsRepository directly from `resources.db_engine`,
      mirroring the CLI's pattern from task-B5. Schemas are NOT created
      by the factory — the test fixture pre-creates them via
      `create_schema()`, and a real entry point would either create
      schemas on init or rely on the orchestrator's own schema-creation
      semantics (which currently don't exist for these repos at
      orchestrator scope).
    decision_taken: >
      Consistent with task-B5 CLI pattern. A future ProjectResources
      that eagerly wires up all four repos would simplify both this
      factory and cli/cleanup.py.
    deferred_to_feature_iteration: true
    deferral_rationale: "Architectural change to ProjectRegistry; cross-cuts GUR-147."
    resolved_items: []

  - id: scar-B6-4
    severity: low
    title: "Factory does not own DBEngine lifecycle"
    description: >
      Per docstring: "Caller owns the DBEngine lifecycle — the factory
      does NOT dispose." This shifts dispose responsibility to the
      caller (future entry point). Without that contract being
      enforced, a caller could leak resources.
    decision_taken: >
      Documented in factory docstring. Once a production entry point
      lands, an integration test should pin the dispose ordering.
    deferred_to_feature_iteration: true
    deferral_rationale: "No production caller exists to test against yet."
    resolved_items: []

  - id: scar-B6-5
    severity: low
    title: "DC-B4 test uses monkeypatch on private helper"
    description: >
      The DC-B4 test monkeypatches `factory._build_cleanup_trigger`
      to simulate a wiring drop. The private helper is the only seam
      I could simulate without inventing a different injectable. This
      means the helper's name + signature are part of an implicit
      test contract — renaming would break the test silently.
    decision_taken: >
      Acceptable: scar-B6-5 documents the implicit contract. The
      alternative (passing the trigger builder as a kwarg to
      build_orchestrator) would inflate the public surface.
    deferred_to_feature_iteration: false
    resolved_items: []

assumptions_made:
  - id: asm-B6-1
    description: >
      ProjectRegistry's `_build_resources` is the production path for
      wiring per-project resources. The factory accepts a pre-built
      ProjectResources rather than constructing one itself.
    risk: "Caller must use the registry pattern; bypassing it would create resource bookkeeping drift. Documented in factory docstring."

  - id: asm-B6-2
    description: >
      `cleanup_after_analysis` defaults to False. Operators who want
      the eager-cleanup behavior must explicitly opt in.
    risk: "Matches plan accepted gap [gap-callback-failure-policy] — opt-in is correct because SD §3.10.1 sets analysis_ttl > raw_traces_ttl precisely so operators can keep analysis around longer than raw events."

  - id: asm-B6-3
    description: >
      The factory's DC-B4 guard fires only when `_build_cleanup_trigger`
      returns None on the enabled path. A future code change that
      bypasses the helper entirely (e.g., directly returning
      `Orchestrator(..., on_analysis_complete=None)`) would not trip
      the guard.
    risk: >
      Documented in scar-B6-5. The guard is a contract on the
      factory's normal flow; alternative flows would need their own
      contracts.

  - id: scar-B6-6
    severity: low
    title: "Yin Important: factory `Raises:` section omitted AttributeError"
    description: >
      Yin reviewer Important: the factory's `Raises:` docstring section
      listed only OrchestratorWiringError and RetentionConfigError. A
      missing `resources` attribute (e.g., a future ProjectResources
      refactor drops one) would raise AttributeError, propagating
      through `build_orchestrator` uncaught. This is the correct
      behavior (fail loud), but the docstring left it unlabeled.
    decision_taken: >
      Added explicit AttributeError to `Raises:` with a short
      description noting the future-refactor scenario. Mother Rule 2
      applied: assumption labeled at the API boundary.
    deferred_to_feature_iteration: false
    resolved_items:
      - "fix-B6-B (Raises section + Precondition added)"

  - id: scar-B6-7
    severity: low
    title: "Yin Important: DC-B4 test message assertion was OR-loose"
    description: >
      Yin reviewer Important: the DC-B4 test asserted
      `"on_analysis_complete" in msg or "trigger" in msg.lower()` —
      a future message refactor that drops "on_analysis_complete"
      would still pass as long as anything containing "trigger"
      remained. The OR clause weakened the contract.
    decision_taken: >
      Tightened to `assert "on_analysis_complete" in msg` (AND, not OR).
      A message refactor must preserve both substrings or update the
      test. Contract pinned.
    deferred_to_feature_iteration: false
    resolved_items:
      - "fix-B6-C (DC-B4 test message AND-strict)"

  - id: scar-B6-8
    severity: low
    title: "Yin Important: `_resolve_bool_field` validation asymmetry undocumented"
    description: >
      Yin reviewer Important: `_validate_ttl` explicitly documents
      "A boolean is technically an int in Python but is rejected here"
      because `isinstance(True, int)` is True. `_resolve_bool_field`
      did not document why its `isinstance(value, bool)` check is
      sufficient on its own. A future reader could wonder if a
      symmetric int-check is missing.
    decision_taken: >
      Added a note in `_resolve_bool_field` docstring explaining the
      asymmetry: bool is the PRIMARY check here (vs. _validate_ttl
      where bool is a guard against bool-as-int). TOML native typing
      produces bool for true/false literals.
    deferred_to_feature_iteration: false
    resolved_items:
      - "fix-B6-D (bool validation note added)"

  - id: scar-B6-9
    severity: low
    title: "Quality Suggestion: events_repository tacit boundary at trigger-builder site"
    description: >
      Quality reviewer Suggestion (O — tacit boundary):
      `_build_cleanup_trigger` passes `resources.events_repository` to
      BOTH `RawTracesPurger` (DB-delete path) AND
      `PostAnalysisCleanupTrigger` (event-lookup path). This is sound
      today (one project, one engine) but a future ProjectResources
      refactor that splits raw-trace storage from event storage would
      silently target two different scopes.
    decision_taken: >
      Added a 6-line marked-bet comment block at the dual-use site
      naming the assumption. A future refactorer narrowing
      ProjectResources sees the constraint at the commitment site,
      not buried in scars.
    deferred_to_feature_iteration: false
    resolved_items:
      - "fix-B6-E (events_repository tacit boundary marked)"

  - id: scar-B6-10
    severity: low
    title: "Quality Suggestion: RawTracesPurger construction duplicated in factory + CLI"
    description: >
      Quality reviewer Suggestion (DRY): `RawTracesPurger(repo=...,
      raw_trace_store=...)` is constructed identically in
      factory.py:75-78 and cli/cleanup.py:451-454. Two sites for one
      construction fact; if ProjectResources's shape changes, both
      must update in lockstep.
    decision_taken: >
      Defer per rule-of-three. Two sites today; a third would warrant
      extracting a shared helper (e.g.,
      `ProjectResources.build_raw_traces_purger()`). Documented for
      future contributor.
    deferred_to_feature_iteration: true
    deferral_rationale: "Rule-of-three; only two sites today."
    resolved_items: []

