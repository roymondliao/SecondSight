scar_items:
  - id: scar-B2-1
    severity: medium
    title: "PurgeFailure.stage type literal widened by string injection"
    description: >
      The `PurgeFailure.stage` field in `retention.py` is typed as
      `Literal["filesystem", "database"]` (raw_traces vocabulary). For
      `AnalysisResultsPurger` I reused `PurgeFailure` with `stage="database"`
      and tucked the analysis-specific sub-stage (`behavior_flags` vs
      `session_reports`) into the `error` message via a "(stage=...)"
      suffix. This works at runtime but is a soft type-system lie:
      static analysis sees only "database" while operators reading logs
      see the more specific stage in the error string.
    decision_taken: >
      Reused `PurgeFailure` to avoid a parallel failure-record type for the
      same shape. The analysis-specific `AnalysisPurgeStage` literal is exported
      from `analysis_retention.py` for any future caller that wants to widen
      the field formally. Recommendation: a future iteration could change
      `PurgeFailure.stage` to a Union of both literals OR to plain `str`
      with a documented contract.
    deferred_to_feature_iteration: true
    deferral_rationale: "Cosmetic for static analysis; the runtime contract is preserved. Bundle with any future PurgeFailure refactor."
    resolved_items: []

  - id: scar-B2-2
    severity: low
    title: "Cross-module SLF001 access pattern repeated"
    description: >
      `enumerate_expired_analyses`, `_delete_behavior_flags_for_session`,
      and `_delete_session_report_for_session` all access `repo._db.engine`
      directly via `# noqa: SLF001`. This mirrors the existing GUR-147
      pattern in `retention.py`. The SLF001 annotation is a load-bearing
      acknowledgment — the storage layer co-owns engine access intentionally
      because exposing a public `engine` property would leak SQLAlchemy
      types to unrelated callers. Three new sites doubles the visible
      surface of this pattern.
    decision_taken: "Match existing pattern for consistency. A storage-layer-internal protocol (`_HasDbEngine`) could formalize this if we add a 4th site."
    deferred_to_feature_iteration: true
    deferral_rationale: "Pattern is established; refactor is independent of GUR-149 scope."
    resolved_items: []

  - id: scar-B2-3
    severity: low
    title: "Project-scoped enumeration deferred to caller (no project_id filter)"
    description: >
      `enumerate_expired_analyses` does NOT filter by `project_id`. It returns
      ALL expired session_reports rows across all projects in the same DB. The
      multi-project model in this codebase uses one DB per project (see
      `cli/cleanup.py:_select_project_ids` which iterates project directories
      and constructs per-project DB engines). So in practice the enumerator IS
      project-scoped via DB instance, not via WHERE clause.
    decision_taken: >
      Match GUR-147's `enumerate_expired_sessions` which also doesn't filter
      by project_id (relies on per-project DB isolation). If the storage
      model ever consolidates to a single multi-tenant DB, this enumerator
      needs an explicit project_id parameter. Documented in module docstring
      via reference to GUR-147's pattern.
    deferred_to_feature_iteration: true
    deferral_rationale: "Architectural assumption; refactor only if storage model changes."
    resolved_items: []

  - id: scar-B2-4
    severity: low
    title: "Test for DC-B6 partial failure is fragile (engine.begin monkeypatch)"
    description: >
      `test_partial_failure_between_stages_is_recoverable` monkeypatches
      `engine.begin()` with a custom context manager that selectively
      raises on a specific DELETE statement matching the table identity
      (`stmt.table is session_reports`) and the literal-bound WHERE clause
      containing "sess-a". The matching is heuristic — a future SQL change
      that uses a different binding strategy or routes the same DELETE
      through a different code path could silently no-op the spy and let
      the test pass even when the contract is broken.
    decision_taken: >
      Accepted for v1. The test is documented internally; the assertion
      checks both "first pass left orphan-free state" AND "second pass
      completes" so even a degraded spy still catches the most important
      contract (no orphans). A more robust alternative would be a
      DI-injected delete callable on the purger, but that adds API surface
      for tests only.
    deferred_to_feature_iteration: false
    resolved_items: []

assumptions_made:
  - id: asm-B2-1
    description: "Per-project DB isolation means enumerator does not need a project_id filter."
    risk: "If the storage model ever moves to a single multi-tenant DB, the enumerator over-reaches. Mitigation: GUR-147's enumerator has the same assumption; both update together if the model changes."

  - id: asm-B2-2
    description: "session_reports.created_at is preserved on upsert (per repository docstring lines 5-7)."
    risk: "If a future repository change updates created_at on conflict, the TTL boundary becomes unstable (re-runs would extend retention). Mitigation: the repository's docstring is the contract; a regression test in the repository tests would catch a change."

  - id: asm-B2-3
    description: "behavior_flags has no FK constraint to session_reports (verified absent via Grep)."
    risk: "If a future migration adds an ON DELETE CASCADE FK, the behavior_flags-first deletion would fail because the constraint would block. Mitigation: this purger then becomes redundant — would simplify to a single session_reports delete. Detection: integration tests would fail."

  - id: scar-B2-5
    severity: medium
    title: "PurgeFailure.stage diagnostic loss for analysis purger"
    description: >
      Yin reviewer flagged Important: PurgeFailure.stage is typed as
      Literal["filesystem", "database"] from GUR-147; both behavior_flags
      and session_reports failures pass `stage="database"`, with the
      finer-grained stage embedded in `error` via "(stage=behavior_flags)"
      / "(stage=session_reports)" suffix. A consumer reading `failure.stage`
      programmatically loses the per-stage distinction. Per-stage recovery
      semantics differ (behavior_flags failure means session_reports never
      touched; session_reports failure means behavior_flags already gone).
    decision_taken: >
      Removed the misleading `AnalysisPurgeStage` export from this module
      (Critical fix below), consolidating the type-system trade-off into a
      single place: the `error` string suffix. A future PurgeFailure
      refactor that widens the typed stage to a Union of both vocabularies
      is the right shape but cross-cuts GUR-147 territory; deferred.
    deferred_to_feature_iteration: true
    deferral_rationale: "Cross-task type widening; not a v1 blocker."
    resolved_items: []

  - id: scar-B2-6
    severity: low
    title: "Quality reviewer: hollow repo abstraction at 3 new sites"
    description: >
      Quality reviewer flagged Important (D principle): three new sites in
      this module access `repo._db.engine` directly via SLF001, treating the
      typed repo as a box for the engine rather than a true abstraction.
      Combined with the 3 existing sites in retention.py, the project now
      has 6 SLF001 engine-access sites — past the threshold scar-B2-2 named
      for formalizing a `_HasDbEngine` Protocol.
    decision_taken: >
      Added inline comment at the enumerate_expired_analyses access site
      naming the assumption (sync DBEngine with a SQLAlchemy Engine at
      .engine). Protocol formalization is an architectural change that
      retroactively touches GUR-147 code; deferred to feature iteration
      where it can land alongside any future storage-layer refactor.
    deferred_to_feature_iteration: true
    deferral_rationale: "Cross-cuts GUR-147; not blocking."
    resolved_items: []

