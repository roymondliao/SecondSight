name: Install Smoke Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fresh-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dashboard
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build
          test -f dist/index.html  # fail loud if vite produced nothing

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build --wheel --out-dir dist
          ls -1 dist/*.whl

      - name: Verify wheel ships dashboard bundle
        run: python tests/smoke/test_verify_wheel_contents.py dist/*.whl

      - name: Install wheel smoke in clean python:3.14-slim
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/tests/smoke:/smoke:ro" \
            python:3.14-slim \
            python /smoke/test_installed_wheel_smoke.py "/dist/*.whl"
