name: Install Smoke Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fresh-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version-file: ".python-version"

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build --wheel --out-dir dist
          ls -1 dist/*.whl

      - name: Install wheel + run secondsight --version in clean python:3.14-slim
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            python:3.14-slim \
            bash -euo pipefail -c '
              pip install --no-cache-dir --disable-pip-version-check /dist/*.whl
              secondsight --version
            '
