name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "24.16.0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dashboard
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build
          test -f dist/index.html

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Sync dependencies
        run: uv sync

      - name: Pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

      - name: Pytest
        run: uv run pytest -m "not local_only"

  install-smoke:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dashboard
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build
          test -f dist/index.html

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build --wheel --out-dir dist
          ls -1 dist/*.whl

      - name: Verify wheel ships dashboard bundle
        run: python tests/smoke/test_verify_wheel_contents.py dist/*.whl

      - name: Install wheel smoke in clean python:3.14-slim
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/tests/smoke:/smoke:ro" \
            python:3.14-slim \
            python /smoke/test_installed_wheel_smoke.py "/dist/*.whl"
